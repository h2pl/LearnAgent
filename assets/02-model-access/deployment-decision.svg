<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="ollama" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DBEAFE"/><stop offset="100%" stop-color="#EFF6FF"/></linearGradient>
    <linearGradient id="vllm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DCFCE7"/><stop offset="100%" stop-color="#F0FDF4"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563EB"/></marker>
  </defs>

  <rect width="680" height="400" fill="url(#bg)" rx="8"/>

  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" fill="#fff" font-size="17" font-weight="bold">本地部署决策：Ollama vs vLLM</text>

  <!-- 起点 -->
  <ellipse cx="340" cy="72" rx="66" ry="16" fill="#2563EB"/>
  <text x="340" y="76" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">需要本地部署？</text>

  <!-- 分支 -->
  <line x1="340" y1="88" x2="340" y2="108" stroke="#2563EB" stroke-width="2"/>
  <line x1="100" y1="108" x2="580" y2="108" stroke="#2563EB" stroke-width="2"/>
  <line x1="100" y1="108" x2="100" y2="120" stroke="#2563EB" stroke-width="2"/>
  <line x1="580" y1="108" x2="580" y2="120" stroke="#2563EB" stroke-width="2"/>

  <!-- Y分支 -->
  <text x="340" y="104" fill="#64748B" font-size="9" text-anchor="middle">使用场景</text>

  <!-- 左侧: Ollama -->
  <rect x="20" y="128" width="296" height="175" rx="8" fill="url(#ollama)" stroke="#60A5FA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="128" width="296" height="32" rx="8" fill="#3B82F6"/>
  <rect x="20" y="144" width="296" height="16" fill="#3B82F6"/>
  <text x="168" y="150" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">Ollama</text>

  <text x="36" y="178" fill="#1D4ED8" font-size="10" font-weight="bold">适合场景</text>
  <text x="36" y="196" fill="#475569" font-size="9">• 个人开发 / 学习 / 原型验证</text>
  <text x="36" y="212" fill="#475569" font-size="9">• 1-4 人并发用户</text>
  <text x="36" y="228" fill="#475569" font-size="9">• 零门槛部署需求</text>

  <text x="36" y="252" fill="#1D4ED8" font-size="10" font-weight="bold">核心优势</text>
  <text x="36" y="270" fill="#475569" font-size="9">• 一条命令安装运行</text>
  <text x="36" y="286" fill="#475569" font-size="9">• GGUF 量化开箱即用</text>
  <text x="36" y="300" fill="#475569" font-size="9">• OpenAI 兼容 API</text>

  <rect x="100" y="100" width="96" height="20" rx="3" fill="#2563EB"/>
  <text x="148" y="114" fill="#fff" font-size="8" font-weight="bold" text-anchor="middle">个人/原型</text>

  <!-- 右侧: vLLM -->
  <rect x="364" y="128" width="296" height="175" rx="8" fill="url(#vllm)" stroke="#34D399" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="364" y="128" width="296" height="32" rx="8" fill="#059669"/>
  <rect x="364" y="144" width="296" height="16" fill="#059669"/>
  <text x="512" y="150" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">vLLM</text>

  <text x="380" y="178" fill="#047857" font-size="10" font-weight="bold">适合场景</text>
  <text x="380" y="196" fill="#475569" font-size="9">• 生产环境 / 团队服务</text>
  <text x="380" y="212" fill="#475569" font-size="9">• 5+ 并发用户</text>
  <text x="380" y="228" fill="#475569" font-size="9">• 高吞吐量需求</text>

  <text x="380" y="252" fill="#047857" font-size="10" font-weight="bold">核心优势</text>
  <text x="380" y="270" fill="#475569" font-size="9">• PagedAttention 内存管理</text>
  <text x="380" y="286" fill="#475569" font-size="9">• Continuous Batching</text>
  <text x="380" y="300" fill="#475569" font-size="9">• 高并发时 5-12x 加速</text>

  <rect x="520" y="100" width="96" height="20" rx="3" fill="#059669"/>
  <text x="568" y="114" fill="#fff" font-size="8" font-weight="bold" text-anchor="middle">生产/多用户</text>

  <!-- 底部对比表 -->
  <rect x="20" y="316" width="640" height="70" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="334" fill="#64748B" font-size="9" font-weight="bold" text-anchor="middle">上手难度</text>
  <text x="230" y="334" fill="#64748B" font-size="9" font-weight="bold" text-anchor="middle">并发吞吐量</text>
  <text x="350" y="334" fill="#64748B" font-size="9" font-weight="bold" text-anchor="middle">TTFT</text>
  <text x="455" y="334" fill="#64748B" font-size="9" font-weight="bold" text-anchor="middle">模型格式</text>
  <text x="560" y="334" fill="#64748B" font-size="9" font-weight="bold" text-anchor="middle">多GPU支持</text>

  <text x="110" y="352" fill="#2563EB" font-size="10" font-weight="bold" text-anchor="middle">极低（一条命令）</text>
  <text x="230" y="352" fill="#DC2626" font-size="10" font-weight="bold" text-anchor="middle">低（串行处理）</text>
  <text x="350" y="352" fill="#64748B" font-size="10" text-anchor="middle">~65ms</text>
  <text x="455" y="352" fill="#64748B" font-size="10" text-anchor="middle">GGUF</text>
  <text x="560" y="352" fill="#64748B" font-size="10" text-anchor="middle">有限</text>

  <text x="110" y="370" fill="#059669" font-size="10" font-weight="bold" text-anchor="middle">中等（需 Python）</text>
  <text x="230" y="370" fill="#059669" font-size="10" font-weight="bold" text-anchor="middle">高（Continuous Batching）</text>
  <text x="350" y="370" fill="#64748B" font-size="10" text-anchor="middle">~11ms</text>
  <text x="455" y="370" fill="#64748B" font-size="10" text-anchor="middle">原生+GPTQ+AWQ</text>
  <text x="560" y="370" fill="#059669" font-size="10" text-anchor="middle">完善(TP)</text>

  <line x1="170" y1="326" x2="170" y2="376" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="295" y1="326" x2="295" y2="376" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="400" y1="326" x2="400" y2="376" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="505" y1="326" x2="505" y2="376" stroke="#E2E8F0" stroke-width="0.5"/>
</svg>