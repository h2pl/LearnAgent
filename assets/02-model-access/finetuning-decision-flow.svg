<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#475569"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563EB"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#059669"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#DC2626"/></marker>
  </defs>

  <rect width="700" height="480" fill="url(#bg)" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="700" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="700" height="22" fill="url(#header)"/>
  <text x="350" y="28" fill="#fff" font-size="17" font-weight="bold" text-anchor="middle">微调 vs Prompt vs RAG：决策流程</text>

  <!-- Start node -->
  <ellipse cx="350" cy="78" rx="110" ry="18" fill="#7C3AED"/>
  <text x="350" y="82" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">模型输出不符合预期？</text>

  <!-- Arrow down -->
  <line x1="350" y1="96" x2="350" y2="118" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="350,118 460,148 350,178 240,148" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="350" y="145" fill="#92400E" font-size="10" font-weight="bold" text-anchor="middle">问题类型是什么？</text>
  <text x="350" y="158" fill="#92400E" font-size="9" text-anchor="middle">诊断根因</text>

  <!-- Four branches -->
  <!-- Branch 1: 格式问题 → Prompt -->
  <line x1="280" y1="148" x2="90" y2="210" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="165" y="175" fill="#2563EB" font-size="9" font-weight="bold" text-anchor="middle">输出格式不对</text>

  <!-- Branch 2: 缺少知识 → RAG -->
  <line x1="320" y1="178" x2="255" y2="210" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="275" y="200" fill="#059669" font-size="9" font-weight="bold" text-anchor="middle">不懂业务知识</text>

  <!-- Branch 3: 风格问题 → Prompt -->
  <line x1="380" y1="178" x2="445" y2="210" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="425" y="200" fill="#2563EB" font-size="9" font-weight="bold" text-anchor="middle">风格不符合</text>

  <!-- Branch 4: 能力不足 → Fine-tune -->
  <line x1="420" y1="148" x2="610" y2="210" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="535" y="175" fill="#DC2626" font-size="9" font-weight="bold" text-anchor="middle">工具调用不稳定</text>

  <!-- Box 1: Prompt Engineering -->
  <rect x="15" y="218" width="155" height="100" rx="8" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="15" y="218" width="155" height="28" rx="8" fill="#3B82F6"/>
  <rect x="15" y="232" width="155" height="14" fill="#3B82F6"/>
  <text x="92" y="238" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Prompt Engineering</text>
  <text x="30" y="264" fill="#1D4ED8" font-size="9">• Few-shot 示例 (2-5条)</text>
  <text x="30" y="280" fill="#1D4ED8" font-size="9">• System Prompt 调整</text>
  <text x="30" y="296" fill="#1D4ED8" font-size="9">• 输出格式约束</text>
  <text x="92" y="312" fill="#64748B" font-size="8" text-anchor="middle" font-style="italic">成本：几乎为零</text>

  <!-- Box 2: RAG -->
  <rect x="185" y="218" width="155" height="100" rx="8" fill="#F0FDF4" stroke="#34D399" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="185" y="218" width="155" height="28" rx="8" fill="#059669"/>
  <rect x="185" y="232" width="155" height="14" fill="#059669"/>
  <text x="262" y="238" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">RAG 检索增强</text>
  <text x="200" y="264" fill="#047857" font-size="9">• 注入外部知识</text>
  <text x="200" y="280" fill="#047857" font-size="9">• 实时更新数据</text>
  <text x="200" y="296" fill="#047857" font-size="9">• 可追溯来源</text>
  <text x="262" y="312" fill="#64748B" font-size="8" text-anchor="middle" font-style="italic">成本：中等（向量库+检索）</text>

  <!-- Box 3: Function Calling -->
  <rect x="355" y="218" width="155" height="100" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="355" y="218" width="155" height="28" rx="8" fill="#EA580C"/>
  <rect x="355" y="232" width="155" height="14" fill="#EA580C"/>
  <text x="432" y="238" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">Function Calling</text>
  <text x="370" y="264" fill="#C2410C" font-size="9">• 工具描述优化</text>
  <text x="370" y="280" fill="#C2410C" font-size="9">• 参数 Schema 细化</text>
  <text x="370" y="296" fill="#C2410C" font-size="9">• 多步示例引导</text>
  <text x="432" y="312" fill="#64748B" font-size="8" text-anchor="middle" font-style="italic">成本：低（改描述即可）</text>

  <!-- Box 4: Fine-tuning -->
  <rect x="525" y="218" width="155" height="100" rx="8" fill="#FEF2F2" stroke="#F87171" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="525" y="218" width="155" height="28" rx="8" fill="#DC2626"/>
  <rect x="525" y="232" width="155" height="14" fill="#DC2626"/>
  <text x="602" y="238" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">微调 (Fine-tuning)</text>
  <text x="540" y="264" fill="#B91C1C" font-size="9">• SFT 指令微调</text>
  <text x="540" y="280" fill="#B91C1C" font-size="9">• LoRA 低秩适配</text>
  <text x="540" y="296" fill="#B91C1C" font-size="9">• 改变模型行为</text>
  <text x="602" y="312" fill="#64748B" font-size="8" text-anchor="middle" font-style="italic">成本：高（数据+训练）</text>

  <!-- Bottom: escalation arrows -->
  <line x1="170" y1="322" x2="210" y2="340" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="322" x2="380" y2="340" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="510" y1="322" x2="550" y2="340" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Escalation label -->
  <text x="350" y="352" fill="#94A3B8" font-size="9" text-anchor="middle">效果不够时逐级升级 ──────────────────►</text>

  <!-- Bottom principle box -->
  <rect x="40" y="370" width="620" height="50" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="392" fill="#1E293B" font-size="12" font-weight="bold" text-anchor="middle">核心原则：先试 Prompt → 再试 RAG → 最后才考虑微调</text>
  <text x="350" y="410" fill="#64748B" font-size="10" text-anchor="middle">每升级一步，成本和复杂度都显著增加；确认前一步真的不够用，再往下走</text>

  <!-- Priority badges -->
  <rect x="55" y="435" width="80" height="22" rx="4" fill="#DBEAFE"/>
  <text x="95" y="450" fill="#1D4ED8" font-size="9" font-weight="bold" text-anchor="middle">① 先试这个</text>

  <rect x="225" y="435" width="80" height="22" rx="4" fill="#D1FAE5"/>
  <text x="265" y="450" fill="#047857" font-size="9" font-weight="bold" text-anchor="middle">② 再试这个</text>

  <rect x="395" y="435" width="80" height="22" rx="4" fill="#FFEDD5"/>
  <text x="435" y="450" fill="#C2410C" font-size="9" font-weight="bold" text-anchor="middle">③ 再试这个</text>

  <rect x="565" y="435" width="80" height="22" rx="4" fill="#FEE2E2"/>
  <text x="605" y="450" fill="#B91C1C" font-size="9" font-weight="bold" text-anchor="middle">④ 最后手段</text>
</svg>