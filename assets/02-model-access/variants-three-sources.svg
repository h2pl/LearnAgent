<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="post" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="proc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#DCFCE7"/></linearGradient>
    <linearGradient id="indep" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="680" height="400" fill="url(#bg)" rx="8"/>

  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">模型变体的三种来源</text>

  <!-- 来源一: 后训练 -->
  <rect x="20" y="60" width="200" height="220" rx="8" fill="url(#post)" stroke="#60A5FA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="60" width="200" height="32" rx="8" fill="#2563EB"/>
  <rect x="20" y="76" width="200" height="16" fill="#2563EB"/>
  <text x="120" y="82" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">后训练 Post-Training</text>
  <text x="120" y="108" fill="#64748B" font-size="9" text-anchor="middle">同架构 + 新数据训练</text>

  <rect x="34" y="120" width="172" height="24" rx="4" fill="#fff" stroke="#93C5FD" stroke-width="0.5"/>
  <text x="120" y="136" fill="#1E40AF" font-size="10" font-weight="bold" text-anchor="middle">Instruct / Chat / Reasoning</text>

  <rect x="34" y="150" width="172" height="24" rx="4" fill="#fff" stroke="#93C5FD" stroke-width="0.5"/>
  <text x="120" y="166" fill="#1E40AF" font-size="10" text-anchor="middle">Code 专用 / Math 专用</text>

  <rect x="34" y="180" width="172" height="24" rx="4" fill="#fff" stroke="#93C5FD" stroke-width="0.5"/>
  <text x="120" y="196" fill="#1E40AF" font-size="10" text-anchor="middle">Vision 多模态</text>

  <rect x="34" y="210" width="172" height="24" rx="4" fill="#fff" stroke="#93C5FD" stroke-width="0.5"/>
  <text x="120" y="226" fill="#1E40AF" font-size="10" text-anchor="middle">金融 / 医疗 / 法律模型</text>

  <rect x="34" y="242" width="172" height="24" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="0.5"/>
  <text x="120" y="258" fill="#1D4ED8" font-size="9" font-weight="bold" text-anchor="middle">维度 1, 2, 6</text>

  <!-- 来源二: 后处理 -->
  <rect x="240" y="60" width="200" height="220" rx="8" fill="url(#proc)" stroke="#34D399" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="60" width="200" height="32" rx="8" fill="#059669"/>
  <rect x="240" y="76" width="200" height="16" fill="#059669"/>
  <text x="340" y="82" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">后处理 Post-Processing</text>
  <text x="340" y="108" fill="#64748B" font-size="9" text-anchor="middle">权重数学变换，不训练</text>

  <rect x="254" y="120" width="172" height="24" rx="4" fill="#fff" stroke="#6EE7B7" stroke-width="0.5"/>
  <text x="340" y="136" fill="#047857" font-size="10" text-anchor="middle">量化 Q4_K_M / AWQ / GPTQ</text>

  <rect x="254" y="150" width="172" height="24" rx="4" fill="#fff" stroke="#6EE7B7" stroke-width="0.5"/>
  <text x="340" y="166" fill="#047857" font-size="10" text-anchor="middle">合并 Merge (Linear/SLERP/TIES)</text>

  <rect x="254" y="180" width="172" height="24" rx="4" fill="#fff" stroke="#6EE7B7" stroke-width="0.5"/>
  <text x="340" y="196" fill="#047857" font-size="10" text-anchor="middle">剪枝 Pruning</text>

  <rect x="254" y="210" width="172" height="36" rx="4" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="0.5"/>
  <text x="340" y="226" fill="#64748B" font-size="8.5" text-anchor="middle">不改变模型能力</text>
  <text x="340" y="240" fill="#64748B" font-size="8.5" text-anchor="middle">只改变存储和计算方式</text>

  <rect x="254" y="254" width="172" height="18" rx="4" fill="#DCFCE7" stroke="#6EE7B7" stroke-width="0.5"/>
  <text x="340" y="268" fill="#047857" font-size="9" font-weight="bold" text-anchor="middle">维度 3</text>

  <!-- 来源三: 独立训练 -->
  <rect x="460" y="60" width="200" height="220" rx="8" fill="url(#indep)" stroke="#FBBF24" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="60" width="200" height="32" rx="8" fill="#D97706"/>
  <rect x="460" y="76" width="200" height="16" fill="#D97706"/>
  <text x="560" y="82" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">独立训练 Independent</text>
  <text x="560" y="108" fill="#64748B" font-size="9" text-anchor="middle">不同架构从头训练</text>

  <rect x="474" y="120" width="172" height="24" rx="4" fill="#fff" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="560" y="136" fill="#92400E" font-size="10" text-anchor="middle">Embedding (BGE-M3)</text>

  <rect x="474" y="150" width="172" height="24" rx="4" fill="#fff" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="560" y="166" fill="#92400E" font-size="10" text-anchor="middle">Rerank (BGE-reranker)</text>

  <rect x="474" y="180" width="172" height="24" rx="4" fill="#fff" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="560" y="196" fill="#92400E" font-size="10" text-anchor="middle">STT (Whisper) / TTS (CosyVoice)</text>

  <rect x="474" y="210" width="172" height="36" rx="4" fill="#FFF7ED" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="560" y="226" fill="#64748B" font-size="8.5" text-anchor="middle">和 LLM 完全不同架构</text>
  <text x="560" y="240" fill="#64748B" font-size="8.5" text-anchor="middle">不能从 LLM 微调而来</text>

  <rect x="474" y="254" width="172" height="18" rx="4" fill="#FFEDD5" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="560" y="268" fill="#92400E" font-size="9" font-weight="bold" text-anchor="middle">维度 5</text>

  <!-- 蒸馏特例 -->
  <rect x="130" y="296" width="420" height="36" rx="8" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="314" fill="#6B21A8" font-size="10" font-weight="bold" text-anchor="middle">蒸馏 (Distillation) = 独立训练 + 教师监督 — 维度 4，特殊混合来源</text>
  <text x="340" y="327" fill="#7C3AED" font-size="8.5" text-anchor="middle">学生从头训练，但用教师软标签监督 → 不继承参数，只学习行为分布</text>

  <!-- 底部 -->
  <rect x="30" y="348" width="620" height="40" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
  <text x="48" y="368" fill="#1E293B" font-size="10" font-weight="bold">选型建议：</text>
  <text x="48" y="382" fill="#64748B" font-size="9">先问"这个变体从哪来的"→ 后训练/后处理/独立训练 → 再看具体细节 → 匹配场景需求</text>
</svg>