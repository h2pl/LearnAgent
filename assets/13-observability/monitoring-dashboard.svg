<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="960" height="480" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="30" font-family="PingFang SC, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Agent 监控仪表盘</text>

  <!-- Row 1: 4 stat cards -->
  <rect x="30" y="45" width="210" height="75" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="68" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B">请求量 (24h)</text>
  <text x="50" y="100" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="#1E293B">276,432</text>
  <text x="170" y="100" font-family="Segoe UI, sans-serif" font-size="12" fill="#059669">↑ 12%</text>

  <rect x="255" y="45" width="210" height="75" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="275" y="68" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B">任务完成率</text>
  <text x="275" y="100" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="#059669">96.2%</text>
  <text x="395" y="100" font-family="Segoe UI, sans-serif" font-size="12" fill="#059669">↑ 0.8%</text>

  <rect x="480" y="45" width="210" height="75" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="68" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B">P95 延迟</text>
  <text x="500" y="100" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="#D97706">2.8s</text>
  <text x="620" y="100" font-family="Segoe UI, sans-serif" font-size="12" fill="#DC2626">↑ 5%</text>

  <rect x="705" y="45" width="210" height="75" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="725" y="68" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B">今日 Token</text>
  <text x="725" y="100" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="#1E293B">15.2M</text>
  <text x="845" y="100" font-family="Segoe UI, sans-serif" font-size="12" fill="#D97706">¥ 342</text>

  <!-- Row 2: request chart -->
  <rect x="30" y="135" width="450" height="155" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="160" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">请求量趋势</text>

  <!-- Fake line chart -->
  <polyline points="60,260 90,240 120,250 150,220 180,230 210,200 240,210 270,180 300,190 330,170 360,175 390,155 420,165 450,150" fill="none" stroke="#2563EB" stroke-width="2"/>
  <polyline points="60,270 90,265 120,260 150,250 180,255 210,240 240,245 270,230 300,235 330,220 360,225 390,210 420,215 450,200" fill="none" stroke="#93C5FD" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="80" y="278" font-family="Segoe UI, sans-serif" font-size="9" fill="#2563EB">请求量</text>
  <text x="180" y="278" font-family="Segoe UI, sans-serif" font-size="9" fill="#93C5FD">前一周期</text>

  <text x="380" y="278" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">6/17 → 6/18</text>

  <!-- Row 2 right: error rate -->
  <rect x="495" y="135" width="425" height="155" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="515" y="160" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">错误分布</text>

  <rect x="520" y="175" width="380" height="20" rx="3" fill="#D1FAE5"/>
  <text x="530" y="190" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#065F46">HTTP 5xx</text>
  <text x="870" y="190" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46">0.3%</text>

  <rect x="520" y="200" width="380" height="20" rx="3" fill="#D1FAE5"/>
  <text x="530" y="215" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#065F46">超时</text>
  <text x="870" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46">0.8%</text>

  <rect x="520" y="225" width="370" height="20" rx="3" fill="#FEF3C7"/>
  <text x="530" y="240" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#92400E">工具错误</text>
  <text x="870" y="240" font-family="Segoe UI, sans-serif" font-size="10" fill="#92400E">1.2%</text>

  <rect x="520" y="250" width="350" height="20" rx="3" fill="#FEF2F2"/>
  <text x="530" y="265" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#991B1B">任务失败</text>
  <text x="870" y="265" font-family="Segoe UI, sans-serif" font-size="10" fill="#991B1B">3.5% ⚠️</text>

  <!-- Row 3: latency + resource -->
  <rect x="30" y="305" width="295" height="155" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="330" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">响应时间分位</text>

  <rect x="50" y="345" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="65" y="363" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">P50</text>
  <rect x="120" y="349" width="80" height="17" rx="3" fill="#D1FAE5"/>
  <text x="160" y="362" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">1.2s</text>

  <rect x="50" y="378" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="65" y="396" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">P95</text>
  <rect x="120" y="382" width="140" height="17" rx="3" fill="#FEF3C7"/>
  <text x="190" y="395" font-family="Segoe UI, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">2.8s</text>

  <rect x="50" y="411" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="65" y="429" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">P99</text>
  <rect x="120" y="415" width="70" height="17" rx="3" fill="#FEF2F2"/>
  <text x="155" y="428" font-family="Segoe UI, sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">8.5s</text>

  <!-- Resource -->
  <rect x="340" y="305" width="295" height="155" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="360" y="330" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">资源利用率</text>

  <rect x="360" y="345" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="375" y="363" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">CPU</text>
  <rect x="430" y="349" width="155" height="17" rx="3" fill="#D1FAE5"/>
  <text x="507" y="362" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">62%</text>

  <rect x="360" y="378" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="375" y="396" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">内存</text>
  <rect x="430" y="382" width="195" height="17" rx="3" fill="#FEF3C7"/>
  <text x="527" y="395" font-family="Segoe UI, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">78%</text>

  <rect x="360" y="411" width="255" height="25" rx="4" fill="#F1F5F9"/>
  <text x="375" y="429" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">并发</text>
  <rect x="430" y="415" width="110" height="17" rx="3" fill="#D1FAE5"/>
  <text x="485" y="428" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">45 / 200</text>

  <!-- Budget -->
  <rect x="650" y="305" width="270" height="155" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="670" y="330" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E293B">预算消耗</text>

  <rect x="670" y="345" width="230" height="25" rx="4" fill="#F1F5F9"/>
  <text x="685" y="363" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">今日</text>
  <text x="850" y="363" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E293B">¥ 342</text>

  <rect x="670" y="378" width="230" height="25" rx="4" fill="#F1F5F9"/>
  <text x="685" y="396" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">本月累计</text>
  <text x="850" y="396" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E293B">¥ 8,240</text>

  <rect x="670" y="411" width="230" height="25" rx="4" fill="#F1F5F9"/>
  <text x="685" y="429" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">预算剩余</text>
  <text x="850" y="429" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">¥ 1,760</text>

  <rect x="700" y="440" width="100" height="20" rx="4" fill="#059669"/>
  <text x="750" y="455" font-family="PingFang SC, Segoe UI, sans-serif" font-size="9" font-weight="bold" fill="#FFF" text-anchor="middle">预算充足</text>
</svg>