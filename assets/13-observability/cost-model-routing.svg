<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">成本优化：模型路由架构</text>

  <!-- User Input -->
  <rect x="30" y="70" width="180" height="50" rx="10" fill="#2563EB"/>
  <text x="120" y="100" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">用户输入</text>

  <!-- Arrow -->
  <line x1="210" y1="95" x2="260" y2="95" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Classifier -->
  <rect x="270" y="60" width="180" height="70" rx="10" fill="#FFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="360" y="85" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E" text-anchor="middle">分类器 (规则/小模型)</text>
  <text x="360" y="105" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">零额外 LLM 调用</text>
  <text x="360" y="120" font-family="Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">关键词 / 长度 / 用户等级</text>

  <!-- Two branches -->
  <!-- Branch 1: Simple -> mini model -->
  <line x1="450" y1="80" x2="520" y2="55" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="475" y="55" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#059669">简单任务</text>
  <text x="475" y="68" font-family="Segoe UI, sans-serif" font-size="10" fill="#94A3B8">60-70% 流量</text>

  <rect x="530" y="30" width="200" height="55" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="630" y="52" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">gpt-4o-mini</text>
  <text x="630" y="72" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#065F46" text-anchor="middle">成本降低 80-90%</text>

  <!-- Branch 2: Complex -> full model -->
  <line x1="450" y1="110" x2="520" y2="130" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="475" y="130" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#2563EB">复杂任务</text>
  <text x="475" y="143" font-family="Segoe UI, sans-serif" font-size="10" fill="#94A3B8">30-40% 流量</text>

  <rect x="530" y="110" width="200" height="55" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="630" y="132" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">gpt-4o</text>
  <text x="630" y="152" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle">高质量推理</text>

  <!-- Merge arrow -->
  <line x1="730" y1="57" x2="790" y2="90" stroke="#059669" stroke-width="1.5"/>
  <line x1="730" y1="137" x2="790" y2="100" stroke="#2563EB" stroke-width="1.5"/>

  <rect x="790" y="70" width="140" height="50" rx="10" fill="#FFF" stroke="#10B981" stroke-width="2"/>
  <text x="860" y="93" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">统一响应</text>
  <text x="860" y="110" font-family="Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">用户无感知</text>

  <!-- Cost comparison section -->
  <rect x="30" y="190" width="900" height="130" rx="10" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="480" y="215" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">优化前后对比</text>

  <!-- Before -->
  <rect x="60" y="230" width="380" height="75" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="250" y="252" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#991B1B" text-anchor="middle">优化前</text>
  <text x="80" y="272" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">所有请求 → gpt-4o</text>
  <text x="80" y="292" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">每请求 ¥0.32 · 月成本 ¥120,000</text>
  <text x="340" y="292" font-family="Segoe UI, sans-serif" font-size="11" fill="#DC2626">gpt-4o: 90%</text>

  <!-- After -->
  <rect x="480" y="230" width="420" height="75" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="690" y="252" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">优化后</text>
  <text x="500" y="272" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">智能路由: 60% → mini / 40% → full</text>
  <text x="500" y="292" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">每请求 ¥0.12 · 月成本 ¥43,000</text>
  <text x="790" y="292" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">节省 64%</text>

  <!-- Strategy priority section -->
  <rect x="30" y="340" width="900" height="145" rx="10" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="480" y="365" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">优化策略优先级排序</text>

  <!-- Strategy bars -->
  <rect x="60" y="382" width="380" height="22" rx="4" fill="#D1FAE5"/>
  <text x="70" y="398" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#065F46">1. 模型路由 (低成本)</text>
  <text x="350" y="398" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#065F46">-40~60%</text>

  <rect x="60" y="408" width="280" height="22" rx="4" fill="#D1FAE5"/>
  <text x="70" y="424" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#065F46">2. Prompt 压缩 (低成本)</text>
  <text x="260" y="424" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#065F46">-15~30%</text>

  <rect x="60" y="434" width="180" height="22" rx="4" fill="#FEF3C7"/>
  <text x="70" y="450" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#92400E">3. 每请求限制 (防极端)</text>
  <text x="185" y="450" font-family="Segoe UI, sans-serif" font-size="10" fill="#92400E">安全网</text>

  <rect x="60" y="460" width="220" height="22" rx="4" fill="#FEF3C7"/>
  <text x="70" y="476" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#92400E">4. 规则前置 (中成本)</text>
  <text x="225" y="476" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#92400E">-10~30%</text>

  <!-- Right side: key insight -->
  <rect x="500" y="382" width="400" height="95" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="700" y="405" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8" text-anchor="middle">核心洞察</text>
  <text x="520" y="428" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">模型路由 + Prompt 压缩 两项低成本优化</text>
  <text x="520" y="448" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">可覆盖 50-70% 的成本节省空间</text>
  <text x="520" y="468" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8">不要为了省钱牺牲核心体验</text>
</svg>