<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/></marker>
  </defs>
  <rect width="960" height="520" fill="#F8FAFC" rx="12"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Ink 六层渲染架构</text>
  <text x="480" y="62" text-anchor="middle" font-size="12" fill="#64748B">从 React 组件树到终端 stdout 的完整渲染管线</text>

  <!-- Layer 6: Components -->
  <rect x="200" y="80" width="560" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="104" font-size="14" font-weight="700" fill="#1E40AF">1. Components 组件层</text>
  <text x="230" y="122" font-size="10" fill="#3B82F6">App.tsx | Box.tsx (21KB) | Text.tsx (17KB) | ScrollBox.tsx (32KB) | Button.tsx | Link.tsx ... 18+ 组件</text>

  <line x1="480" y1="132" x2="480" y2="158" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="148" font-size="9" fill="#64748B">React Fiber Tree</text>

  <!-- Layer 5: Reconciler -->
  <rect x="200" y="162" width="560" height="52" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="186" font-size="14" font-weight="700" fill="#92400E">2. Reconciler 协调器</text>
  <text x="230" y="204" font-size="10" fill="#B45309">reconciler.ts (514行) — createInstance / appendChild / commitUpdate ... 20+ 接口</text>

  <line x1="480" y1="214" x2="480" y2="240" stroke="#D97706" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="230" font-size="9" fill="#64748B">更新 → DOM Tree</text>

  <!-- Layer 4: Yoga Layout -->
  <rect x="200" y="244" width="560" height="52" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="268" font-size="14" font-weight="700" fill="#065F46">3. Layout Engine 布局引擎</text>
  <text x="230" y="286" font-size="10" fill="#047857">Yoga Layout (Facebook C++ 原生实现) — Flexbox 计算每个组件的 x/y/width/height</text>

  <line x1="480" y1="296" x2="480" y2="322" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="312" font-size="9" fill="#64748B">绝对坐标 → 字符网格</text>

  <!-- Layer 3: Screen Buffer -->
  <rect x="200" y="326" width="560" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="350" font-size="14" font-weight="700" fill="#1E40AF">4. Screen Buffer 屏幕缓冲</text>
  <text x="230" y="368" font-size="10" fill="#3B82F6">screen.ts (50KB / 1427行) — CharPool + StylePool + HyperlinkPool 三层池化</text>

  <line x1="480" y1="378" x2="480" y2="404" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="394" font-size="9" fill="#64748B">增量diff → Patch[]</text>

  <!-- Layer 2: Output -->
  <rect x="200" y="408" width="560" height="52" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="432" font-size="14" font-weight="700" fill="#92400E">5. Output Pipeline 输出管道</text>
  <text x="230" y="450" font-size="10" fill="#B45309">output.ts (26KB) — render-node-to-output.ts (64KB) → ANSI escape sequences</text>

  <line x1="480" y1="460" x2="480" y2="484" stroke="#D97706" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="476" font-size="9" fill="#64748B">stdout 写入</text>

  <!-- Layer 1: Input -->
  <rect x="200" y="358" width="30" height="120" rx="4" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="170" y="365" font-size="9" fill="#991B1B" transform="rotate(-90,170,365)"/>

  <rect x="235" y="488" width="490" height="22" rx="4" fill="#F1F5F9"/>
  <text x="480" y="503" text-anchor="middle" font-size="9" fill="#64748B">每帧增量diff输出 vs 全屏重绘 — 60fps按需触发 + Alt Screen切换 + 光标隐藏</text>

  <!-- Legend -->
  <rect x="40" y="80" width="130" height="160" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="105" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">渲染管线</text>
  <text x="105" y="120" text-anchor="middle" font-size="9" fill="#64748B">React State</text>
  <text x="105" y="135" text-anchor="middle" font-size="9" fill="#64748B">↓ Change</text>
  <text x="105" y="155" text-anchor="middle" font-size="9" fill="#64748B">Fiber Tree</text>
  <text x="105" y="170" text-anchor="middle" font-size="9" fill="#64748B">→ Diff</text>
  <text x="105" y="190" text-anchor="middle" font-size="9" fill="#64748B">DOM Tree</text>
  <text x="105" y="205" text-anchor="middle" font-size="9" fill="#64748B">→ Layout</text>
  <text x="105" y="225" text-anchor="middle" font-size="9" fill="#64748B">Cell Grid</text>
  <text x="105" y="235" text-anchor="middle" font-size="9" fill="#64748B">→ stdout</text>
</svg>
