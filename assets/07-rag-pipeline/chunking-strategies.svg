  <rect x="315" y="166" width="130" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="178" width="80" height="8" rx="2" fill="#FCA5A5"/>

  <!-- Chunk 2 with overlap -->
  <rect x="305" y="200" width="180" height="85" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="395" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">Chunk 2</text>
  <rect x="315" y="225" width="80" height="8" rx="2" fill="#FCA5A5"/>
  <rect x="315" y="237" width="155" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="249" width="140" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="261" width="150" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="273" width="60" height="8" rx="2" fill="#FCA5A5"/>

  <!-- Chunk 3 -->
  <rect x="305" y="295" width="180" height="85" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="395" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">Chunk 3</text>
  <rect x="315" y="320" width="60" height="8" rx="2" fill="#FCA5A5"/>
  <rect x="315" y="332" width="155" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="344" width="140" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="356" width="150" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="315" y="368" width="100" height="8" rx="2" fill="#BFDBFE"/>

  <!-- Labels -->
  <text x="395" y="405" text-anchor="middle" font-size="11" fill="#64748B">按固定字符数/token 数切</text>
  <text x="395" y="425" text-anchor="middle" font-size="11" fill="#DC2626">⚠ 可能切断句子语义</text>
  <text x="395" y="445" text-anchor="middle" font-size="11" fill="#64748B">适合快速原型</text>
  <text x="395" y="465" text-anchor="middle" font-size="11" fill="#64748B">重叠部分防止切断上下文</text>

  <!-- ===================== Semantic ===================== -->
  <rect x="520" y="55" width="210" height="440" rx="10" fill="white" stroke="#BBF7D0" stroke-width="1.5" filter="url(#s)"/>
  <rect x="520" y="55" width="210" height="38" rx="10" fill="#DCFCE7"/>
  <rect x="520" y="83" width="210" height="10" fill="#DCFCE7"/>
  <text x="625" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803D">语义边界切分</text>

  <!-- Chunk 1: First paragraph -->
  <rect x="535" y="105" width="180" height="72" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="625" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">Chunk 1（段落 1）</text>
  <rect x="545" y="130" width="155" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="142" width="140" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="154" width="150" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="166" width="130" height="8" rx="2" fill="#BBF7D0"/>

  <!-- Chunk 2: Second paragraph -->
  <rect x="535" y="187" width="180" height="72" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="625" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">Chunk 2（段落 2）</text>
  <rect x="545" y="212" width="155" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="224" width="140" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="236" width="150" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="248" width="130" height="8" rx="2" fill="#BBF7D0"/>

  <!-- Chunk 3: Section heading + paragraph -->
  <rect x="535" y="269" width="180" height="72" rx="6" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1"/>
  <text x="625" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">Chunk 3（章节 + 段落）</text>
  <rect x="545" y="294" width="100" height="10" rx="2" fill="#86EFAC"/>
  <rect x="545" y="310" width="155" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="322" width="140" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="334" width="150" height="8" rx="2" fill="#BBF7D0"/>

  <!-- Chunk 4 -->
  <rect x="535" y="351" width="180" height="55" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="625" y="369" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">Chunk 4（段落 4）</text>
  <rect x="545" y="376" width="155" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="388" width="140" height="8" rx="2" fill="#BBF7D0"/>
  <rect x="545" y="400" width="100" height="8" rx="2" fill="#BBF7D0"/>

  <text x="625" y="425" text-anchor="middle" font-size="11" fill="#64748B">按段落/标题等语义边界切</text>
  <text x="625" y="445" text-anchor="middle" font-size="11" fill="#15803D">✓ 语义完整，不切断句子</text>
  <text x="625" y="465" text-anchor="middle" font-size="11" fill="#64748B">适合生产系统</text>

  <!-- ===================== Recursive ===================== -->
  <rect x="750" y="55" width="190" height="440" rx="10" fill="white" stroke="#E9D5FF" stroke-width="1.5" filter="url(#s)"/>
  <rect x="750" y="55" width="190" height="38" rx="10" fill="#F3E8FF"/>
  <rect x="750" y="83" width="190" height="10" fill="#F3E8FF"/>
  <text x="845" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#7C3AED">递归切分</text>

  <!-- Step explanation -->
  <rect x="765" y="105" width="160" height="50" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="845" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">第一层：\n\n</text>
  <text x="845" y="140" text-anchor="middle" font-size="10" fill="#64748B">先尝试按大边界切</text>

  <text x="845" y="175" text-anchor="middle" font-size="18" fill="#A78BFA">↓</text>

  <rect x="765" y="190" width="160" height="50" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="845" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">第二层：\n</text>
  <text x="845" y="225" text-anchor="middle" font-size="10" fill="#64748B">太大 → 按 \n 切</text>

  <text x="845" y="260" text-anchor="middle" font-size="18" fill="#A78BFA">↓</text>

  <rect x="765" y="275" width="160" height="50" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="845" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">第三层：。！？</text>
  <text x="845" y="310" text-anchor="middle" font-size="10" fill="#64748B">仍太大 → 按句子切</text>

  <text x="845" y="345" text-anchor="middle" font-size="18" fill="#A78BFA">↓</text>

  <rect x="765" y="360" width="160" height="50" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="845" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">最终：空格/字符</text>
  <text x="845" y="395" text-anchor="middle" font-size="10" fill="#64748B">兜底按字符切分</text>

  <text x="845" y="430" text-anchor="middle" font-size="11" fill="#7C3AED">✓ LangChain 默认策略</text>
  <text x="845" y="450" text-anchor="middle" font-size="11" fill="#64748B">兼顾粒度和完整性</text>
  <text x="845" y="470" text-anchor="middle" font-size="11" fill="#64748B">适合通用场景</text>

</svg>