  <text x="395" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">固定长度切分</text>

  <!-- Chunk 1 -->
  <rect x="305" y="105" width="180" height="85" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="395" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">Chunk 1</text>
  <rect x="315" y="130" width="155" height="8" rx="2" fill="#BFDBFE"/>
