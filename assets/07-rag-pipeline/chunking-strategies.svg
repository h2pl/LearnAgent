  <!-- ===================== Fixed Length ===================== -->
  <rect x="290" y="55" width="210" height="440" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5" filter="url(#s)"/>
  <rect x="290" y="55" width="210" height="38" rx="10" fill="#DBEAFE"/>
