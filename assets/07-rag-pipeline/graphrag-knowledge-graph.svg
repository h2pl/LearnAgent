<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="kgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f4ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrowProposed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrowRejected" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowCaused" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGeneric" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDecision" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="16" fill="url(#kgBg)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Knowledge Graph: Meeting Decision Chain</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">Entity-Relationship Visualization from Meeting Minutes</text>

  <!-- Legend -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="840" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="30" cy="20" r="8" fill="#6366f1"/>
    <text x="45" y="24" font-size="11" fill="#475569">Person</text>
    <circle cx="120" cy="20" r="8" fill="#8b5cf6"/>
    <text x="135" y="24" font-size="11" fill="#475569">Proposal</text>
    <circle cx="225" cy="20" r="8" fill="#ef4444"/>
    <text x="240" y="24" font-size="11" fill="#475569">Issue</text>
    <circle cx="310" cy="20" r="8" fill="#f59e0b"/>
    <text x="325" y="24" font-size="11" fill="#475569">Decision</text>
    <circle cx="410" cy="20" r="8" fill="#10b981"/>
    <text x="425" y="24" font-size="11" fill="#475569">Product</text>

    <line x1="510" y1="20" x2="545" y2="20" stroke="#6366f1" stroke-width="2"/>
    <text x="552" y="24" font-size="11" fill="#475569">proposed</text>
    <line x1="630" y1="20" x2="665" y2="20" stroke="#ef4444" stroke-width="2"/>
    <text x="672" y="24" font-size="11" fill="#475569">rejected</text>
    <line x1="740" y1="20" x2="775" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <text x="782" y="24" font-size="11" fill="#475569">caused</text>
  </g>

  <!-- ==================== EDGES (drawn first, behind nodes) ==================== -->

  <!-- 张三 -> proposed -> pt-osc方案 -->
  <path d="M 180 210 C 240 180, 300 175, 370 190" fill="none" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowProposed)"/>
  <rect x="230" y="165" width="80" height="20" rx="4" fill="white" stroke="#6366f1" stroke-width="0.5" opacity="0.95"/>
  <text x="270" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">proposed</text>

  <!-- 李四 -> rejected -> pt-osc方案 -->
  <path d="M 180 340 C 240 310, 310 260, 380 220" fill="none" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRejected)"/>
  <rect x="235" y="265" width="72" height="20" rx="4" fill="white" stroke="#ef4444" stroke-width="0.5" opacity="0.95"/>
  <text x="271" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">rejected</text>

  <!-- 李四 -> proposed -> pg_dump方案 -->
  <path d="M 180 370 C 260 390, 340 400, 390 395" fill="none" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowProposed)"/>
  <rect x="250" y="380" width="80" height="20" rx="4" fill="white" stroke="#6366f1" stroke-width="0.5" opacity="0.95"/>
  <text x="290" y="394" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">proposed</text>

  <!-- 王五 -> tested -> pg_dump方案 -->
  <path d="M 180 480 C 260 470, 340 440, 400 410" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGeneric)"/>
  <rect x="260" y="440" width="60" height="20" rx="4" fill="white" stroke="#94a3b8" stroke-width="0.5" opacity="0.95"/>
  <text x="290" y="454" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">tested</text>

  <!-- pg_dump方案 -> caused -> 精度丢失问题 -->
  <path d="M 500 395 C 540 395, 570 400, 600 410" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowCaused)"/>
  <rect x="530" y="383" width="60" height="20" rx="4" fill="white" stroke="#f59e0b" stroke-width="0.5" opacity="0.95"/>
  <text x="560" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">caused</text>

  <!-- 精度丢失问题 -> led_to -> 暂停迁移 -->
  <path d="M 700 440 C 720 460, 730 480, 720 490" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowCaused)"/>
  <rect x="725" y="455" width="56" height="20" rx="4" fill="white" stroke="#f59e0b" stroke-width="0.5" opacity="0.95"/>
  <text x="753" y="469" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">led_to</text>

  <!-- 暂停迁移 -> waiting_for -> MySQL 9.0 -->
  <path d="M 760 510 C 790 500, 820 480, 830 460" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowDecision)"/>
  <rect x="780" y="480" width="88" height="20" rx="4" fill="white" stroke="#10b981" stroke-width="0.5" opacity="0.95"/>
  <text x="824" y="494" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">waiting_for</text>

  <!-- ==================== NODES ==================== -->

  <!-- 张三 (Person) -->
  <g filter="url(#nodeShadow)">
    <circle cx="140" cy="210" r="40" fill="white" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="140" cy="198" r="10" fill="#6366f1" opacity="0.2"/>
    <text x="140" y="203" text-anchor="middle" font-size="12">&#x1F464;</text>
    <text x="140" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">张三</text>
    <text x="140" y="237" text-anchor="middle" font-size="9" fill="#64748b">后端负责人</text>
  </g>

  <!-- 李四 (Person) -->
  <g filter="url(#nodeShadow)">
    <circle cx="140" cy="350" r="40" fill="white" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="140" cy="338" r="10" fill="#6366f1" opacity="0.2"/>
    <text x="140" y="343" text-anchor="middle" font-size="12">&#x1F464;</text>
    <text x="140" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">李四</text>
    <text x="140" y="377" text-anchor="middle" font-size="9" fill="#64748b">架构师</text>
  </g>

  <!-- 王五 (Person) -->
  <g filter="url(#nodeShadow)">
    <circle cx="140" cy="480" r="36" fill="white" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="140" cy="468" r="10" fill="#6366f1" opacity="0.2"/>
    <text x="140" y="473" text-anchor="middle" font-size="12">&#x1F464;</text>
    <text x="140" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">王五</text>
    <text x="140" y="505" text-anchor="middle" font-size="9" fill="#64748b">DBA</text>
  </g>

  <!-- pt-osc方案 (Proposal) -->
  <g filter="url(#nodeShadow)">
    <rect x="370" y="165" width="130" height="55" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="435" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">pt-osc 方案</text>
    <text x="435" y="208" text-anchor="middle" font-size="10" fill="#8b5cf6">Proposal</text>
  </g>

  <!-- pg_dump方案 (Proposal) -->
  <g filter="url(#nodeShadow)">
    <rect x="390" y="370" width="130" height="55" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="455" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">pg_dump 方案</text>
    <text x="455" y="413" text-anchor="middle" font-size="10" fill="#8b5cf6">Proposal</text>
  </g>

  <!-- 精度丢失问题 (Issue) -->
  <g filter="url(#nodeShadow)">
    <rect x="600" y="400" width="130" height="55" rx="12" fill="white" stroke="#ef4444" stroke-width="2.5"/>
    <text x="665" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">精度丢失</text>
    <text x="665" y="442" text-anchor="middle" font-size="10" fill="#ef4444">Issue: 5%</text>
  </g>

  <!-- 暂停迁移 (Decision) -->
  <g filter="url(#nodeShadow)">
    <rect x="660" y="490" width="120" height="50" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="720" y="513" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">暂停迁移</text>
    <text x="720" y="530" text-anchor="middle" font-size="10" fill="#d97706">Decision</text>
  </g>

  <!-- MySQL 9.0 (Product) -->
  <g filter="url(#nodeShadow)">
    <rect x="790" y="420" width="90" height="50" rx="12" fill="white" stroke="#10b981" stroke-width="2.5"/>
    <text x="835" y="443" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">MySQL 9.0</text>
    <text x="835" y="460" text-anchor="middle" font-size="10" fill="#10b981">Product</text>
  </g>

  <!-- Causal chain highlight -->
  <path d="M 455 425 Q 560 460, 665 425 Q 720 475, 720 490" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="580" y="530" text-anchor="middle" font-size="11" fill="#b45309" font-style="italic" font-weight="600">Causal Chain: pg_dump &#8594; precision loss &#8594; pause migration</text>
</svg>
