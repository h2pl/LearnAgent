<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">RAG 系统完整架构</text>

  <!-- ===== 上半部分：索引阶段 (离线) ===== -->
  <rect x="10" y="38" width="660" height="118" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="24" y="58" font-size="12" font-weight="bold" fill="#2563EB">索引阶段（离线）</text>

  <!-- 文档 -->
  <rect x="24" y="70" width="90" height="34" rx="6" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="69" y="91" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="bold">原始文档</text>

  <!-- 箭头 -->
  <line x1="114" y1="87" x2="140" y2="87" stroke="#2563EB" stroke-width="1" marker-end="url(#arr-b)"/>

  <!-- 解析 -->
  <rect x="143" y="70" width="100" height="34" rx="6" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="193" y="82" text-anchor="middle" font-size="10" fill="#1E40AF">文档解析</text>
  <text x="193" y="95" text-anchor="middle" font-size="8" fill="#64748B">PDF/Word/HTML→纯文本</text>

  <!-- 箭头 -->
  <line x1="243" y1="87" x2="269" y2="87" stroke="#2563EB" stroke-width="1" marker-end="url(#arr-b)"/>

  <!-- 切分 -->
  <rect x="272" y="70" width="100" height="34" rx="6" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="322" y="82" text-anchor="middle" font-size="10" fill="#1E40AF">文档切分</text>
  <text x="322" y="95" text-anchor="middle" font-size="8" fill="#64748B">Chunk (300~500 token)</text>

  <!-- 箭头 -->
  <line x1="372" y1="87" x2="398" y2="87" stroke="#2563EB" stroke-width="1" marker-end="url(#arr-b)"/>

  <!-- 向量化 -->
  <rect x="401" y="70" width="100" height="34" rx="6" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="451" y="82" text-anchor="middle" font-size="10" fill="#1E40AF">向量化</text>
  <text x="451" y="95" text-anchor="middle" font-size="8" fill="#64748B">Embedding Model</text>

  <!-- 箭头 -->
  <line x1="501" y1="87" x2="527" y2="87" stroke="#2563EB" stroke-width="1" marker-end="url(#arr-b)"/>

  <!-- 向量数据库 -->
  <rect x="530" y="70" width="130" height="34" rx="6" fill="#BFDBFE" stroke="#60A5FA"/>
  <text x="595" y="82" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="bold">向量数据库</text>
  <text x="595" y="95" text-anchor="middle" font-size="8" fill="#64748B">Chroma / Milvus / Pinecone</text>

  <!-- 索引导出线 -->
  <line x1="595" y1="104" x2="595" y2="170" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="140" font-size="9" fill="#2563EB">索引就绪</text>

  <!-- ===== 下半部分：检索+生成阶段 (在线) ===== -->
  <rect x="10" y="165" width="660" height="228" rx="8" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="24" y="188" font-size="12" font-weight="bold" fill="#059669">检索 + 生成阶段（在线）</text>

  <!-- 用户问题 -->
  <rect x="24" y="200" width="100" height="34" rx="6" fill="#6EE7B7" stroke="#34D399"/>
  <text x="74" y="216" text-anchor="middle" font-size="10" fill="#047857" font-weight="bold">用户提问</text>
  <text x="74" y="229" text-anchor="middle" font-size="8" fill="#047857">"怎么退货？"</text>

  <!-- 箭头 -->
  <line x1="124" y1="217" x2="155" y2="217" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>

  <!-- 查询改写 -->
  <rect x="158" y="200" width="90" height="34" rx="6" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="203" y="212" text-anchor="middle" font-size="10" fill="#047857">查询改写</text>
  <text x="203" y="225" text-anchor="middle" font-size="8" fill="#64748B">(可选)LLM优化</text>

  <!-- 箭头 -->
  <line x1="248" y1="217" x2="279" y2="217" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>

  <!-- 向量化查询 -->
  <rect x="282" y="200" width="90" height="34" rx="6" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="327" y="212" text-anchor="middle" font-size="10" fill="#047857">查询向量化</text>
  <text x="327" y="225" text-anchor="middle" font-size="8" fill="#64748B">同一模型</text>

  <!-- 箭头转向向量DB -->
  <line x1="372" y1="217" x2="460" y2="217" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>

  <!-- 检索 -->
  <rect x="463" y="200" width="90" height="34" rx="6" fill="#059669"/>
  <text x="508" y="212" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">相似度检索</text>
  <text x="508" y="225" text-anchor="middle" font-size="8" fill="#D1FAE5">Cosine Top-K</text>

  <!-- 箭头向上到向量DB -->
  <line x1="508" y1="200" x2="508" y2="178" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- 箭头 -->
  <line x1="553" y1="217" x2="580" y2="217" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>

  <!-- 重排序 -->
  <rect x="583" y="200" width="77" height="34" rx="6" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="622" y="212" text-anchor="middle" font-size="10" fill="#92400E">Reranker</text>
  <text x="622" y="225" text-anchor="middle" font-size="8" fill="#D97706">二次精排</text>

  <!-- 箭头向下 -->
  <line x1="622" y1="234" x2="622" y2="258" stroke="#DC2626" stroke-width="1" marker-end="url(#arr-r)"/>

  <!-- 构造Prompt + LLM生成 -->
  <rect x="460" y="260" width="190" height="45" rx="8" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="555" y="280" text-anchor="middle" font-size="11" fill="#B91C1C" font-weight="bold">构造 Prompt + LLM 生成</text>
  <text x="555" y="297" text-anchor="middle" font-size="9" fill="#475569">问题 + 检索结果 → 引用来源回答</text>

  <!-- 箭头 -->
  <line x1="555" y1="305" x2="555" y2="330" stroke="#DC2626" stroke-width="1" marker-end="url(#arr-r)"/>

  <!-- 答案 -->
  <rect x="460" y="333" width="190" height="34" rx="6" fill="#FCA5A5" stroke="#F87171"/>
  <text x="555" y="350" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">输出答案 + 来源引用</text>
  <text x="555" y="363" text-anchor="middle" font-size="8" fill="#FEE2E2">"根据第3页，退货流程为..."</text>

  <!-- 评测反馈 (左下环形) -->
  <rect x="24" y="290" width="200" height="55" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="124" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">评测与反馈循环</text>
  <text x="124" y="325" text-anchor="middle" font-size="9" fill="#64748B">检索：Recall@K / MRR</text>
  <text x="124" y="340" text-anchor="middle" font-size="9" fill="#64748B">生成：Faithfulness / Relevancy</text>

  <!-- 图注 -->
  <text x="340" y="394" text-anchor="middle" font-size="11" fill="#94A3B8">图：离线索引 + 在线检索——文档到答案的端到端 RAG 架构</text>
</svg>
