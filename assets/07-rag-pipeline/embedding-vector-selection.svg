<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="background:#fff;font-family:sans-serif">
  <!-- 标题 -->
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">Embedding 模型与向量数据库选型指南</text>

  <!-- ===== Embedding 模型对比 ===== -->
  <rect x="14" y="40" width="392" height="26" rx="6" fill="#2563EB"/>
  <text x="210" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Embedding 模型对比</text>

  <!-- 表头 -->
  <rect x="14" y="70" width="100" height="22" rx="3" fill="#EFF6FF"/>
  <text x="64" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">模型名称</text>
  <rect x="114" y="70" width="60" height="22" rx="3" fill="#EFF6FF"/>
  <text x="144" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">维度</text>
  <rect x="174" y="70" width="80" height="22" rx="3" fill="#EFF6FF"/>
  <text x="214" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">语言</text>
  <rect x="254" y="70" width="75" height="22" rx="3" fill="#EFF6FF"/>
  <text x="291" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">开源</text>
  <rect x="329" y="70" width="77" height="22" rx="3" fill="#EFF6FF"/>
  <text x="367" y="85" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">推荐场景</text>

  <!-- 行1: OpenAI small -->
  <rect x="14" y="94" width="100" height="22" rx="3" fill="#F8FAFC"/>
  <text x="64" y="109" text-anchor="middle" font-size="9" fill="#1E293B">text-emb-3-small</text>
  <rect x="114" y="94" width="60" height="22" rx="3" fill="#D1FAE5"/>
  <text x="144" y="109" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">1536</text>
  <rect x="174" y="94" width="80" height="22" rx="3" fill="#F8FAFC"/>
  <text x="214" y="109" text-anchor="middle" font-size="9" fill="#475569">多语言</text>
  <rect x="254" y="94" width="75" height="22" rx="3" fill="#FEE2E2"/>
  <text x="291" y="109" text-anchor="middle" font-size="9" fill="#B91C1C">✗</text>
  <rect x="329" y="94" width="77" height="22" rx="3" fill="#F8FAFC"/>
  <text x="367" y="109" text-anchor="middle" font-size="9" fill="#475569">通用·性价比</text>

  <!-- 行2: OpenAI large -->
  <rect x="14" y="118" width="100" height="22" rx="3" fill="#F8FAFC"/>
  <text x="64" y="133" text-anchor="middle" font-size="9" fill="#1E293B">text-emb-3-large</text>
  <rect x="114" y="118" width="60" height="22" rx="3" fill="#FEF3C7"/>
  <text x="144" y="133" text-anchor="middle" font-size="9" fill="#92400E" font-weight="bold">3072</text>
  <rect x="174" y="118" width="80" height="22" rx="3" fill="#F8FAFC"/>
  <text x="214" y="133" text-anchor="middle" font-size="9" fill="#475569">多语言</text>
  <rect x="254" y="118" width="75" height="22" rx="3" fill="#FEE2E2"/>
  <text x="291" y="133" text-anchor="middle" font-size="9" fill="#B91C1C">✗</text>
  <rect x="329" y="118" width="77" height="22" rx="3" fill="#F8FAFC"/>
  <text x="367" y="133" text-anchor="middle" font-size="9" fill="#475569">高精度·多语言</text>

  <!-- 行3: BGE -->
  <rect x="14" y="142" width="100" height="22" rx="3" fill="#F8FAFC"/>
  <text x="64" y="157" text-anchor="middle" font-size="9" fill="#1E293B">BGE-large-zh</text>
  <rect x="114" y="142" width="60" height="22" rx="3" fill="#D1FAE5"/>
  <text x="144" y="157" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">1024</text>
  <rect x="174" y="142" width="80" height="22" rx="3" fill="#F8FAFC"/>
  <text x="214" y="157" text-anchor="middle" font-size="9" fill="#475569">中文优化</text>
  <rect x="254" y="142" width="75" height="22" rx="3" fill="#D1FAE5"/>
  <text x="291" y="157" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">✓</text>
  <rect x="329" y="142" width="77" height="22" rx="3" fill="#F8FAFC"/>
  <text x="367" y="157" text-anchor="middle" font-size="9" fill="#475569">中文·免费</text>

  <!-- 行4: Jina -->
  <rect x="14" y="166" width="100" height="22" rx="3" fill="#F8FAFC"/>
  <text x="64" y="181" text-anchor="middle" font-size="9" fill="#1E293B">Jina Embed v3</text>
  <rect x="114" y="166" width="60" height="22" rx="3" fill="#D1FAE5"/>
  <text x="144" y="181" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">1024</text>
  <rect x="174" y="166" width="80" height="22" rx="3" fill="#F8FAFC"/>
  <text x="214" y="181" text-anchor="middle" font-size="9" fill="#475569">多语言</text>
  <rect x="254" y="166" width="75" height="22" rx="3" fill="#D1FAE5"/>
  <text x="291" y="181" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">✓</text>
  <rect x="329" y="166" width="77" height="22" rx="3" fill="#F8FAFC"/>
  <text x="367" y="181" text-anchor="middle" font-size="9" fill="#475569">长文本·多语言</text>

  <!-- ===== 向量数据库对比 ===== -->
  <rect x="14" y="202" width="392" height="26" rx="6" fill="#059669"/>
  <text x="210" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">向量数据库对比</text>

  <!-- 表头 -->
  <rect x="14" y="232" width="85" height="22" rx="3" fill="#D1FAE5"/>
  <text x="56" y="247" text-anchor="middle" font-size="10" font-weight="bold" fill="#047857">数据库</text>
  <rect x="99" y="232" width="75" height="22" rx="3" fill="#D1FAE5"/>
  <text x="136" y="247" text-anchor="middle" font-size="10" font-weight="bold" fill="#047857">类型</text>
  <rect x="174" y="232" width="110" height="22" rx="3" fill="#D1FAE5"/>
  <text x="229" y="247" text-anchor="middle" font-size="10" font-weight="bold" fill="#047857">特点</text>
  <rect x="284" y="232" width="122" height="22" rx="3" fill="#D1FAE5"/>
  <text x="345" y="247" text-anchor="middle" font-size="10" font-weight="bold" fill="#047857">推荐场景</text>

  <!-- Chroma -->
  <rect x="14" y="256" width="85" height="20" rx="3" fill="#F8FAFC"/>
  <text x="56" y="270" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="bold">Chroma</text>
  <rect x="99" y="256" width="75" height="20" rx="3" fill="#F8FAFC"/>
  <text x="136" y="270" text-anchor="middle" font-size="9" fill="#475569">嵌入式</text>
  <rect x="174" y="256" width="110" height="20" rx="3" fill="#F8FAFC"/>
  <text x="229" y="270" text-anchor="middle" font-size="9" fill="#475569">轻量·零配置</text>
  <rect x="284" y="256" width="122" height="20" rx="3" fill="#D1FAE5"/>
  <text x="345" y="270" text-anchor="middle" font-size="9" fill="#047857">原型开发</text>

  <!-- Qdrant -->
  <rect x="14" y="278" width="85" height="20" rx="3" fill="#F8FAFC"/>
  <text x="56" y="292" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="bold">Qdrant</text>
  <rect x="99" y="278" width="75" height="20" rx="3" fill="#F8FAFC"/>
  <text x="136" y="292" text-anchor="middle" font-size="9" fill="#475569">独立服务</text>
  <rect x="174" y="278" width="110" height="20" rx="3" fill="#F8FAFC"/>
  <text x="229" y="292" text-anchor="middle" font-size="9" fill="#475569">高性能·丰富功能</text>
  <rect x="284" y="278" width="122" height="20" rx="3" fill="#FEF3C7"/>
  <text x="345" y="292" text-anchor="middle" font-size="9" fill="#92400E">小型生产</text>

  <!-- Milvus -->
  <rect x="14" y="300" width="85" height="20" rx="3" fill="#F8FAFC"/>
  <text x="56" y="314" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="bold">Milvus</text>
  <rect x="99" y="300" width="75" height="20" rx="3" fill="#F8FAFC"/>
  <text x="136" y="314" text-anchor="middle" font-size="9" fill="#475569">分布式</text>
  <rect x="174" y="300" width="110" height="20" rx="3" fill="#F8FAFC"/>
  <text x="229" y="314" text-anchor="middle" font-size="9" fill="#475569">高可用·可扩展</text>
  <rect x="284" y="300" width="122" height="20" rx="3" fill="#FEE2E2"/>
  <text x="345" y="314" text-anchor="middle" font-size="9" fill="#B91C1C">大规模·企业级</text>

  <!-- Pinecone -->
  <rect x="14" y="322" width="85" height="20" rx="3" fill="#F8FAFC"/>
  <text x="56" y="336" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="bold">Pinecone</text>
  <rect x="99" y="322" width="75" height="20" rx="3" fill="#F8FAFC"/>
  <text x="136" y="336" text-anchor="middle" font-size="9" fill="#475569">云托管</text>
  <rect x="174" y="322" width="110" height="20" rx="3" fill="#F8FAFC"/>
  <text x="229" y="336" text-anchor="middle" font-size="9" fill="#475569">免运维·开箱即用</text>
  <rect x="284" y="322" width="122" height="20" rx="3" fill="#FEE2E2"/>
  <text x="345" y="336" text-anchor="middle" font-size="9" fill="#B91C1C">不想自己运维</text>

  <!-- pgvector -->
  <rect x="14" y="344" width="85" height="20" rx="3" fill="#F8FAFC"/>
  <text x="56" y="358" text-anchor="middle" font-size="9" fill="#1E293B" font-weight="bold">pgvector</text>
  <rect x="99" y="344" width="75" height="20" rx="3" fill="#F8FAFC"/>
  <text x="136" y="358" text-anchor="middle" font-size="9" fill="#475569">PG 插件</text>
  <rect x="174" y="344" width="110" height="20" rx="3" fill="#F8FAFC"/>
  <text x="229" y="358" text-anchor="middle" font-size="9" fill="#475569">与PG无缝集成</text>
  <rect x="284" y="344" width="122" height="20" rx="3" fill="#EFF6FF"/>
  <text x="345" y="358" text-anchor="middle" font-size="9" fill="#2563EB">已有PG的团队</text>

  <!-- ===== 右侧选型决策流 ===== -->
  <rect x="424" y="40" width="242" height="346" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="545" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#DC2626">选型决策流程</text>

  <!-- 决策节点1 -->
  <rect x="464" y="78" width="162" height="32" rx="4" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="545" y="98" text-anchor="middle" font-size="10" fill="#1E40AF">中文场景为主？</text>

  <line x1="545" y1="110" x2="545" y2="120" stroke="#2563EB" stroke-width="1"/>
  <text x="565" y="118" font-size="8" fill="#2563EB">是</text>
  <line x1="490" y1="110" x2="475" y2="130" stroke="#059669" stroke-width="1"/>
  <text x="480" y="124" font-size="8" fill="#059669">否</text>

  <rect x="440" y="120" width="105" height="28" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="492" y="139" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">BGE-large-zh</text>

  <rect x="490" y="120" width="130" height="28" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="555" y="139" text-anchor="middle" font-size="9" fill="#047857" font-weight="bold">多语言 →</text>

  <!-- 决策节点2 -->
  <rect x="494" y="155" width="155" height="32" rx="4" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="571" y="175" text-anchor="middle" font-size="10" fill="#1E40AF">有预算限制？</text>

  <line x1="571" y1="187" x2="571" y2="197" stroke="#2563EB" stroke-width="1"/>
  <text x="588" y="194" font-size="8" fill="#2563EB">是</text>
  <line x1="520" y1="187" x2="505" y2="205" stroke="#059669" stroke-width="1"/>
  <text x="508" y="200" font-size="8" fill="#059669">否</text>

  <rect x="526" y="198" width="90" height="28" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="571" y="217" text-anchor="middle" font-size="9" fill="#92400E" font-weight="bold">Jina v3/BGE</text>

  <rect x="460" y="205" width="52" height="28" rx="4" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="486" y="224" text-anchor="middle" font-size="9" fill="#92400E" font-weight="bold">emb-3-l</text>

  <!-- 向量DB决策 -->
  <text x="545" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">向量数据库选择</text>

  <rect x="454" y="260" width="182" height="28" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="545" y="279" text-anchor="middle" font-size="9" fill="#475569">开发/原型 → Chroma</text>

  <rect x="454" y="293" width="182" height="28" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="545" y="312" text-anchor="middle" font-size="9" fill="#475569">已有PG → pgvector</text>

  <rect x="454" y="326" width="182" height="28" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="545" y="345" text-anchor="middle" font-size="9" fill="#475569">生产级 → Qdrant/Milvus</text>

  <rect x="454" y="359" width="182" height="24" rx="4" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="545" y="376" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="bold">免运维 → Pinecone(付费)</text>

  <!-- 图注 -->
  <text x="340" y="394" text-anchor="middle" font-size="11" fill="#94A3B8">图：Embedding模型与向量数据库特性对比 + 选型决策流程</text>
</svg>
