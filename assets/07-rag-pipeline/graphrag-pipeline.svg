<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="stepGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">GraphRAG Pipeline Architecture</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#64748b">Documents &#8594; Knowledge Graph &#8594; Graph-Enhanced Retrieval</text>

  <!-- Row 1: Steps 1-3 -->
  <!-- Step 1: Chunking -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="40" y="100" width="6" height="80" rx="3" fill="url(#stepGrad1)"/>
    <circle cx="72" cy="130" r="16" fill="url(#stepGrad1)" opacity="0.15"/>
    <text x="72" y="135" text-anchor="middle" font-size="16">&#x1F4C4;</text>
    <text x="98" y="128" font-size="13" font-weight="600" fill="#1e293b">1. Chunking</text>
    <text x="98" y="148" font-size="11" fill="#64748b">Split documents into</text>
    <text x="98" y="164" font-size="11" fill="#64748b">manageable semantic chunks</text>
  </g>

  <!-- Arrow 1->2 -->
  <line x1="280" y1="140" x2="320" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 2: Entity Extraction -->
  <g filter="url(#shadow)">
    <rect x="330" y="100" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="330" y="100" width="6" height="80" rx="3" fill="url(#stepGrad2)"/>
    <circle cx="362" cy="130" r="16" fill="url(#stepGrad2)" opacity="0.15"/>
    <text x="362" y="135" text-anchor="middle" font-size="16">&#x1F50D;</text>
    <text x="388" y="128" font-size="13" font-weight="600" fill="#1e293b">2. Entity Extraction</text>
    <text x="388" y="148" font-size="11" fill="#64748b">LLM identifies: persons,</text>
    <text x="388" y="164" font-size="11" fill="#64748b">orgs, concepts, events</text>
  </g>

  <!-- Arrow 2->3 -->
  <line x1="570" y1="140" x2="610" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 3: Relationship Extraction -->
  <g filter="url(#shadow)">
    <rect x="620" y="100" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="620" y="100" width="6" height="80" rx="3" fill="url(#stepGrad3)"/>
    <circle cx="652" cy="130" r="16" fill="url(#stepGrad3)" opacity="0.15"/>
    <text x="652" y="135" text-anchor="middle" font-size="16">&#x1F517;</text>
    <text x="678" y="128" font-size="13" font-weight="600" fill="#1e293b">3. Relationship Extraction</text>
    <text x="678" y="148" font-size="11" fill="#64748b">LLM determines relation</text>
    <text x="678" y="164" font-size="11" fill="#64748b">types and directions</text>
  </g>

  <!-- Vertical arrow from step 3 down to step 4 -->
  <line x1="740" y1="180" x2="740" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Row 2: Steps 4-6 (right to left) -->
  <!-- Step 4: Graph Construction -->
  <g filter="url(#shadow)">
    <rect x="620" y="240" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="620" y="240" width="6" height="80" rx="3" fill="url(#stepGrad4)"/>
    <circle cx="652" cy="270" r="16" fill="url(#stepGrad4)" opacity="0.15"/>
    <text x="652" y="275" text-anchor="middle" font-size="16">&#x1F578;&#xFE0F;</text>
    <text x="678" y="268" font-size="13" font-weight="600" fill="#1e293b">4. Graph Construction</text>
    <text x="678" y="288" font-size="11" fill="#64748b">Nodes + Edges + Properties</text>
    <text x="678" y="304" font-size="11" fill="#64748b">&#8594; Graph Database (Neo4j)</text>
  </g>

  <!-- Arrow 4->5 -->
  <line x1="620" y1="280" x2="580" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 5: Indexing -->
  <g filter="url(#shadow)">
    <rect x="330" y="240" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="330" y="240" width="6" height="80" rx="3" fill="url(#stepGrad5)"/>
    <circle cx="362" cy="270" r="16" fill="url(#stepGrad5)" opacity="0.15"/>
    <text x="362" y="275" text-anchor="middle" font-size="16">&#x1F4CA;</text>
    <text x="388" y="268" font-size="13" font-weight="600" fill="#1e293b">5. Vector Indexing</text>
    <text x="388" y="288" font-size="11" fill="#64748b">Embed entities &amp; relations</text>
    <text x="388" y="304" font-size="11" fill="#64748b">for semantic search</text>
  </g>

  <!-- Arrow 5->6 -->
  <line x1="330" y1="280" x2="290" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 6: Graph-enhanced Search -->
  <g filter="url(#shadow)">
    <rect x="40" y="240" width="240" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="40" y="240" width="6" height="80" rx="3" fill="url(#stepGrad6)"/>
    <circle cx="72" cy="270" r="16" fill="url(#stepGrad6)" opacity="0.15"/>
    <text x="72" y="275" text-anchor="middle" font-size="16">&#x1F3AF;</text>
    <text x="98" y="268" font-size="13" font-weight="600" fill="#1e293b">6. Graph-Enhanced Search</text>
    <text x="98" y="288" font-size="11" fill="#64748b">Vector similarity + graph</text>
    <text x="98" y="304" font-size="11" fill="#64748b">traversal &#8594; ranked results</text>
  </g>

  <!-- Query section at bottom -->
  <g filter="url(#shadow)">
    <rect x="120" y="370" width="660" height="120" rx="14" fill="white" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="450" y="398" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">Retrieval: Hybrid Query Processing</text>

    <!-- Three columns inside -->
    <rect x="145" y="415" width="180" height="55" rx="8" fill="#eef2ff"/>
    <text x="235" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Vector Similarity</text>
    <text x="235" y="456" text-anchor="middle" font-size="10" fill="#6366f1">Semantic matching</text>

    <rect x="360" y="415" width="180" height="55" rx="8" fill="#f0fdf4"/>
    <text x="450" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Graph Traversal</text>
    <text x="450" y="456" text-anchor="middle" font-size="10" fill="#16a34a">1-hop / 2-hop / multi-hop</text>

    <rect x="575" y="415" width="180" height="55" rx="8" fill="#fef3c7"/>
    <text x="665" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Combined Ranking</text>
    <text x="665" y="456" text-anchor="middle" font-size="10" fill="#d97706">Merge &amp; re-rank results</text>

    <!-- Arrows between the three -->
    <line x1="325" y1="442" x2="355" y2="442" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="540" y1="442" x2="570" y2="442" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  </g>

  <!-- Arrow from step 6 down to query section -->
  <path d="M 160 320 L 160 365" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="170" y="350" font-size="10" fill="#6366f1" font-weight="600">Query</text>
</svg>
