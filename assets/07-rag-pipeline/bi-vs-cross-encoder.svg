<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="480" rx="12" fill="#F8FAFC"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">Reranker 原理：Bi-Encoder vs Cross-Encoder</text>

  <!-- ===================== LEFT: Bi-Encoder ===================== -->
  <rect x="20" y="55" width="440" height="400" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5" filter="url(#s)"/>
  <rect x="20" y="55" width="440" height="40" rx="10" fill="#DBEAFE"/>
  <rect x="20" y="85" width="440" height="10" fill="#DBEAFE"/>
  <text x="240" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1D4ED8">Bi-Encoder（双编码器）</text>
  <text x="240" y="110" text-anchor="middle" font-size="12" fill="#64748B">用于初筛阶段 — 速度快</text>

  <!-- Query Encoder -->
  <rect x="50" y="130" width="170" height="55" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="135" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Query 编码器</text>
  <text x="135" y="170" text-anchor="middle" font-size="10" fill="#64748B">"如何优化性能" → vec_q</text>

  <!-- Doc Encoder -->
  <rect x="260" y="130" width="170" height="55" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="345" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Doc 编码器</text>
  <text x="345" y="170" text-anchor="middle" font-size="10" fill="#64748B">"性能调优指南..." → vec_d</text>

  <!-- Arrow down from query -->
  <line x1="135" y1="185" x2="135" y2="215" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow down from doc -->
  <line x1="345" y1="185" x2="345" y2="215" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Vector representations -->
  <rect x="55" y="220" width="160" height="40" rx="6" fill="#DBEAFE"/>
  <text x="135" y="245" text-anchor="middle" font-size="11" fill="#1D4ED8">vec_q = [0.12, -0.34, ...]</text>

  <rect x="265" y="220" width="160" height="40" rx="6" fill="#DBEAFE"/>
  <text x="345" y="245" text-anchor="middle" font-size="11" fill="#1D4ED8">vec_d = [0.09, -0.28, ...]</text>

  <!-- Merge arrows -->
  <line x1="135" y1="260" x2="200" y2="290" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="345" y1="260" x2="280" y2="290" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Similarity computation -->
  <rect x="140" y="295" width="200" height="50" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="240" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">余弦相似度</text>
  <text x="240" y="336" text-anchor="middle" font-size="11" fill="#1D4ED8">cos(vec_q, vec_d) = 0.87</text>

  <!-- Pros/Cons -->
  <rect x="50" y="365" width="380" height="75" rx="6" fill="#F8FAFC"/>
  <text x="65" y="385" font-size="12" fill="#22C55E">✓ 可预计算所有文档向量</text>
  <text x="65" y="403" font-size="12" fill="#22C55E">✓ 检索速度极快（ANN 索引毫秒级）</text>
  <text x="65" y="421" font-size="12" fill="#DC2626">✗ Query 和 Doc 独立编码，交互不足</text>
  <text x="65" y="439" font-size="12" fill="#DC2626">✗ 精确匹配能力较弱</text>

  <!-- ===================== RIGHT: Cross-Encoder ===================== -->
  <rect x="500" y="55" width="440" height="400" rx="10" fill="white" stroke="#BBF7D0" stroke-width="1.5" filter="url(#s)"/>
  <rect x="500" y="55" width="440" height="40" rx="10" fill="#DCFCE7"/>
  <rect x="500" y="85" width="440" height="10" fill="#DCFCE7"/>
  <text x="720" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803D">Cross-Encoder（交叉编码器）</text>
  <text x="720" y="110" text-anchor="middle" font-size="12" fill="#64748B">用于精排阶段 — 精度高</text>

  <!-- Concatenated input -->
  <rect x="530" y="130" width="380" height="55" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="720" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">拼接输入 [CLS] Query [SEP] Doc [SEP]</text>
  <text x="720" y="170" text-anchor="middle" font-size="10" fill="#64748B">"如何优化性能 [SEP] 性能调优指南..."</text>

  <!-- Arrow down -->
  <line x1="720" y1="185" x2="720" y2="215" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Joint Encoder -->
  <rect x="590" y="220" width="260" height="55" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="720" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">联合编码器（Transformer）</text>
  <text x="720" y="260" text-anchor="middle" font-size="10" fill="#64748B">Query 和 Doc 充分交互，Attention 计算</text>

  <!-- Arrow down -->
  <line x1="720" y1="275" x2="720" y2="300" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Relevance score -->
  <rect x="620" y="305" width="200" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="720" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">直接输出相关性分数</text>
  <text x="720" y="346" text-anchor="middle" font-size="11" fill="#15803D">relevance_score = 0.95</text>

  <!-- Pros/Cons -->
  <rect x="530" y="365" width="380" height="75" rx="6" fill="#F8FAFC"/>
  <text x="545" y="385" font-size="12" fill="#22C55E">✓ Query-Doc 充分交互，精度更高</text>
  <text x="545" y="403" font-size="12" fill="#22C55E">✓ 能捕获细粒度语义匹配</text>
  <text x="545" y="421" font-size="12" fill="#DC2626">✗ 不可预计算，每对需重新编码</text>
  <text x="545" y="439" font-size="12" fill="#DC2626">✗ 计算量大，只能用于精排（Top-K）</text>

</svg>