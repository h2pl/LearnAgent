<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="680" height="400" fill="url(#bg)" rx="8"/>

  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" fill="#fff" font-size="17" font-weight="bold">Dify 应用类型与工作台</text>

  <!-- 聊天助手 -->
  <rect x="18" y="56" width="148" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="18" y="56" width="148" height="28" rx="8" fill="#2563EB"/>
  <rect x="18" y="68" width="148" height="16" fill="#2563EB"/>
  <text x="92" y="76" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">💬 聊天助手</text>
  <text x="92" y="104" fill="#1E40AF" font-size="10" text-anchor="middle">多轮对话机器人</text>
  <text x="92" y="122" fill="#64748B" font-size="8.5" text-anchor="middle">客服 · 问答 · 导购</text>

  <!-- 文本生成 -->
  <rect x="180" y="56" width="148" height="80" rx="8" fill="#fff" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="180" y="56" width="148" height="28" rx="8" fill="#7C3AED"/>
  <rect x="180" y="68" width="148" height="16" fill="#7C3AED"/>
  <text x="254" y="76" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">📝 文本生成</text>
  <text x="254" y="104" fill="#5B21B6" font-size="10" text-anchor="middle">单次文本生成</text>
  <text x="254" y="122" fill="#64748B" font-size="8.5" text-anchor="middle">文案 · 翻译 · 摘要</text>

  <!-- Agent -->
  <rect x="342" y="56" width="148" height="80" rx="8" fill="#fff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="342" y="56" width="148" height="28" rx="8" fill="#059669"/>
  <rect x="342" y="68" width="148" height="16" fill="#059669"/>
  <text x="416" y="76" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">🤖 Agent</text>
  <text x="416" y="104" fill="#047857" font-size="10" text-anchor="middle">自主工具调用</text>
  <text x="416" y="122" fill="#64748B" font-size="8.5" text-anchor="middle">工具调用 · 自主决策</text>

  <!-- 工作流 -->
  <rect x="504" y="56" width="158" height="80" rx="8" fill="#fff" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="504" y="56" width="158" height="28" rx="8" fill="#DC2626"/>
  <rect x="504" y="68" width="158" height="16" fill="#DC2626"/>
  <text x="583" y="76" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">⚙️ 工作流</text>
  <text x="583" y="104" fill="#991B1B" font-size="10" text-anchor="middle">多步骤编排</text>
  <text x="583" y="122" fill="#64748B" font-size="8.5" text-anchor="middle">业务流程 · 复杂逻辑</text>

  <!-- 工作台界面示意 -->
  <rect x="18" y="150" width="644" height="200" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- 顶部工具栏 -->
  <rect x="18" y="150" width="644" height="32" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <rect x="18" y="164" width="644" height="18" fill="#F8FAFC"/>
  <circle cx="34" cy="166" r="4" fill="#DC2626"/>
  <circle cx="46" cy="166" r="4" fill="#EAB308"/>
  <circle cx="58" cy="166" r="4" fill="#059669"/>
  <text x="220" y="170" fill="#64748B" font-size="9" text-anchor="middle">Dify 工作台 — 可视化编排界面</text>

  <!-- 中间画布 -->
  <rect x="28" y="188" width="450" height="152" rx="4" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- 画布上的节点示意 -->
  <rect x="60" y="204" width="80" height="30" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1"/>
  <text x="100" y="223" fill="#1E40AF" font-size="9" font-weight="bold" text-anchor="middle">开始 →</text>

  <rect x="170" y="204" width="80" height="30" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="210" y="223" fill="#92400E" font-size="8" font-weight="bold" text-anchor="middle">问题分类</text>

  <rect x="60" y="250" width="80" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="100" y="269" fill="#047857" font-size="8" font-weight="bold" text-anchor="middle">知识检索</text>

  <rect x="170" y="250" width="80" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="210" y="269" fill="#047857" font-size="8" font-weight="bold" text-anchor="middle">知识检索</text>

  <rect x="100" y="296" width="120" height="30" rx="6" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="160" y="315" fill="#3730A3" font-size="8" font-weight="bold" text-anchor="middle">LLM 生成回答</text>

  <line x1="140" y1="234" x2="170" y2="234" stroke="#94A3B8" stroke-width="1"/>
  <line x1="100" y1="234" x2="100" y2="250" stroke="#94A3B8" stroke-width="1"/>
  <line x1="210" y1="234" x2="210" y2="250" stroke="#94A3B8" stroke-width="1"/>
  <line x1="140" y1="280" x2="160" y2="296" stroke="#94A3B8" stroke-width="1"/>
  <line x1="210" y1="280" x2="160" y2="296" stroke="#94A3B8" stroke-width="1"/>
  <line x1="160" y1="326" x2="160" y2="340" stroke="#94A3B8" stroke-width="1"/>
  
  <rect x="100" y="340" width="120" height="26" rx="6" fill="#FCE7F3" stroke="#F472B6" stroke-width="1"/>
  <text x="160" y="357" fill="#9D174D" font-size="8" font-weight="bold" text-anchor="middle">结束 →</text>

  <!-- 右侧节点面板 -->
  <rect x="490" y="198" width="160" height="134" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="570" y="214" fill="#475569" font-size="9" font-weight="bold" text-anchor="middle">节点面板</text>

  <rect x="500" y="222" width="140" height="16" rx="3" fill="#DBEAFE"/>
  <text x="570" y="234" fill="#1E40AF" font-size="8" text-anchor="middle">LLM 节点</text>

  <rect x="500" y="242" width="140" height="16" rx="3" fill="#DCFCE7"/>
  <text x="570" y="254" fill="#047857" font-size="8" text-anchor="middle">知识检索</text>

  <rect x="500" y="262" width="140" height="16" rx="3" fill="#FEF3C7"/>
  <text x="570" y="274" fill="#92400E" font-size="8" text-anchor="middle">条件分支</text>

  <rect x="500" y="282" width="140" height="16" rx="3" fill="#F3E8FF"/>
  <text x="570" y="294" fill="#6B21A8" font-size="8" text-anchor="middle">代码执行</text>

  <rect x="500" y="302" width="140" height="16" rx="3" fill="#FFE4E6"/>
  <text x="570" y="314" fill="#9D174D" font-size="8" text-anchor="middle">HTTP 请求</text>

  <!-- 底部核心特性 -->
  <rect x="18" y="358" width="644" height="34" rx="4" fill="#2563EB" opacity="0.06"/>
  <text x="340" y="380" fill="#1E40AF" font-size="9" text-anchor="middle">核心特性：国产模型开箱即用 | RAG 内置零配置 | 一键发布 API | 可视化拖拽编排 | 多人协作编辑</text>
</svg>