<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="a5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="a5g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="375" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Sequential vs Hierarchical 执行模式</text>

  <!-- Divider -->
  <line x1="375" y1="45" x2="375" y2="260" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Left: Sequential -->
  <text x="180" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">Sequential（顺序流水线）</text>

  <rect x="30" y="85" width="75" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="67" y="109" text-anchor="middle" font-size="12" fill="#92400e">研究</text>

  <line x1="105" y1="105" x2="130" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#a5)"/>

  <rect x="135" y="85" width="75" height="40" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="172" y="109" text-anchor="middle" font-size="12" fill="#0c4a6e">写作</text>

  <line x1="210" y1="105" x2="235" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#a5)"/>

  <rect x="240" y="85" width="75" height="40" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="277" y="109" text-anchor="middle" font-size="12" fill="#9d174d">审核</text>

  <text x="180" y="155" text-anchor="middle" font-size="11" fill="#999">按列表顺序依次执行</text>
  <text x="180" y="172" text-anchor="middle" font-size="11" fill="#999">每个输出自动传给下一个</text>

  <!-- Right: Hierarchical -->
  <text x="565" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">Hierarchical（层级委派）</text>

  <!-- Manager -->
  <rect x="510" y="80" width="110" height="45" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="565" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Manager</text>
  <text x="565" y="116" text-anchor="middle" font-size="10" fill="#15803d">动态调度</text>

  <!-- Worker nodes -->
  <rect x="420" y="170" width="70" height="35" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="455" y="192" text-anchor="middle" font-size="11" fill="#92400e">研究</text>

  <rect x="525" y="170" width="70" height="35" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="560" y="192" text-anchor="middle" font-size="11" fill="#0c4a6e">写作</text>

  <rect x="630" y="170" width="70" height="35" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="665" y="192" text-anchor="middle" font-size="11" fill="#9d174d">审核</text>

  <!-- Arrows from manager to workers -->
  <line x1="540" y1="125" x2="460" y2="168" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a5g)"/>
  <line x1="565" y1="125" x2="560" y2="168" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a5g)"/>
  <line x1="590" y1="125" x2="660" y2="168" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a5g)"/>

  <text x="565" y="235" text-anchor="middle" font-size="11" fill="#999">Manager 根据角色动态分配任务</text>
  <text x="565" y="252" text-anchor="middle" font-size="11" fill="#999">顺序不固定，按需调度</text>
</svg>
