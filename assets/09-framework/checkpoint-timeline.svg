<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="375" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Checkpoint 时间线：每个节点执行后自动存档</text>

  <!-- Timeline axis -->
  <line x1="60" y1="130" x2="700" y2="130" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Node 1: Agent -->
  <rect x="80" y="90" width="80" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" font-size="12" fill="#92400e">Agent</text>

  <!-- Checkpoint 1 -->
  <circle cx="120" cy="130" r="8" fill="#2563eb"/>
  <line x1="120" y1="138" x2="120" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="80" y="172" width="80" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="120" y="193" text-anchor="middle" font-size="10" fill="#1d4ed8">CP #1</text>

  <!-- Arrow -->
  <line x1="160" y1="110" x2="200" y2="110" stroke="#2563eb" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Node 2: Tools -->
  <rect x="210" y="90" width="80" height="40" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-size="12" fill="#9d174d">Tools</text>

  <!-- Checkpoint 2 -->
  <circle cx="250" cy="130" r="8" fill="#2563eb"/>
  <line x1="250" y1="138" x2="250" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="172" width="80" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="250" y="193" text-anchor="middle" font-size="10" fill="#1d4ed8">CP #2</text>

  <!-- Arrow -->
  <line x1="290" y1="110" x2="330" y2="110" stroke="#2563eb" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Node 3: Agent again -->
  <rect x="340" y="90" width="80" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="380" y="115" text-anchor="middle" font-size="12" fill="#92400e">Agent</text>

  <!-- Checkpoint 3 -->
  <circle cx="380" cy="130" r="8" fill="#2563eb"/>
  <line x1="380" y1="138" x2="380" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="340" y="172" width="80" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="193" text-anchor="middle" font-size="10" fill="#1d4ed8">CP #3</text>

  <!-- Arrow -->
  <line x1="420" y1="110" x2="460" y2="110" stroke="#2563eb" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Node 4: END -->
  <circle cx="500" cy="110" r="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">END</text>

  <!-- Checkpoint 4 -->
  <circle cx="500" cy="130" r="8" fill="#2563eb"/>
  <line x1="500" y1="138" x2="500" y2="170" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="460" y="172" width="80" height="35" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="500" y="193" text-anchor="middle" font-size="10" fill="#1d4ed8">CP #4</text>

  <!-- Annotations -->
  <text x="620" y="100" font-size="11" fill="#666">每个 CP 保存</text>
  <text x="620" y="116" font-size="11" fill="#666">完整状态快照</text>
  <line x1="575" y1="105" x2="615" y2="105" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arr2)"/>

  <text x="620" y="185" font-size="11" fill="#666">thread_id 隔离</text>
  <text x="620" y="201" font-size="11" fill="#666">不同会话互不干扰</text>

  <!-- Legend -->
  <circle cx="100" cy="260" r="6" fill="#2563eb"/>
  <text x="115" y="264" font-size="11" fill="#666">= Checkpoint（自动存档点）</text>

  <rect x="320" y="253" width="30" height="16" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="265" font-size="11" fill="#666">= 节点（处理步骤）</text>
</svg>
