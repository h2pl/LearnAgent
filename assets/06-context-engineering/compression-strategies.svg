<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="400" fill="#FFFFFF" rx="8"/>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">三种上下文压缩策略对比</text>

  <!-- ===== 策略一：摘要压缩 ===== -->
  <g transform="translate(16, 48)">
    <rect x="0" y="0" width="208" height="240" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#cardShadow)"/>
    
    <!-- 标题栏 -->
    <rect x="0" y="0" width="208" height="32" rx="8" fill="#2563EB"/>
    <rect x="0" y="16" width="208" height="16" fill="#2563EB"/>
    <text x="104" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF">策略一：摘要压缩</text>

    <!-- 流程示意 -->
    <text x="12" y="52" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1E40AF">压缩过程</text>
    
    <rect x="12" y="62" width="184" height="18" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
    <text x="104" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1E40AF">原始对话（8000 tokens）</text>

    <line x1="104" y1="82" x2="104" y2="94" stroke="#64748B" stroke-width="1"/>

    <rect x="12" y="96" width="184" height="18" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="0.8"/>
    <text x="104" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#991B1B">LLM 摘要（轻量模型）</text>

    <line x1="104" y1="116" x2="104" y2="128" stroke="#64748B" stroke-width="1"/>

    <rect x="12" y="130" width="184" height="18" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="0.8"/>
    <text x="104" y="143" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065F46">摘要注入（~500 tokens）</text>

    <!-- 指标 -->
    <text x="12" y="175" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1E40AF">核心指标</text>

    <text x="12" y="192" font-family="sans-serif" font-size="8" fill="#334155">压缩率：<tspan fill="#059669" font-weight="bold">93%</tspan></text>
    <text x="120" y="192" font-family="sans-serif" font-size="8" fill="#334155">信息保留：<tspan fill="#059669" font-weight="bold">95%</tspan></text>

    <text x="12" y="208" font-family="sans-serif" font-size="8" fill="#059669">? 保留关键语义</text>
    <text x="12" y="222" font-family="sans-serif" font-size="8" fill="#DC2626">? 需额外LLM调用</text>
  </g>

  <!-- ===== 策略二：滑动窗口 ===== -->
  <g transform="translate(236, 48)">
    <rect x="0" y="0" width="208" height="240" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- 标题栏 -->
    <rect x="0" y="0" width="208" height="32" rx="8" fill="#059669"/>
    <rect x="0" y="16" width="208" height="16" fill="#059669"/>
    <text x="104" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF">策略二：滑动窗口</text>

    <!-- 流程示意 -->
    <text x="12" y="52" font-family="sans-serif" font-size="9" font-weight="bold" fill="#065F46">压缩过程</text>

    <rect x="12" y="62" width="184" height="18" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="0.8"/>
    <text x="104" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065F46">全部对话（15 轮）</text>

    <!-- 可视化窗口效果 -->
    <g transform="translate(14, 84)">
      <rect x="0" y="0" width="180" height="10" rx="2" fill="#D1D5DB" opacity="0.5"/>
      <rect x="0" y="0" width="55" height="10" rx="2" fill="#9CA3AF"/>
      <text x="4" y="8" font-family="sans-serif" font-size="7" fill="#FFF">已丢弃</text>
      
      <rect x="58" y="0" width="65" height="10" rx="2" fill="#059669"/>
      <text x="62" y="8" font-family="sans-serif" font-size="7" fill="#FFF">保留最近 N 轮</text>
    </g>

    <line x1="104" y1="98" x2="104" y2="110" stroke="#64748B" stroke-width="1"/>

    <rect x="12" y="112" width="184" height="18" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="0.8"/>
    <text x="104" y="125" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065F46">最近窗口（5 轮原文）</text>

    <!-- 指标 -->
    <text x="12" y="175" font-family="sans-serif" font-size="9" font-weight="bold" fill="#065F46">核心指标</text>

    <text x="12" y="192" font-family="sans-serif" font-size="8" fill="#334155">压缩率：<tspan fill="#DC2626" font-weight="bold">50%</tspan></text>
    <text x="120" y="192" font-family="sans-serif" font-size="8" fill="#334155">信息保留：<tspan fill="#DC2626" font-weight="bold">70%</tspan></text>

    <text x="12" y="208" font-family="sans-serif" font-size="8" fill="#059669">? 实现简单，零额外成本</text>
    <text x="12" y="222" font-family="sans-serif" font-size="8" fill="#DC2626">? 早期信息完全丢失</text>
  </g>

  <!-- ===== 策略三：选择性注入 ===== -->
  <g transform="translate(456, 48)">
    <rect x="0" y="0" width="208" height="240" rx="8" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- 标题栏 -->
    <rect x="0" y="0" width="208" height="32" rx="8" fill="#CA8A04"/>
    <rect x="0" y="16" width="208" height="16" fill="#CA8A04"/>
    <text x="104" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF">策略三：选择性注入</text>

    <!-- 流程示意 -->
    <text x="12" y="52" font-family="sans-serif" font-size="9" font-weight="bold" fill="#854D0E">压缩过程</text>

    <rect x="12" y="62" width="184" height="18" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
    <text x="104" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400E">全部工具 / 记忆（6000 tokens）</text>

    <line x1="104" y1="82" x2="104" y2="94" stroke="#64748B" stroke-width="1"/>

    <rect x="12" y="96" width="184" height="18" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
    <text x="104" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400E">按需筛选（向量检索）</text>

    <line x1="104" y1="116" x2="104" y2="128" stroke="#64748B" stroke-width="1"/>

    <rect x="12" y="130" width="184" height="18" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="0.8"/>
    <text x="104" y="143" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065F46">精准注入（~1500 tokens）</text>

    <!-- 指标 -->
    <text x="12" y="175" font-family="sans-serif" font-size="9" font-weight="bold" fill="#854D0E">核心指标</text>

    <text x="12" y="192" font-family="sans-serif" font-size="8" fill="#334155">压缩率：<tspan fill="#059669" font-weight="bold">75%</tspan></text>
    <text x="120" y="192" font-family="sans-serif" font-size="8" fill="#334155">信息保留：<tspan fill="#059669" font-weight="bold">99%</tspan></text>

    <text x="12" y="208" font-family="sans-serif" font-size="8" fill="#059669">? 精准匹配当前需求</text>
    <text x="12" y="222" font-family="sans-serif" font-size="8" fill="#DC2626">? 需向量检索基础设施</text>
  </g>

  <!-- 底部：推荐组合 -->
  <rect x="16" y="300" width="648" height="85" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="340" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">生产环境推荐：组合使用</text>

  <rect x="30" y="335" width="200" height="40" rx="4" fill="#FFF" stroke="#2563EB" stroke-width="1"/>
  <text x="130" y="353" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2563EB">最近 5 轮原文</text>
  <text x="130" y="367" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748B">滑动窗口保连贯性</text>

  <text x="242" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94A3B8">+</text>

  <rect x="260" y="335" width="200" height="40" rx="4" fill="#FFF" stroke="#059669" stroke-width="1"/>
  <text x="360" y="353" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">更早对话摘要</text>
  <text x="360" y="367" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748B">保留上下文连续性</text>

  <text x="472" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94A3B8">+</text>

  <rect x="490" y="335" width="160" height="40" rx="4" fill="#FFF" stroke="#CA8A04" stroke-width="1"/>
  <text x="570" y="353" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#CA8A04">工具按需注入</text>
  <text x="570" y="367" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748B">精准匹配当前任务</text>
</svg>
