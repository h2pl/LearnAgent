<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="module" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1E293B">Agent 引擎内部结构</text>

  <!-- Central: Orchestrator -->
  <rect x="260" y="155" width="160" height="56" rx="8" fill="url(#core)" filter="url(#shadow)"/>
  <text x="340" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Orchestrator</text>
  <text x="340" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#DBEAFE">执行编排器</text>

  <!-- Request In -->
  <rect x="105" y="163" width="90" height="36" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#2563EB">UserRequest</text>
  <line x1="195" y1="181" x2="258" y2="181" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Response Out -->
  <rect x="480" y="163" width="95" height="36" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="527" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#059669">AgentEvent</text>
  <line x1="420" y1="181" x2="478" y2="181" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Top Row Components -->
  <!-- Planner -->
  <rect x="70" y="60" width="150" height="48" rx="6" fill="url(#module)" stroke="#2563EB" stroke-width="1" filter="url(#shadow)"/>
  <text x="145" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1E40AF">Planner</text>
  <text x="145" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">任务规划与分解</text>

  <!-- Executor -->
  <rect x="265" y="60" width="150" height="48" rx="6" fill="url(#module)" stroke="#2563EB" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1E40AF">Executor</text>
  <text x="340" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">工具调用与执行</text>

  <!-- Tool Manager -->
  <rect x="460" y="60" width="150" height="48" rx="6" fill="url(#module)" stroke="#2563EB" stroke-width="1" filter="url(#shadow)"/>
  <text x="535" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1E40AF">Tool Manager</text>
  <text x="535" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">工具注册与调度</text>

  <!-- Bottom Row Components -->
  <!-- Memory -->
  <rect x="85" y="275" width="135" height="48" rx="6" fill="url(#module)" stroke="#2563EB" stroke-width="1" filter="url(#shadow)"/>
  <text x="152" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1E40AF">Memory</text>
  <text x="152" y="313" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">短期/中期/长期记忆</text>

  <!-- Safety Guard -->
  <rect x="270" y="275" width="140" height="48" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#991B1B">Safety Guard</text>
  <text x="340" y="313" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#DC2626">步数上限 / 死循环检测</text>

  <!-- Event Bus -->
  <rect x="460" y="275" width="150" height="48" rx="6" fill="url(#module)" stroke="#059669" stroke-width="1" filter="url(#shadow)"/>
  <text x="535" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#065F46">Event Bus</text>
  <text x="535" y="313" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">事件流分发</text>

  <!-- Connections: Planner ↔ Orchestrator -->
  <line x1="145" y1="108" x2="285" y2="153" stroke="#2563EB" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="340" y1="108" x2="340" y2="153" stroke="#2563EB" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="535" y1="108" x2="395" y2="153" stroke="#2563EB" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Connections: Orchestrator ↔ Memory/Guard/EventBus -->
  <line x1="230" y1="200" x2="152" y2="273" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="340" y1="211" x2="340" y2="273" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="450" y1="200" x2="528" y2="273" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- Observation/Action Labels -->
  <text x="158" y="165" font-family="sans-serif" font-size="9" fill="#64748B" transform="rotate(-30, 158, 165)">观察</text>
  <text x="172" y="165" font-family="sans-serif" font-size="9" fill="#64748B" transform="rotate(-30, 172, 165)">_observe()</text>

  <text x="295" y="250" font-family="sans-serif" font-size="9" fill="#64748B">_think()</text>
  <text x="393" y="250" font-family="sans-serif" font-size="9" fill="#059669">_act()</text>

  <!-- Bottom: Legend -->
  <g transform="translate(30, 345)">
    <text x="0" y="15" font-family="sans-serif" font-size="11" font-weight="700" fill="#1E293B">执行循环：</text>
    <text x="80" y="15" font-family="sans-serif" font-size="10" fill="#64748B">for step in range(max_steps):</text>
    <text x="230" y="15" font-family="sans-serif" font-size="10" fill="#2563EB" font-weight="600">_observe()</text>
    <text x="310" y="15" font-family="sans-serif" font-size="10" fill="#64748B">→</text>
    <text x="320" y="15" font-family="sans-serif" font-size="10" fill="#059669" font-weight="600">_think()</text>
    <text x="385" y="15" font-family="sans-serif" font-size="10" fill="#64748B">→</text>
    <text x="395" y="15" font-family="sans-serif" font-size="10" fill="#DC2626" font-weight="600">_act()</text>
    <text x="448" y="15" font-family="sans-serif" font-size="10" fill="#64748B">→ AgentEvent</text>
  </g>

  <g transform="translate(30, 372)">
    <text x="0" y="15" font-family="sans-serif" font-size="10" fill="#64748B">设计要点：引擎无状态（状态在 ExecutionContext） | 事件驱动输出 | Safety Guard 防止无限循环 | Tool Manager 与引擎解耦</text>
  </g>
</svg>