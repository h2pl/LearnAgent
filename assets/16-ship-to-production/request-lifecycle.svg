<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1E293B">Agent 请求完整生命周期</text>

  <!-- Stage boxes -->
  <!-- 1. Receive -->
  <rect x="18" y="50" width="90" height="52" rx="6" fill="url(#stageGrad)" filter="url(#shadow)"/>
  <text x="63" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">接收</text>
  <text x="63" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DBEAFE">HTTP Request</text>

  <!-- Arrow 1→2 -->
  <line x1="108" y1="76" x2="130" y2="76" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 2. Auth -->
  <rect x="135" y="50" width="90" height="52" rx="6" fill="url(#stageGrad)" filter="url(#shadow)"/>
  <text x="180" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">鉴权</text>
  <text x="180" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DBEAFE">API Key/JWT</text>

  <!-- Arrow 2→3 -->
  <line x1="225" y1="76" x2="247" y2="76" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 3. Validate -->
  <rect x="252" y="50" width="100" height="52" rx="6" fill="url(#stageGrad)" filter="url(#shadow)"/>
  <text x="302" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">参数校验</text>
  <text x="302" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DBEAFE">Pydantic/Zod</text>

  <!-- Arrow 3→4 -->
  <line x1="352" y1="76" x2="374" y2="76" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 4. Rate Limit -->
  <rect x="379" y="50" width="90" height="52" rx="6" fill="#F59E0B" filter="url(#shadow)"/>
  <rect x="379" y="50" width="90" height="52" rx="6" fill="#F59E0B" opacity="0.85" filter="url(#shadow)"/>
  <text x="424" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">限流检查</text>
  <text x="424" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FEF3C7">Sliding Window</text>

  <!-- Arrow 4→5 down -->
  <line x1="424" y1="102" x2="424" y2="130" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 5. Agent Execute (large box) -->
  <rect x="313" y="136" width="222" height="100" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="424" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1E40AF">Agent 执行</text>

  <!-- Sub-steps inside -->
  <rect x="323" y="168" width="58" height="28" rx="4" fill="#DBEAFE"/>
  <text x="352" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#1E40AF">推理</text>

  <rect x="390" y="168" width="58" height="28" rx="4" fill="#DBEAFE"/>
  <text x="419" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#1E40AF">工具调用</text>

  <rect x="457" y="168" width="58" height="28" rx="4" fill="#DBEAFE"/>
  <text x="486" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#1E40AF">记忆</text>

  <!-- Retry on failure -->
  <text x="424" y="226" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748B">失败时重试（指数退避） / 降级到备用模型</text>

  <!-- Arrow 5→6 -->
  <line x1="424" y1="236" x2="424" y2="262" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- 6. Stream Response -->
  <rect x="36" y="266" width="212" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="142" y="288" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#065F46">流式返回</text>
  <text x="52" y="306" font-family="sans-serif" font-size="9" fill="#059669">event: status → 状态更新</text>
  <text x="52" y="320" font-family="sans-serif" font-size="9" fill="#059669">event: tool_call → 工具调用详情</text>
  <text x="52" y="334" font-family="sans-serif" font-size="9" fill="#059669">event: text → 最终回复</text>
  <text x="52" y="348" font-family="sans-serif" font-size="9" fill="#059669">event: done → trace_id + 总耗时</text>

  <!-- Arrow 6→7 -->
  <line x1="248" y1="306" x2="282" y2="306" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 7. Log & Metrics -->
  <rect x="287" y="274" width="140" height="64" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="357" y="296" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1E293B">日志与指标</text>
  <text x="297" y="314" font-family="sans-serif" font-size="9" fill="#475569">审计日志记录</text>
  <text x="297" y="330" font-family="sans-serif" font-size="9" fill="#475569">TSR / 延迟 / 成本</text>

  <!-- Branch: Fail fast line -->
  <line x1="424" y1="50" x2="424" y2="38" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="135" y1="38" x2="424" y2="38" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="280" y="34" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DC2626">任意步骤失败 → 401/429/422 快速返回</text>

  <!-- Timer annotation -->
  <rect x="445" y="274" width="145" height="64" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="517" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#92400E">超时与取消</text>
  <text x="455" y="312" font-family="sans-serif" font-size="9" fill="#D97706">SSE 心跳 15s 保活</text>
  <text x="455" y="328" font-family="sans-serif" font-size="9" fill="#D97706">客户端断开 → 取消执行</text>

  <!-- Bottom info -->
  <g transform="translate(30, 360)">
    <text x="0" y="12" font-family="sans-serif" font-size="10" fill="#1E293B" font-weight="700">各阶段耗时参考：</text>
    <text x="130" y="12" font-family="sans-serif" font-size="10" fill="#64748B">接收&lt;1ms</text>
    <text x="185" y="12" font-family="sans-serif" font-size="10" fill="#64748B">鉴权&lt;5ms</text>
    <text x="240" y="12" font-family="sans-serif" font-size="10" fill="#64748B">校验&lt;1ms</text>
    <text x="290" y="12" font-family="sans-serif" font-size="10" fill="#64748B">限流&lt;2ms</text>
    <text x="340" y="12" font-family="sans-serif" font-size="10" fill="#64748B">Agent 执行 2-30s</text>
    <text x="430" y="12" font-family="sans-serif" font-size="10" fill="#64748B">流式&lt;200ms/chunk</text>
    <text x="520" y="12" font-family="sans-serif" font-size="10" fill="#64748B">日志&lt;10ms</text>
  </g>
  <g transform="translate(30, 382)">
    <text x="0" y="0" font-family="sans-serif" font-size="9" fill="#94A3B8">核心原则：每个阶段独立可观测 | 失败快速返回 | 幂等性保证重复请求安全 | 每个请求分配 trace_id 全程追踪</text>
  </g>
</svg>