<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="85%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#FAFBFC"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.3">
    <line x1="0" y1="100" x2="1100" y2="100" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1100" y2="200" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1100" y2="300" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1100" y2="400" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1100" y2="500" stroke="#E2E8F0" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="22" font-weight="700" fill="#0F172A">AI Agent 学习地图</text>
  <text x="550" y="72" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="14" fill="#64748B">15 章 · 91 篇 · 从认知到上线的完整旅程</text>

  <!-- ===== The Winding Path ===== -->
  <!-- Main S-curve path -->
  <path d="M 80,180 C 200,180 200,420 350,420 C 500,420 500,180 650,180 C 800,180 800,420 950,420 L 1020,420" 
        fill="none" stroke="url(#pathGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Dotted continuation hint -->
  <path d="M 1020,420 L 1060,420" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ===== Stage 1: 认知建立 (top-left) ===== -->
  <g transform="translate(80, 180)">
    <!-- Node circle -->
    <circle r="36" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
    <text y="-6" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#3B82F6">01</text>
    <text y="10" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#3B82F6">认知</text>
    <!-- Label -->
    <text x="0" y="-52" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#1E293B">认知建立</text>
    <text x="0" y="-36" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748B">Ch.00-01 · 13 篇</text>
    <!-- Topics branching out below -->
    <g transform="translate(0, 52)">
      <rect x="-52" y="0" width="104" height="24" rx="12" fill="#EFF6FF"/>
      <text y="16" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#3B82F6">Agent 是什么</text>
      <rect x="-52" y="30" width="104" height="24" rx="12" fill="#EFF6FF"/>
      <text y="46" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#3B82F6">LLM 原理</text>
    </g>
  </g>

  <!-- ===== Stage 2: 基础技能 (bottom-left) ===== -->
  <g transform="translate(350, 420)">
    <circle r="36" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
    <text y="-6" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#3B82F6">02</text>
    <text y="10" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#3B82F6">基础</text>
    <!-- Label below -->
    <text x="0" y="58" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#1E293B">基础技能</text>
    <text x="0" y="74" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748B">Ch.02-04 · 18 篇</text>
    <!-- Topics above -->
    <g transform="translate(0, -52)">
      <rect x="-56" y="-30" width="112" height="24" rx="12" fill="#EFF6FF"/>
      <text y="-14" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#3B82F6">模型接入与选型</text>
      <rect x="-56" y="0" width="112" height="24" rx="12" fill="#EFF6FF"/>
      <text y="16" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#3B82F6">Prompt · 工具调用</text>
    </g>
  </g>

  <!-- ===== Stage 3: 核心开发 (top-center) ===== -->
  <g transform="translate(650, 180)">
    <circle r="36" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5" filter="url(#glow)"/>
    <text y="-6" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#D97706">03</text>
    <text y="10" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#D97706">核心</text>
    <!-- Label -->
    <text x="0" y="-52" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#1E293B">核心开发</text>
    <text x="0" y="-36" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748B">Ch.05-08 · 24 篇</text>
    <!-- Topics below -->
    <g transform="translate(0, 52)">
      <rect x="-58" y="0" width="116" height="24" rx="12" fill="#FFFBEB"/>
      <text y="16" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#D97706">Agent 循环与模式</text>
      <rect x="-58" y="30" width="116" height="24" rx="12" fill="#FFFBEB"/>
      <text y="46" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#D97706">RAG · 记忆 · 上下文</text>
    </g>
  </g>

  <!-- ===== Stage 4: 进阶架构 (bottom-right) ===== -->
  <g transform="translate(950, 420)">
    <circle r="36" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5" filter="url(#glow)"/>
    <text y="-6" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#D97706">04</text>
    <text y="10" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#D97706">进阶</text>
    <!-- Label below -->
    <text x="0" y="58" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#1E293B">进阶架构</text>
    <text x="0" y="74" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748B">Ch.09-11 · 18 篇</text>
    <!-- Topics above -->
    <g transform="translate(0, -52)">
      <rect x="-56" y="-30" width="112" height="24" rx="12" fill="#FFFBEB"/>
      <text y="-14" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#D97706">LangGraph · MCP</text>
      <rect x="-56" y="0" width="112" height="24" rx="12" fill="#FFFBEB"/>
      <text y="16" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#D97706">多 Agent 协作</text>
    </g>
  </g>

  <!-- ===== Stage 5: 工程交付 (far right, path continues) ===== -->
  <g transform="translate(1040, 420)">
    <!-- Destination marker -->
    <circle r="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2.5" filter="url(#glow)"/>
    <text y="-2" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#16A34A">05</text>
    <text y="12" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="9" fill="#16A34A">交付</text>
  </g>
  <!-- Stage 5 detail card -->
  <g transform="translate(1040, 320)">
    <rect x="-60" y="0" width="120" height="72" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" filter="url(#glow)"/>
    <text x="0" y="20" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="700" fill="#1E293B">工程交付</text>
    <text x="0" y="38" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">Ch.12-15 · 18 篇</text>
    <text x="0" y="56" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" fill="#16A34A">评测 · 安全 · 上线</text>
  </g>

  <!-- ===== Start / End markers ===== -->
  <!-- Start flag -->
  <g transform="translate(40, 180)">
    <rect x="-16" y="-14" width="32" height="28" rx="6" fill="#3B82F6"/>
    <text y="4" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="10" font-weight="600" fill="white">起点</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(550, 570)">
    <circle cx="-120" cy="0" r="6" fill="#3B82F6"/>
    <text x="-108" y="4" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748B">认知基础</text>
    <circle cx="-20" cy="0" r="6" fill="#F59E0B"/>
    <text x="-8" y="4" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748B">开发核心</text>
    <circle cx="80" cy="0" r="6" fill="#22C55E"/>
    <text x="92" y="4" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748B">工程交付</text>
  </g>

</svg>
