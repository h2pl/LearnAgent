<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="cat1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="cat2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#DCFCE7"/></linearGradient>
    <linearGradient id="cat3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <linearGradient id="cat4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FEF2F2"/><stop offset="100%" stop-color="#FEE2E2"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="400" fill="url(#bg)" rx="8"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Agent 分类：品类 × 能力级 双维框架</text>

  <!-- Y轴标签 -->
  <text x="24" y="82" fill="#1E293B" font-size="11" font-weight="bold" transform="rotate(-90,24,82)">能力级 ↑</text>

  <!-- L1-L5 标签 -->
  <text x="44" y="132" fill="#94A3B8" font-size="9" text-anchor="middle">L5</text>
  <text x="44" y="192" fill="#94A3B8" font-size="9" text-anchor="middle">L4</text>
  <text x="44" y="250" fill="#94A3B8" font-size="9" text-anchor="middle">L3</text>
  <text x="44" y="308" fill="#94A3B8" font-size="9" text-anchor="middle">L2</text>
  <text x="44" y="366" fill="#94A3B8" font-size="9" text-anchor="middle">L1</text>

  <!-- 分隔线 -->
  <line x1="58" y1="80" x2="58" y2="380" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="264" y1="80" x2="264" y2="380" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="668" y1="80" x2="668" y2="380" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="58" y1="107" x2="668" y2="107" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="58" y1="160" x2="668" y2="160" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="58" y1="218" x2="668" y2="218" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="58" y1="272" x2="668" y2="272" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="58" y1="330" x2="668" y2="330" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- 品类1: 编程 Agent -->
  <rect x="64" y="86" width="194" height="58" rx="6" fill="url(#cat1)" stroke="#60A5FA" stroke-width="1" filter="url(#shadow)"/>
  <text x="161" y="106" fill="#1E40AF" font-size="11" font-weight="bold" text-anchor="middle">编程 Agent</text>
  <text x="161" y="122" fill="#3B82F6" font-size="8.5" text-anchor="middle">Claude Code, Cursor, Devin</text>
  <text x="161" y="136" fill="#64748B" font-size="8" text-anchor="middle">L3–L4 | 终端/IDE/云</text>

  <!-- 品类2: 研究 Agent -->
  <rect x="64" y="150" width="194" height="58" rx="6" fill="url(#cat2)" stroke="#34D399" stroke-width="1" filter="url(#shadow)"/>
  <text x="161" y="170" fill="#047857" font-size="11" font-weight="bold" text-anchor="middle">研究 Agent</text>
  <text x="161" y="186" fill="#059669" font-size="8.5" text-anchor="middle">Deep Research, Perplexity</text>
  <text x="161" y="200" fill="#64748B" font-size="8" text-anchor="middle">L2–L4 | 多步自主调研</text>

  <!-- 品类3: 浏览器/桌面 Agent -->
  <rect x="64" y="214" width="194" height="58" rx="6" fill="url(#cat3)" stroke="#FBBF24" stroke-width="1" filter="url(#shadow)"/>
  <text x="161" y="234" fill="#92400E" font-size="11" font-weight="bold" text-anchor="middle">浏览器 / 桌面 Agent</text>
  <text x="161" y="250" fill="#D97706" font-size="8.5" text-anchor="middle">Operator, Computer Use</text>
  <text x="161" y="264" fill="#64748B" font-size="8" text-anchor="middle">L3–L4 | 模拟人类操作屏幕</text>

  <!-- 品类4: 个人助理 -->
  <rect x="64" y="278" width="194" height="58" rx="6" fill="url(#cat4)" stroke="#F87171" stroke-width="1" filter="url(#shadow)"/>
  <text x="161" y="298" fill="#991B1B" font-size="11" font-weight="bold" text-anchor="middle">个人助理</text>
  <text x="161" y="314" fill="#DC2626" font-size="8.5" text-anchor="middle">OpenClaw, Hermes Agent</text>
  <text x="161" y="328" fill="#64748B" font-size="8" text-anchor="middle">L3–L4 | 跨平台始终在线</text>

  <!-- 品类5-7: 右侧列 -->
  <rect x="270" y="86" width="194" height="58" rx="6" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1" filter="url(#shadow)"/>
  <text x="367" y="106" fill="#5B21B6" font-size="11" font-weight="bold" text-anchor="middle">通用自主 Agent</text>
  <text x="367" y="122" fill="#7C3AED" font-size="8.5" text-anchor="middle">Manus, ChatGPT Agent</text>
  <text x="367" y="136" fill="#64748B" font-size="8" text-anchor="middle">L4–L5 | 给目标自主执行</text>

  <rect x="270" y="150" width="194" height="58" rx="6" fill="#FDF2F8" stroke="#F472B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="367" y="170" fill="#9D174D" font-size="11" font-weight="bold" text-anchor="middle">工作流自动化</text>
  <text x="367" y="186" fill="#DB2777" font-size="8.5" text-anchor="middle">n8n, Lindy, Zapier</text>
  <text x="367" y="200" fill="#64748B" font-size="8" text-anchor="middle">L2–L3 | 低代码可视化编排</text>

  <rect x="270" y="214" width="194" height="58" rx="6" fill="#ECFEFF" stroke="#22D3EE" stroke-width="1" filter="url(#shadow)"/>
  <text x="367" y="234" fill="#0E7490" font-size="11" font-weight="bold" text-anchor="middle">企业 Agent 平台</text>
  <text x="367" y="250" fill="#06B6D4" font-size="8.5" text-anchor="middle">Agentforce, Copilot Studio</text>
  <text x="367" y="264" fill="#64748B" font-size="8" text-anchor="middle">L3 | 安全合规可审计</text>

  <rect x="270" y="278" width="194" height="58" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" filter="url(#shadow)"/>
  <text x="367" y="298" fill="#334155" font-size="11" font-weight="bold" text-anchor="middle">开发框架</text>
  <text x="367" y="314" fill="#64748B" font-size="8.5" text-anchor="middle">LangGraph, CrewAI, Dify</text>
  <text x="367" y="328" fill="#64748B" font-size="8" text-anchor="middle">构建你自己的 Agent 系统</text>

  <!-- 能力级标注 -->
  <rect x="476" y="86" width="194" height="58" rx="6" fill="#f0f0f0" stroke="#CBD5E1" stroke-width="1"/>
  <text x="573" y="104" fill="#1E293B" font-size="10" font-weight="bold" text-anchor="middle">L5 多 Agent 协作</text>
  <text x="573" y="120" fill="#64748B" font-size="8.5" text-anchor="middle">多 Agent 层级规划</text>
  <text x="573" y="134" fill="#94A3B8" font-size="8" text-anchor="middle">研究前沿，2027-2028 成熟</text>

  <rect x="476" y="150" width="194" height="58" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="573" y="168" fill="#1D4ED8" font-size="10" font-weight="bold" text-anchor="middle">L4 自主执行 🔥</text>
  <text x="573" y="184" fill="#2563EB" font-size="8.5" text-anchor="middle">长周期规划，多步推理</text>
  <text x="573" y="198" fill="#3B82F6" font-size="8" text-anchor="middle">2026 年活跃前沿</text>

  <rect x="476" y="214" width="194" height="58" rx="6" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <text x="573" y="232" fill="#334155" font-size="10" font-weight="bold" text-anchor="middle">L3 工具编排</text>
  <text x="573" y="248" fill="#64748B" font-size="8.5" text-anchor="middle">动态选工具、短时记忆</text>
  <text x="573" y="262" fill="#94A3B8" font-size="8" text-anchor="middle">当前主流能力级</text>

  <rect x="476" y="278" width="194" height="58" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="573" y="296" fill="#475569" font-size="10" font-weight="bold" text-anchor="middle">L2 工作流 / L1 聊天</text>
  <text x="573" y="312" fill="#94A3B8" font-size="8.5" text-anchor="middle">固定流程/基础对话</text>
  <text x="573" y="326" fill="#CBD5E1" font-size="8" text-anchor="middle">入门门槛最低</text>

  <!-- 底部注释 -->
  <rect x="64" y="348" width="600" height="26" rx="4" fill="#2563EB" opacity="0.08"/>
  <text x="364" y="365" fill="#1E40AF" font-size="9.5" text-anchor="middle" font-weight="bold">核心原则：选品类比选品牌重要，定能力级比定品类更关键</text>
</svg>