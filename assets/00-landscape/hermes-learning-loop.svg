<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <radialGradient id="center"><stop offset="0%" stop-color="#DBEAFE"/><stop offset="100%" stop-color="#EFF6FF"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563EB"/></marker>
  </defs>

  <rect width="680" height="400" fill="url(#bg)" rx="8"/>

  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Hermes Agent 闭环学习机制</text>

  <!-- 中心圆 -->
  <circle cx="340" cy="210" r="42" fill="url(#center)" stroke="#2563EB" stroke-width="2"/>
  <text x="340" y="204" fill="#1E40AF" font-size="11" font-weight="bold" text-anchor="middle">越用越强</text>
  <text x="340" y="220" fill="#3B82F6" font-size="9" text-anchor="middle">持续进化</text>

  <!-- Step 1: 复杂问题 (上方) -->
  <rect x="255" y="68" width="170" height="56" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="273" cy="82" r="12" fill="#2563EB"/><text x="273" y="86" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">1</text>
  <text x="340" y="86" fill="#1E293B" font-size="11" font-weight="bold" text-anchor="middle">解决复杂问题</text>
  <text x="340" y="102" fill="#64748B" font-size="9" text-anchor="middle">用户提出不熟悉的任务</text>
  <text x="340" y="114" fill="#94A3B8" font-size="8" text-anchor="middle">Agent 探索和执行解决方案</text>

  <!-- Arrow 1→2 -->
  <path d="M340,128 Q340,148 340,158" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: 右下 -->
  <rect x="470" y="160" width="170" height="56" rx="8" fill="#fff" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="488" cy="174" r="12" fill="#059669"/><text x="488" y="178" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">2</text>
  <text x="555" y="178" fill="#047857" font-size="11" font-weight="bold" text-anchor="middle">自动创建 Skill</text>
  <text x="555" y="194" fill="#64748B" font-size="9" text-anchor="middle">解决方案打包为 Skill 文件</text>
  <text x="555" y="206" fill="#059669" font-size="8" text-anchor="middle">兼容 agentskills.io 标准</text>

  <!-- Arrow 2→3 -->
  <path d="M540,220 Q480,250 480,260" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: 下方 -->
  <rect x="255" y="262" width="170" height="56" rx="8" fill="#fff" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="273" cy="276" r="12" fill="#DC2626"/><text x="273" y="280" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">3</text>
  <text x="340" y="280" fill="#991B1B" font-size="11" font-weight="bold" text-anchor="middle">Skill 自我改进</text>
  <text x="340" y="296" fill="#64748B" font-size="9" text-anchor="middle">使用时自动优化步骤</text>
  <text x="340" y="308" fill="#DC2626" font-size="8" text-anchor="middle">不成功则自动修正</text>

  <!-- Arrow 3→4 -->
  <path d="M255,290 Q200,250 140,250" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: 左下（记忆提醒） -->
  <rect x="40" y="160" width="170" height="56" rx="8" fill="#fff" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="58" cy="174" r="12" fill="#7C3AED"/><text x="58" y="178" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">4</text>
  <text x="125" y="178" fill="#5B21B6" font-size="11" font-weight="bold" text-anchor="middle">记忆提醒 Nudge</text>
  <text x="125" y="194" fill="#64748B" font-size="9" text-anchor="middle">主动提醒保存经验</text>
  <text x="125" y="206" fill="#7C3AED" font-size="8" text-anchor="middle">跨 Session 搜索旧对话</text>

  <!-- Arrow 4→1 -->
  <path d="M210,188 Q340,100 340,128" stroke="#2563EB" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 子 Agent 系统 -->
  <rect x="40" y="340" width="600" height="48" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="56" y="360" fill="#1E293B" font-size="11" font-weight="bold">子 Agent 并行系统</text>
  <rect x="180" y="346" width="112" height="16" rx="3" fill="#DBEAFE"/>
  <text x="236" y="358" fill="#1E40AF" font-size="8" text-anchor="middle">隔离上下文</text>
  <rect x="300" y="346" width="112" height="16" rx="3" fill="#DCFCE7"/>
  <text x="356" y="358" fill="#047857" font-size="8" text-anchor="middle">Python RPC</text>
  <rect x="420" y="346" width="112" height="16" rx="3" fill="#FEF3C7"/>
  <text x="476" y="358" fill="#92400E" font-size="8" text-anchor="middle">并行工作流</text>
  <rect x="540" y="346" width="88" height="16" rx="3" fill="#FCE7F3"/>
  <text x="584" y="358" fill="#9D174D" font-size="8" text-anchor="middle">零上下文成本</text>
  <text x="56" y="378" fill="#64748B" font-size="8">3个子Agent同时搜网页、读文档、写代码 → 3分钟汇总报告 → 不阻塞主对话</text>
</svg>