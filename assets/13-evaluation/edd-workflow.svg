<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">评测驱动开发 (EDD) 工作流</text>

  <!-- Center cycle -->
  <circle cx="480" cy="270" r="170" fill="none" stroke="#DBEAFE" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1: Define goal -->
  <rect x="330" y="60" width="300" height="50" rx="25" fill="#2563EB"/>
  <text x="480" y="90" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">① 定义变更目标</text>
  <text x="480" y="125" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">"用户查不到历史订单，需要加查历史功能"</text>
  <path d="M 480 145 L 480 180" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 2: Write eval cases -->
  <rect x="80" y="180" width="280" height="50" rx="25" fill="#059669"/>
  <text x="220" y="210" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">② 编写评测用例</text>
  <text x="220" y="245" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">写 10 个"查历史订单"用例，覆盖各种措辞</text>
  <path d="M 360 205 L 410 205" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Run baseline -->
  <rect x="80" y="280" width="280" height="50" rx="25" fill="#059669"/>
  <text x="220" y="310" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">③ 跑基线</text>
  <text x="220" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">当前 TSR = 0%（功能未实现）</text>
  <path d="M 220 330 L 220 365" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Implement -->
  <rect x="80" y="370" width="280" height="50" rx="25" fill="#059669"/>
  <text x="220" y="400" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">④ 实现变更</text>
  <text x="220" y="435" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">新增工具 query_order_history + 更新 prompt</text>
  <path d="M 360 395 L 410 395" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Run eval -->
  <rect x="600" y="370" width="280" height="50" rx="25" fill="#D97706"/>
  <text x="740" y="400" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">⑤ 跑评测</text>
  <text x="740" y="435" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">TSR = 80%（10 个中 8 个通过）</text>
  <path d="M 600 395 L 540 395" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Iterate -->
  <rect x="600" y="280" width="280" height="50" rx="25" fill="#D97706"/>
  <text x="740" y="310" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">⑥ 迭代优化</text>
  <text x="740" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">失败 2 个是时间格式问题 → 修复 → TSR 100%</text>

  <!-- Step 7: Regression -->
  <rect x="600" y="180" width="280" height="50" rx="25" fill="#D97706"/>
  <text x="740" y="210" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">⑦ 跑全量回归</text>
  <text x="740" y="245" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">确认变更没有影响其他功能</text>
  <path d="M 600 205 L 540 205" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 8: Merge -->
  <rect x="330" y="450" width="300" height="50" rx="25" fill="#059669"/>
  <text x="480" y="480" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">⑧ 合并上线</text>

  <!-- Sub-arrows -->
  <path d="M 480 500 L 480 130" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="500" y="460" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">下一个目标</text>

  <!-- VS comparison box -->
  <rect x="40" y="80" width="280" height="50" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="180" y="100" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#991B1B" text-anchor="middle">传统模式</text>
  <text x="180" y="118" font-family="PingFang SC, Segoe UI, sans-serif" font-size="9" fill="#7F1D1D" text-anchor="middle">需求→改→跑几个例子→"看起来不错"→上线</text>

  <rect x="640" y="80" width="280" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="780" y="100" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">EDD 模式</text>
  <text x="780" y="118" font-family="PingFang SC, Segoe UI, sans-serif" font-size="9" fill="#166534" text-anchor="middle">需求→写评测→跑基线→改→跑评测→达标→上线</text>
</svg>