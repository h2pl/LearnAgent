<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="s3" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="800" height="520" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">CI/CD 评测门禁设计</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#64748b">分级门禁 + 阈值控制 — 每次变更都经过评测验证才能上线</text>

  <!-- PR Submit -->
  <g filter="url(#s3)">
    <rect x="30" y="80" width="140" height="60" rx="10" fill="#6366f1"/>
    <text x="100" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="white">PR 提交</text>
    <text x="100" y="125" text-anchor="middle" font-size="11" fill="#c7d2fe">代码变更触发</text>
  </g>

  <!-- Arrow -->
  <line x1="175" y1="110" x2="205" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="205,105 215,110 205,115" fill="#94a3b8"/>

  <!-- Stage 1 -->
  <g filter="url(#s3)">
    <rect x="220" y="75" width="160" height="130" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="220" y="75" width="160" height="28" rx="10" fill="#10b981"/>
    <rect x="220" y="93" width="160" height="10" fill="#10b981"/>
    <text x="300" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">Stage 1 快速检查</text>
    <text x="240" y="122" font-size="11" fill="#475569">耗时: &lt; 1 分钟</text>
    <text x="240" y="140" font-size="11" fill="#475569">用例: 20 (空跑集)</text>
    <text x="240" y="158" font-size="11" fill="#475569">阈值: 全部通过</text>
    <rect x="240" y="168" width="56" height="18" rx="9" fill="#dcfce7"/>
    <text x="268" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">阻断型</text>
    <rect x="302" y="168" width="56" height="18" rx="9" fill="#fee2e2"/>
    <text x="330" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">失败→停止</text>
  </g>

  <!-- Arrow -->
  <line x1="385" y1="110" x2="405" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="405,105 415,110 405,115" fill="#94a3b8"/>

  <!-- Stage 2 -->
  <g filter="url(#s3)">
    <rect x="420" y="75" width="160" height="130" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect x="420" y="75" width="160" height="28" rx="10" fill="#3b82f6"/>
    <rect x="420" y="93" width="160" height="10" fill="#3b82f6"/>
    <text x="500" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">Stage 2 组件评测</text>
    <text x="440" y="122" font-size="11" fill="#475569">耗时: &lt; 5 分钟</text>
    <text x="440" y="140" font-size="11" fill="#475569">用例: 500 (组件集)</text>
    <text x="440" y="158" font-size="11" fill="#475569">阈值: TSR 下降 &lt; 2%</text>
    <rect x="440" y="168" width="56" height="18" rx="9" fill="#dbeafe"/>
    <text x="468" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">告警型</text>
    <rect x="502" y="168" width="56" height="18" rx="9" fill="#fef3c7"/>
    <text x="530" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">下降→审查</text>
  </g>

  <!-- Arrow -->
  <line x1="585" y1="110" x2="605" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="605,105 615,110 605,115" fill="#94a3b8"/>

  <!-- Stage 3 -->
  <g filter="url(#s3)">
    <rect x="620" y="75" width="155" height="130" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="620" y="75" width="155" height="28" rx="10" fill="#8b5cf6"/>
    <rect x="620" y="93" width="155" height="10" fill="#8b5cf6"/>
    <text x="697" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">Stage 3 完整评测</text>
    <text x="640" y="122" font-size="11" fill="#475569">耗时: &lt; 15 分钟</text>
    <text x="640" y="140" font-size="11" fill="#475569">用例: 2000 (全量集)</text>
    <text x="640" y="158" font-size="11" fill="#475569">+ 性能基线对比</text>
    <rect x="640" y="168" width="56" height="18" rx="9" fill="#ede9fe"/>
    <text x="668" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">报告型</text>
    <rect x="702" y="168" width="56" height="18" rx="9" fill="#dcfce7"/>
    <text x="730" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">生成报告</text>
  </g>

  <!-- Arrows down from all stages -->
  <line x1="300" y1="210" x2="300" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="210" x2="500" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="697" y1="210" x2="697" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Merge point -->
  <rect x="200" y="240" width="555" height="4" rx="2" fill="#94a3b8"/>
  <line x1="478" y1="244" x2="478" y2="268" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="473,268 478,278 483,268" fill="#94a3b8"/>

  <!-- Merge + Deploy -->
  <g filter="url(#s3)">
    <rect x="380" y="282" width="196" height="50" rx="10" fill="#10b981"/>
    <text x="478" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="white">合并 + 部署</text>
    <text x="478" y="322" text-anchor="middle" font-size="11" fill="#d1fae5">所有门禁通过</text>
  </g>

  <!-- Arrow down -->
  <line x1="478" y1="336" x2="478" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="473,360 478,370 483,360" fill="#94a3b8"/>

  <!-- Production -->
  <g filter="url(#s3)">
    <rect x="280" y="374" width="396" height="52" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="478" y="398" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">生产环境评测 (Post-deploy)</text>
    <text x="478" y="416" text-anchor="middle" font-size="11" fill="#94a3b8">在线评测启动 · 漂移检测 · 用户反馈采集</text>
  </g>

  <!-- Bottom: Threshold Table -->
  <g filter="url(#s3)">
    <rect x="30" y="448" width="740" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="50" y="470" font-size="12" font-weight="700" fill="#334155">阈值设置建议</text>

    <text x="50" y="494" font-size="11" fill="#475569">核心 TSR 下降 &gt;1%</text>
    <rect x="172" y="484" width="40" height="16" rx="8" fill="#fee2e2"/>
    <text x="192" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">阻断</text>

    <text x="240" y="494" font-size="11" fill="#475569">全量 TSR 下降 &gt;2%</text>
    <rect x="372" y="484" width="40" height="16" rx="8" fill="#fef3c7"/>
    <text x="392" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#78350f">告知</text>

    <text x="440" y="494" font-size="11" fill="#475569">延迟增加 &gt;20%</text>
    <rect x="550" y="484" width="40" height="16" rx="8" fill="#fee2e2"/>
    <text x="570" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">阻断</text>

    <text x="620" y="494" font-size="11" fill="#475569">Token 增加 &gt;30%</text>
    <rect x="738" y="484" width="40" height="16" rx="8" fill="#fef3c7"/>
    <text x="758" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#78350f">告知</text>
  </g>

  <!-- Left sidebar: Regression triggers -->
  <g filter="url(#s3)">
    <rect x="30" y="282" width="155" height="140" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="107" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">回归触发策略</text>
    <rect x="44" y="314" width="56" height="18" rx="9" fill="#fee2e2"/>
    <text x="72" y="327" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">hotfix</text>
    <text x="108" y="327" font-size="10" fill="#475569">空跑+组件</text>
    <rect x="44" y="340" width="56" height="18" rx="9" fill="#dbeafe"/>
    <text x="72" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">feature</text>
    <text x="108" y="353" font-size="10" fill="#475569">空跑+组件+新</text>
    <rect x="44" y="366" width="56" height="18" rx="9" fill="#ede9fe"/>
    <text x="72" y="379" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">release</text>
    <text x="108" y="379" font-size="10" fill="#475569">全量+性能</text>

    <line x1="44" y1="394" x2="170" y2="394" stroke="#e2e8f0" stroke-width="1"/>
    <text x="107" y="412" text-anchor="middle" font-size="10" fill="#94a3b8">按需触发，非每次提交</text>
  </g>
</svg>