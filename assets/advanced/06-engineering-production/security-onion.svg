<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
    <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/></filter>
  </defs>

  <rect width="960" height="380" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">多模态 AI 安全治理洋葱模型</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">四层纵深防御 · 多层协同</text>

  <!-- 洋葱四层 -->
  <circle cx="480" cy="210" r="130" fill="#DBEAFE" opacity="0.6"/>
  <text x="480" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">核心</text>
  <text x="480" y="218" text-anchor="middle" font-size="11" fill="#2563EB">审计日志</text>
  <text x="480" y="234" text-anchor="middle" font-size="9" fill="#64748B">全量记录 · 可追溯</text>

  <circle cx="480" cy="210" r="190" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="320" y="100" text-anchor="middle" font-size="10" fill="#059669">输出过滤</text>
  <text x="320" y="115" text-anchor="middle" font-size="9" fill="#64748B">内容审核 · 水印嵌入</text>

  <circle cx="480" cy="210" r="250" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="230" y="60" text-anchor="middle" font-size="10" fill="#D97706">权限隔离</text>
  <text x="230" y="75" text-anchor="middle" font-size="9" fill="#64748B">沙箱执行 · 最小权限</text>

  <circle cx="480" cy="210" r="310" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="150" y="30" text-anchor="middle" font-size="10" fill="#EF4444">输入过滤</text>
  <text x="150" y="45" text-anchor="middle" font-size="9" fill="#64748B">图片扫描 · Prompt检查 · 限流</text>

  <!-- 右侧详情 -->
  <rect x="60" y="270" width="200" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="160" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">🛡️ 外层·输入</text>
  <text x="160" y="306" text-anchor="middle" font-size="9" fill="#64748B">图片OCR · 对抗检测 · 限流</text>

  <rect x="280" y="270" width="200" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="380" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">🔐 中层·权限</text>
  <text x="380" y="306" text-anchor="middle" font-size="9" fill="#64748B">沙箱 · VLM不直调敏感API</text>

  <rect x="500" y="270" width="200" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="600" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">✅ 内层·输出</text>
  <text x="600" y="306" text-anchor="middle" font-size="9" fill="#64748B">NSFW检测 · C2PA水印</text>

  <rect x="720" y="270" width="180" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="810" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">📊 核心·审计</text>
  <text x="810" y="306" text-anchor="middle" font-size="9" fill="#64748B">日志 · 回溯 · 合规</text>
</svg>