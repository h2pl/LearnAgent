  <rect x="20" y="80" width="295" height="80" rx="8" fill="white"/>
  <rect x="20" y="80" width="295" height="4" rx="2" fill="#94A3B8"/>
  <text x="167" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">描述检索</text>
