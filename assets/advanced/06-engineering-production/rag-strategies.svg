  </defs>
  <rect width="960" height="220" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">多模态 RAG 检索策略对比</text>
