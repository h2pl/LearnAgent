  <text x="350" y="260" font-size="10" fill="#64748B">每天50张</text>
  <rect x="340" y="120" width="40" height="140" rx="3" fill="#D97706" opacity="0.5"/>
  <text x="360" y="113" text-anchor="middle" font-size="10" fill="#D97706">$30</text>

  <text x="440" y="260" font-size="10" fill="#64748B">每天100张</text>
