  <rect x="720" y="80" width="220" height="180" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="830" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">省钱策略</text>
  <text x="830" y="132" text-anchor="middle" font-size="10" fill="#475569">低频 → ChatGPT Plus</text>
  <text x="830" y="152" text-anchor="middle" font-size="10" fill="#475569">中频 → 模型路由</text>
  <text x="830" y="172" text-anchor="middle" font-size="10" fill="#475569">高频 → SD本地部署</text>
