<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
    <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="960" height="360" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">ChatGPT 一站式全模态交互</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">一个对话框搞定文字 · 图片 · 语音 · 生图</text>

  <!-- 中央: ChatGPT -->
  <rect x="335" y="85" width="290" height="155" rx="12" fill="white" filter="url(#card)"/>
  <rect x="335" y="85" width="290" height="4" rx="2" fill="#2563EB"/>
  <text x="480" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">ChatGPT (GPT-4o)</text>
  <text x="480" y="136" text-anchor="middle" font-size="11" fill="#64748B">统一 Token 空间 · 原生多模态</text>
  <text x="480" y="160" text-anchor="middle" font-size="10" fill="#475569">理解+生成+对话 一个模型完成</text>
  <text x="480" y="182" text-anchor="middle" font-size="11" fill="#D97706">月活 200 亿 · 多模态标杆</text>
  <text x="480" y="204" text-anchor="middle" font-size="10" fill="#059669">✓ 图文混合推理</text>
  <text x="480" y="220" text-anchor="middle" font-size="10" fill="#059669">✓ 语音对话 232ms</text>
  <text x="480" y="236" text-anchor="middle" font-size="10" fill="#059669">✓ 原生生图+迭代编辑</text>

  <!-- 输入侧 -->
  <rect x="40" y="100" width="95" height="36" rx="6" fill="#DBEAFE"/>
  <text x="87" y="123" text-anchor="middle" font-size="11" fill="#2563EB">📝 文字</text>
  <line x1="135" y1="118" x2="330" y2="130" stroke="#94A3B8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="40" y="148" width="95" height="36" rx="6" fill="#FEF3C7"/>
  <text x="87" y="171" text-anchor="middle" font-size="11" fill="#D97706">🖼️ 图片</text>
  <line x1="135" y1="166" x2="330" y2="155" stroke="#94A3B8" stroke-width="1"/>

  <rect x="40" y="196" width="95" height="36" rx="6" fill="#D1FAE5"/>
  <text x="87" y="219" text-anchor="middle" font-size="11" fill="#059669">🎤 语音</text>
  <line x1="135" y1="214" x2="330" y2="180" stroke="#94A3B8" stroke-width="1"/>

  <text x="87" y="258" text-anchor="middle" font-size="10" fill="#64748B">多模态输入</text>

  <!-- 输出侧 -->
  <rect x="825" y="100" width="95" height="36" rx="6" fill="#DBEAFE"/>
  <text x="872" y="123" text-anchor="middle" font-size="11" fill="#2563EB">📝 文字</text>
  <line x1="825" y1="118" x2="630" y2="130" stroke="#94A3B8" stroke-width="1"/>

  <rect x="825" y="148" width="95" height="36" rx="6" fill="#FEF3C7"/>
  <text x="872" y="171" text-anchor="middle" font-size="11" fill="#D97706">🎨 图片</text>
  <line x1="825" y1="166" x2="630" y2="155" stroke="#94A3B8" stroke-width="1"/>

  <rect x="825" y="196" width="95" height="36" rx="6" fill="#D1FAE5"/>
  <text x="872" y="219" text-anchor="middle" font-size="11" fill="#059669">🔊 语音</text>
  <line x1="825" y1="214" x2="630" y2="180" stroke="#94A3B8" stroke-width="1"/>

  <text x="872" y="258" text-anchor="middle" font-size="10" fill="#64748B">多模态输出</text>

  <!-- 底部局限 -->
  <rect x="60" y="285" width="840" height="60" rx="6" fill="white" filter="url(#card)"/>
  <text x="480" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">当前局限</text>
  <text x="160" y="332" text-anchor="middle" font-size="10" fill="#EF4444">不生成视频</text>
  <text x="360" y="332" text-anchor="middle" font-size="10" fill="#EF4444">视频理解有限</text>
  <text x="560" y="332" text-anchor="middle" font-size="10" fill="#D97706">中文语音差英文一档</text>
  <text x="790" y="332" text-anchor="middle" font-size="10" fill="#D97706">局部编辑不如Midjourney</text>

  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/></marker></defs>
</svg>