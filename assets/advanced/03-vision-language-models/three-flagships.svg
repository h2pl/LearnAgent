<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="300" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">三大旗舰 VLM 选型决策树</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">按你的需求走，不是"哪个最好"</text>

  <!-- 决策点1 -->
  <rect x="380" y="75" width="200" height="36" rx="18" fill="#2563EB"/>
  <text x="480" y="98" text-anchor="middle" font-size="13" fill="white" font-weight="600">需要视频理解？</text>

  <line x1="480" y1="111" x2="480" y2="140" stroke="#94A3B8"/>
  <line x1="160" y1="140" x2="800" y2="140" stroke="#94A3B8" stroke-width="1.5"/>

  <text x="200" y="130" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">是 →</text>
  <text x="760" y="130" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="600">← 否</text>

  <!-- 是分支 -->
  <rect x="30" y="155" width="190" height="50" rx="8" fill="white"/>
  <rect x="30" y="155" width="190" height="4" rx="2" fill="#059669"/>
  <text x="125" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Gemini 2.5</text>
  <text x="125" y="196" text-anchor="middle" font-size="9" fill="#64748B">唯一原生视频处理</text>

  <!-- 否分支 -->
  <rect x="580" y="155" width="220" height="36" rx="18" fill="#D97706"/>
  <text x="690" y="178" text-anchor="middle" font-size="12" fill="white" font-weight="600">需要文档高精度？</text>

  <line x1="690" y1="191" x2="690" y2="215" stroke="#94A3B8"/>
  <line x1="580" y1="215" x2="890" y2="215" stroke="#94A3B8" stroke-width="1.5"/>

  <text x="835" y="205" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">是 →</text>
  <text x="835" y="225" text-anchor="middle" font-size="10" fill="#64748B">Claude</text>
  <text x="835" y="240" text-anchor="middle" font-size="9" fill="#94A3B8">PDF/表格/合同最优</text>

  <text x="600" y="205" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="600">← 否</text>
  <text x="580" y="225" text-anchor="middle" font-size="10" fill="#64748B">GPT-4o</text>
  <text x="580" y="240" text-anchor="middle" font-size="9" fill="#94A3B8">最均衡·理解+生成闭环</text>

  <!-- 底部 -->
  <text x="480" y="280" text-anchor="middle" font-size="10" fill="#64748B">规则: 视频→Gemini | 文档→Claude | 其余→GPT-4o | 开源中文→Qwen-VL</text>
</svg>