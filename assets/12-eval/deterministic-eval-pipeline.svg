<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">确定性评测流水线 (Evaluation Pipeline)</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748b">从确定到灵活，逐层过滤 — 能用上层解决的绝不引入下层</text>

  <!-- Layer 1: Code Check -->
  <g filter="url(#shadow)">
    <rect x="60" y="80" width="680" height="88" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="60" y="80" width="8" height="88" rx="4" fill="url(#layer1)"/>
    <circle cx="100" cy="110" r="16" fill="#10b981"/>
    <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>
    <text x="130" y="108" font-size="16" font-weight="700" fill="#065f46">代码检查 Code Check</text>
    <text x="130" y="128" font-size="12" fill="#64748b">JSON Schema 校验 · 枚举值检查 · 参数格式 · 调用顺序约束</text>
    <rect x="130" y="140" width="60" height="20" rx="10" fill="#d1fae5"/>
    <text x="160" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">微秒级</text>
    <rect x="200" y="140" width="72" height="20" rx="10" fill="#d1fae5"/>
    <text x="236" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">零成本</text>
    <rect x="282" y="140" width="84" height="20" rx="10" fill="#d1fae5"/>
    <text x="324" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">100% 可靠</text>
    <text x="640" y="108" text-anchor="end" font-size="12" fill="#10b981" font-weight="600">覆盖 ~20%</text>
    <!-- Fail arrow -->
    <text x="700" y="128" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">不通过→失败</text>
  </g>

  <!-- Arrow 1→2 -->
  <polygon points="400,170 390,178 410,178" fill="#94a3b8"/>
  <text x="420" y="182" font-size="11" fill="#94a3b8">通过 ↓</text>

  <!-- Layer 2: Execution Verification -->
  <g filter="url(#shadow)">
    <rect x="60" y="190" width="680" height="88" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect x="60" y="190" width="8" height="88" rx="4" fill="url(#layer2)"/>
    <circle cx="100" cy="220" r="16" fill="#3b82f6"/>
    <text x="100" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>
    <text x="130" y="218" font-size="16" font-weight="700" fill="#1e3a5f">执行验证 Execution Verification</text>
    <text x="130" y="238" font-size="12" fill="#64748b">沙箱执行代码 · SQL 执行比对 · 工具返回状态检查 · 状态变更验证</text>
    <rect x="130" y="250" width="72" height="20" rx="10" fill="#dbeafe"/>
    <text x="166" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a5f">毫秒-秒级</text>
    <rect x="212" y="250" width="72" height="20" rx="10" fill="#dbeafe"/>
    <text x="248" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a5f">低成本</text>
    <rect x="294" y="250" width="84" height="20" rx="10" fill="#dbeafe"/>
    <text x="336" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a5f">需沙箱环境</text>
    <text x="640" y="218" text-anchor="end" font-size="12" fill="#3b82f6" font-weight="600">覆盖 ~60%</text>
    <text x="700" y="238" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">不通过→失败</text>
  </g>

  <!-- Arrow 2→3 -->
  <polygon points="400,280 390,288 410,288" fill="#94a3b8"/>
  <text x="420" y="292" font-size="11" fill="#94a3b8">通过 ↓</text>

  <!-- Layer 3: Reference Comparison -->
  <g filter="url(#shadow)">
    <rect x="60" y="300" width="680" height="88" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="60" y="300" width="8" height="88" rx="4" fill="url(#layer3)"/>
    <circle cx="100" cy="330" r="16" fill="#8b5cf6"/>
    <text x="100" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>
    <text x="130" y="328" font-size="16" font-weight="700" fill="#4c1d95">参考比对 Reference Comparison</text>
    <text x="130" y="348" font-size="12" fill="#64748b">轨迹精确匹配 · 子序列匹配 · 无序匹配 · 前后状态比对</text>
    <rect x="130" y="360" width="60" height="20" rx="10" fill="#ede9fe"/>
    <text x="160" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">毫秒级</text>
    <rect x="200" y="360" width="84" height="20" rx="10" fill="#ede9fe"/>
    <text x="242" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">需标注轨迹</text>
    <rect x="294" y="360" width="84" height="20" rx="10" fill="#ede9fe"/>
    <text x="336" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">流程+结果</text>
    <text x="640" y="328" text-anchor="end" font-size="12" fill="#8b5cf6" font-weight="600">覆盖 ~80%</text>
    <text x="700" y="348" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">不通过→失败</text>
  </g>

  <!-- Arrow 3→4 -->
  <polygon points="400,390 390,398 410,398" fill="#94a3b8"/>
  <text x="420" y="402" font-size="11" fill="#94a3b8">剩余 ~20% ↓</text>

  <!-- Layer 4: LLM Scoring -->
  <g filter="url(#shadow)">
    <rect x="60" y="410" width="680" height="88" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="60" y="410" width="8" height="88" rx="4" fill="url(#layer4)"/>
    <circle cx="100" cy="440" r="16" fill="#f59e0b"/>
    <text x="100" y="445" text-anchor="middle" font-size="14" font-weight="700" fill="white">4</text>
    <text x="130" y="438" font-size="16" font-weight="700" fill="#78350f">LLM 评分 LLM-as-Judge</text>
    <text x="130" y="458" font-size="12" fill="#64748b">开放式回答质量 · 部分成功判定 · 语义等价判断 · 回答友好度</text>
    <rect x="130" y="470" width="60" height="20" rx="10" fill="#fef3c7"/>
    <text x="160" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">秒级</text>
    <rect x="200" y="470" width="84" height="20" rx="10" fill="#fef3c7"/>
    <text x="242" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Token 费用</text>
    <rect x="294" y="470" width="84" height="20" rx="10" fill="#fef3c7"/>
    <text x="336" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">需持续校准</text>
    <text x="640" y="438" text-anchor="end" font-size="12" fill="#f59e0b" font-weight="600">覆盖 95%+</text>
  </g>

  <!-- Side annotation -->
  <text x="762" y="86" text-anchor="end" font-size="11" fill="#94a3b8" font-style="italic">确定性优先</text>
  <text x="762" y="498" text-anchor="end" font-size="11" fill="#94a3b8" font-style="italic">灵活兜底</text>
  <line x1="756" y1="92" x2="756" y2="488" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="756,92 752,100 760,100" fill="#cbd5e1"/>
  <polygon points="756,488 752,480 760,480" fill="#cbd5e1"/>
</svg>