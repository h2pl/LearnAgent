<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">评测方法选型决策树</text>

  <!-- Root: Can we use code check? -->
  <rect x="305" y="60" width="350" height="44" rx="22" fill="#1E293B"/>
  <text x="480" y="88" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">这个指标能不能用代码检查？</text>

  <!-- Yes branch -->
  <line x1="480" y1="104" x2="480" y2="130" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="355" y="130" width="250" height="36" rx="18" fill="#059669"/>
  <text x="480" y="154" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">代码检查 ✅</text>
  <text x="480" y="185" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">参数格式 · Schema · 枚举值 · 正则</text>

  <!-- No branch -->
  <line x1="480" y1="60" x2="480" y2="48" stroke="#94A3B8" stroke-width="2"/>
  <rect x="655" y="48" width="80" height="24" rx="12" fill="#EF4444"/>
  <text x="695" y="64" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#FFF" text-anchor="middle">不能 ↓</text>

  <line x1="480" y1="104" x2="695" y2="130" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Second question -->
  <rect x="610" y="130" width="300" height="44" rx="22" fill="#475569"/>
  <text x="760" y="158" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">能不能用执行验证？</text>

  <!-- Yes 2 -->
  <line x1="760" y1="174" x2="760" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="635" y="210" width="250" height="36" rx="18" fill="#10B981"/>
  <text x="760" y="234" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">执行验证 ✅</text>
  <text x="760" y="265" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">编译代码 · 运行 SQL · 检查工具返回</text>

  <!-- No 2 -->
  <line x1="645" y1="152" x2="760" y2="174" stroke="#94A3B8" stroke-width="2"/>
  <line x1="610" y1="152" x2="440" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Third question -->
  <rect x="290" y="210" width="300" height="44" rx="22" fill="#475569"/>
  <text x="440" y="238" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">能不能用参考比对？</text>

  <!-- Yes 3 -->
  <line x1="440" y1="254" x2="440" y2="290" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="315" y="290" width="250" height="36" rx="18" fill="#F59E0B"/>
  <text x="440" y="314" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">参考比对 ✅</text>
  <text x="440" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">轨迹匹配 · 前后状态比对</text>

  <!-- No 3 → LLM -->
  <line x1="290" y1="232" x2="150" y2="290" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="25" y="290" width="250" height="36" rx="18" fill="#EF4444"/>
  <text x="150" y="314" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">LLM-as-Judge</text>
  <text x="150" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">开放式回答 · 部分成功 · 语义等价</text>

  <!-- Bottom summary -->
  <rect x="60" y="380" width="840" height="120" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="480" y="405" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">投入产出建议</text>

  <rect x="80" y="415" width="190" height="70" rx="6" fill="#FFF" stroke="#059669" stroke-width="1.5"/>
  <text x="175" y="438" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">Phase 1: 代码检查</text>
  <text x="175" y="458" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569" text-anchor="middle">覆盖 20% · 极低成本</text>
  <text x="175" y="475" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">先做，做基础格式校验</text>

  <rect x="280" y="415" width="190" height="70" rx="6" fill="#FFF" stroke="#10B981" stroke-width="1.5"/>
  <text x="375" y="438" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">Phase 2: 执行验证</text>
  <text x="375" y="458" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569" text-anchor="middle">累计覆盖 60% · 低</text>
  <text x="375" y="475" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">做沙箱 + 工具校验</text>

  <rect x="480" y="415" width="190" height="70" rx="6" fill="#FFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="575" y="438" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#D97706" text-anchor="middle">Phase 3: 参考比对</text>
  <text x="575" y="458" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569" text-anchor="middle">累计覆盖 80% · 中</text>
  <text x="575" y="475" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">标注轨迹 + 状态快照</text>

  <rect x="680" y="415" width="200" height="70" rx="6" fill="#FFF" stroke="#EF4444" stroke-width="1.5"/>
  <text x="780" y="438" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">Phase 4: LLM 评分</text>
  <text x="780" y="458" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569" text-anchor="middle">累计覆盖 95%+ · 高</text>
  <text x="780" y="475" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">只做确定方法搞不定的</text>
</svg>