<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">LLM-as-Judge 自动评测流程</text>

  <!-- Input box -->
  <rect x="330" y="60" width="300" height="45" rx="8" fill="#2563EB"/>
  <text x="480" y="89" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">输入：Agent 执行数据</text>

  <line x1="480" y1="105" x2="480" y2="125" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Three parallel scoring modes -->
  <text x="480" y="155" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1E293B" text-anchor="middle">三种评分模式</text>

  <!-- Pointwise -->
  <rect x="60" y="170" width="260" height="200" rx="8" fill="#FFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="60" y="170" width="260" height="35" rx="8" fill="#2563EB" opacity="0.1"/>
  <text x="190" y="193" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">点式评分 (Pointwise)</text>
  <text x="80" y="225" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输入：(输入, Agent 输出)</text>
  <text x="80" y="248" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输出：分数 + 理由</text>
  <line x1="80" y1="258" x2="300" y2="258" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="80" y="280" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">适合：质量评分</text>
  <text x="80" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">速度快，计算成本最低</text>
  <rect x="80" y="315" width="220" height="40" rx="6" fill="#EFF6FF"/>
  <text x="190" y="335" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">推荐用于日常评测</text>

  <!-- Pairwise -->
  <rect x="350" y="170" width="260" height="200" rx="8" fill="#FFF" stroke="#D97706" stroke-width="1.5"/>
  <rect x="350" y="170" width="260" height="35" rx="8" fill="#D97706" opacity="0.1"/>
  <text x="480" y="193" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E" text-anchor="middle">成对比较 (Pairwise)</text>
  <text x="370" y="225" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输入：(输入, A, B)</text>
  <text x="370" y="248" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输出：A/B/平局 + 理由</text>
  <line x1="370" y1="258" x2="590" y2="258" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="370" y="280" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">适合：A/B 对比</text>
  <text x="370" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">相对判断更准确</text>
  <rect x="370" y="315" width="220" height="40" rx="6" fill="#FFFBEB"/>
  <text x="480" y="335" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">推荐用于版本对比</text>

  <!-- Multi-Dimension -->
  <rect x="640" y="170" width="260" height="200" rx="8" fill="#FFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="640" y="170" width="260" height="35" rx="8" fill="#059669" opacity="0.1"/>
  <text x="770" y="193" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">多维评分 (Multi-Dim)</text>
  <text x="660" y="225" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输入：(输入, 输出)</text>
  <text x="660" y="248" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">输出：多维度独立评分</text>
  <line x1="660" y1="258" x2="880" y2="258" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="660" y="280" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">适合：Agent 全面评估</text>
  <text x="660" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">信息量最大，稍贵</text>
  <rect x="660" y="315" width="220" height="40" rx="6" fill="#D1FAE5"/>
  <text x="770" y="335" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">⭐ 推荐默认使用</text>

  <line x1="190" y1="370" x2="190" y2="400" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="370" x2="480" y2="400" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="770" y1="370" x2="770" y2="400" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Scoring Output -->
  <rect x="180" y="405" width="600" height="45" rx="8" fill="#059669"/>
  <text x="480" y="434" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">评分结果：{"task_completion": 4, "trajectory_efficiency": 5, ...}</text>

  <line x1="480" y1="450" x2="480" y2="470" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feedback Loop -->
  <rect x="330" y="475" width="300" height="35" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="498" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">注入 Agent 优化循环 → 迭代系统 prompt 和策略</text>
</svg>