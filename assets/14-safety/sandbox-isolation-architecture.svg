<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">沙箱隔离架构 (Sandbox Isolation)</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">三级沙箱隔离：进程级 → 容器级 → 虚拟机级</text>

  <!-- Left: Agent System (outside sandbox) -->
  <g filter="url(#shadow)">
    <rect x="30" y="85" width="200" height="430" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <rect x="30" y="85" width="200" height="35" rx="10" fill="#334155"/>
    <rect x="30" y="110" width="200" height="10" fill="#334155"/>
    <text x="130" y="108" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Agent 系统</text>

    <!-- Agent Core -->
    <rect x="50" y="135" width="160" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="158" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Agent 核心</text>
    <text x="130" y="175" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">LLM + 决策引擎</text>

    <!-- Tool Registry -->
    <rect x="50" y="200" width="160" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="130" y="224" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="11">工具注册表</text>

    <!-- Security Middleware -->
    <rect x="50" y="255" width="160" height="40" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="130" y="279" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="11">安全中间件</text>

    <!-- Permission Gateway -->
    <rect x="50" y="310" width="160" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="130" y="334" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="11">权限网关</text>

    <!-- Arrow to sandboxes -->
    <text x="130" y="375" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">↓ 代码执行请求 ↓</text>

    <!-- Audit Log -->
    <rect x="50" y="395" width="160" height="40" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="130" y="419" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="11">审计日志 (Append-only)</text>

    <!-- Status -->
    <rect x="50" y="450" width="160" height="50" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="130" y="472" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">隔离强度: 由沙箱决定</text>
    <text x="130" y="488" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">性能开销: 由沙箱决定</text>
  </g>

  <!-- Connection arrows -->
  <line x1="235" y1="200" x2="275" y2="200" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="235" y1="330" x2="275" y2="330" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="235" y1="460" x2="275" y2="460" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Level 1: Process-level sandbox -->
  <g filter="url(#shadow)">
    <rect x="280" y="95" width="190" height="155" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="280" y="95" width="190" height="35" rx="10" fill="#14532d"/>
    <rect x="280" y="120" width="190" height="10" fill="#14532d"/>
    <text x="375" y="118" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="13" font-weight="bold">进程级沙箱</text>

    <text x="375" y="152" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Process Isolation</text>

    <circle cx="300" cy="175" r="3" fill="#4ade80"/>
    <text x="312" y="179" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">独立进程空间</text>
    <circle cx="300" cy="195" r="3" fill="#4ade80"/>
    <text x="312" y="199" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">资源限制 (CPU/Mem)</text>
    <circle cx="300" cy="215" r="3" fill="#4ade80"/>
    <text x="312" y="219" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">超时自动终止</text>

    <rect x="300" y="230" width="60" height="12" rx="2" fill="#14532d"/>
    <text x="330" y="240" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="8">隔离: 低</text>
    <rect x="370" y="230" width="80" height="12" rx="2" fill="#14532d"/>
    <text x="410" y="240" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="8">开销: 低</text>
  </g>

  <!-- Level 2: Container-level sandbox -->
  <g filter="url(#shadow)">
    <rect x="280" y="270" width="190" height="165" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="280" y="270" width="190" height="35" rx="10" fill="#78350f"/>
    <rect x="280" y="295" width="190" height="10" fill="#78350f"/>
    <text x="375" y="293" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="13" font-weight="bold">容器级沙箱</text>

    <text x="375" y="327" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Container (Docker/gVisor)</text>

    <circle cx="300" cy="350" r="3" fill="#fbbf24"/>
    <text x="312" y="354" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">独立文件系统和网络栈</text>
    <circle cx="300" cy="370" r="3" fill="#fbbf24"/>
    <text x="312" y="374" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">Namespace + Cgroup 隔离</text>
    <circle cx="300" cy="390" r="3" fill="#fbbf24"/>
    <text x="312" y="394" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">白名单 Import 限制</text>
    <circle cx="300" cy="410" r="3" fill="#fbbf24"/>
    <text x="312" y="414" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">无状态 (执行后销毁)</text>

    <rect x="300" y="420" width="60" height="12" rx="2" fill="#78350f"/>
    <text x="330" y="430" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="8">隔离: 中</text>
    <rect x="370" y="420" width="80" height="12" rx="2" fill="#78350f"/>
    <text x="410" y="430" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="8">开销: 中</text>
  </g>

  <!-- Level 3: VM-level sandbox -->
  <g filter="url(#shadow)">
    <rect x="280" y="455" width="190" height="55" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="280" y="455" width="190" height="35" rx="10" fill="#7f1d1d"/>
    <rect x="280" y="480" width="190" height="10" fill="#7f1d1d"/>
    <text x="375" y="478" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="13" font-weight="bold">虚拟机级沙箱</text>
    <rect x="300" y="495" width="60" height="12" rx="2" fill="#7f1d1d"/>
    <text x="330" y="505" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="8">隔离: 高</text>
    <rect x="370" y="495" width="80" height="12" rx="2" fill="#7f1d1d"/>
    <text x="410" y="505" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="8">开销: 高</text>
  </g>

  <!-- Right section: Isolation details -->
  <g filter="url(#shadow)">
    <rect x="500" y="85" width="375" height="230" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="500" y="85" width="375" height="35" rx="10" fill="#334155"/>
    <rect x="500" y="110" width="375" height="10" fill="#334155"/>
    <text x="687" y="108" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold">沙箱安全策略配置</text>

    <!-- Config block -->
    <rect x="520" y="135" width="335" height="165" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="535" y="155" fill="#4ade80" font-family="Consolas, monospace" font-size="11">sandbox:</text>
    <text x="550" y="173" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">network:</text>
    <text x="630" y="173" fill="#fbbf24" font-family="Consolas, monospace" font-size="11">isolated</text>
    <text x="550" y="191" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">filesystem:</text>
    <text x="638" y="191" fill="#fbbf24" font-family="Consolas, monospace" font-size="11">ephemeral</text>
    <text x="550" y="209" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">cpu_limit:</text>
    <text x="638" y="209" fill="#fbbf24" font-family="Consolas, monospace" font-size="11">1 core</text>
    <text x="550" y="227" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">memory_limit:</text>
    <text x="660" y="227" fill="#fbbf24" font-family="Consolas, monospace" font-size="11">512MB</text>
    <text x="550" y="245" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">timeout:</text>
    <text x="622" y="245" fill="#fbbf24" font-family="Consolas, monospace" font-size="11">60s</text>
    <text x="550" y="263" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">allowed:</text>
    <text x="622" y="263" fill="#4ade80" font-family="Consolas, monospace" font-size="11">[pandas, numpy, json]</text>
    <text x="550" y="281" fill="#93c5fd" font-family="Consolas, monospace" font-size="11">blocked:</text>
    <text x="622" y="281" fill="#f87171" font-family="Consolas, monospace" font-size="11">[os, subprocess, socket]</text>
  </g>

  <!-- Right section: File system isolation -->
  <g filter="url(#shadow)">
    <rect x="500" y="330" width="375" height="185" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="500" y="330" width="375" height="35" rx="10" fill="#334155"/>
    <rect x="500" y="355" width="375" height="10" fill="#334155"/>
    <text x="687" y="353" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold">文件系统隔离 &amp; 网络隔离</text>

    <!-- File system -->
    <rect x="520" y="380" width="165" height="120" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="602" y="400" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">文件系统</text>
    <rect x="535" y="410" width="135" height="22" rx="3" fill="#14532d"/>
    <text x="602" y="425" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">input/    (只读)</text>
    <rect x="535" y="436" width="135" height="22" rx="3" fill="#78350f"/>
    <text x="602" y="451" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">output/   (写后读)</text>
    <rect x="535" y="462" width="135" height="22" rx="3" fill="#1e3a5f"/>
    <text x="602" y="477" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">workspace/ (临时)</text>

    <!-- Network -->
    <rect x="700" y="380" width="155" height="120" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="777" y="400" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">网络策略</text>

    <rect x="715" y="412" width="125" height="24" rx="4" fill="#7f1d1d"/>
    <text x="777" y="428" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="10">出站: 默认禁止</text>
    <rect x="715" y="442" width="125" height="24" rx="4" fill="#7f1d1d"/>
    <text x="777" y="458" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="10">入站: 默认禁止</text>
    <rect x="715" y="472" width="125" height="24" rx="4" fill="#14532d"/>
    <text x="777" y="488" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="10">白名单按需开放</text>
  </g>
</svg>