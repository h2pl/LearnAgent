<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="20" font-weight="bold">安全中间件管道架构 (Security Middleware Pipeline)</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">Agent 每次执行都流经安全管道：输入检测 → 权限网关 → Agent 逻辑 → 输出过滤</text>

  <!-- Main pipeline flow -->
  <!-- User Input -->
  <g filter="url(#shadow)">
    <rect x="20" y="85" width="110" height="55" rx="27" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="75" y="110" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="13" font-weight="bold">用户输入</text>
    <text x="75" y="126" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">User Input</text>
  </g>
  <line x1="135" y1="112" x2="160" y2="112" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Input Guard -->
  <g filter="url(#shadow)">
    <rect x="165" y="75" width="155" height="135" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="165" y="75" width="155" height="30" rx="10" fill="#14532d"/>
    <rect x="165" y="95" width="155" height="10" fill="#14532d"/>
    <text x="242" y="96" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="12" font-weight="bold">① 注入检测器</text>

    <text x="242" y="122" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">InputGuard</text>

    <circle cx="185" cy="142" r="3" fill="#4ade80"/>
    <text x="195" y="146" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">L1: 规则匹配 (μs)</text>
    <circle cx="185" cy="158" r="3" fill="#4ade80"/>
    <text x="195" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">L2: 分类器 (ms)</text>
    <circle cx="185" cy="174" r="3" fill="#4ade80"/>
    <text x="195" y="178" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">L3: LLM 检测 (s)</text>

    <text x="242" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">拦截 80%+15%+5%</text>
  </g>
  <line x1="325" y1="112" x2="350" y2="112" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Access Control -->
  <g filter="url(#shadow)">
    <rect x="355" y="75" width="155" height="135" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="355" y="75" width="155" height="30" rx="10" fill="#78350f"/>
    <rect x="355" y="95" width="155" height="10" fill="#78350f"/>
    <text x="432" y="96" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">② 权限网关</text>

    <text x="432" y="122" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">AccessControl</text>

    <circle cx="375" cy="142" r="3" fill="#fbbf24"/>
    <text x="385" y="146" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">工具白名单检查</text>
    <circle cx="375" cy="158" r="3" fill="#fbbf24"/>
    <text x="385" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">参数约束检查</text>
    <circle cx="375" cy="174" r="3" fill="#fbbf24"/>
    <text x="385" y="178" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">频率限制 + 审批</text>

    <text x="432" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">每次工具调用都检查</text>
  </g>
  <line x1="515" y1="112" x2="540" y2="112" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent Logic -->
  <g filter="url(#shadow)">
    <rect x="545" y="80" width="120" height="65" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="605" y="108" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Agent 逻辑</text>
    <text x="605" y="128" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">LLM + Tools</text>
  </g>
  <line x1="670" y1="112" x2="695" y2="112" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output Guard -->
  <g filter="url(#shadow)">
    <rect x="700" y="75" width="155" height="135" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="700" y="75" width="155" height="30" rx="10" fill="#7f1d1d"/>
    <rect x="700" y="95" width="155" height="10" fill="#7f1d1d"/>
    <text x="777" y="96" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="12" font-weight="bold">③ 输出过滤器</text>

    <text x="777" y="122" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">OutputGuard</text>

    <circle cx="720" cy="142" r="3" fill="#f87171"/>
    <text x="730" y="146" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">PII 脱敏 (正则)</text>
    <circle cx="720" cy="158" r="3" fill="#f87171"/>
    <text x="730" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">有害内容分类</text>
    <circle cx="720" cy="174" r="3" fill="#f87171"/>
    <text x="730" y="178" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="9">幻觉检测 (高风险)</text>

    <text x="777" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">脱敏 > 阻断 > 审批</text>
  </g>

  <!-- Output to user -->
  <line x1="860" y1="112" x2="875" y2="112" stroke="#4ade80" stroke-width="2"/>
  <circle cx="885" cy="112" r="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>

  <!-- Audit Logger (bottom) -->
  <g filter="url(#shadow)">
    <rect x="165" y="240" width="690" height="80" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="165" y="240" width="690" height="30" rx="10" fill="#2e1065"/>
    <rect x="165" y="260" width="690" height="10" fill="#2e1065"/>
    <text x="510" y="262" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="12" font-weight="bold">④ 审计日志 (AuditLogger) — Append-only, Agent 无权访问</text>

    <text x="250" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">input_blocked</text>
    <text x="400" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">tool_denied</text>
    <text x="540" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">approval_requested</text>
    <text x="700" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">output_blocked</text>
    <text x="820" y="292" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">pii_masked</text>

    <!-- Connection lines from guards to audit -->
    <line x1="242" y1="215" x2="242" y2="240" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="432" y1="215" x2="432" y2="240" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="777" y1="215" x2="777" y2="240" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- NeMo Guardrails section -->
  <g filter="url(#shadow)">
    <rect x="25" y="345" width="425" height="160" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="25" y="345" width="425" height="30" rx="10" fill="#334155"/>
    <rect x="25" y="365" width="425" height="10" fill="#334155"/>
    <text x="237" y="367" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold">NeMo Guardrails 护栏类型</text>

    <rect x="45" y="390" width="185" height="45" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="137" y="410" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Input Rails</text>
    <text x="137" y="426" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">检查用户输入安全性</text>

    <rect x="245" y="390" width="185" height="45" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="337" y="410" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Dialogue Rails</text>
    <text x="337" y="426" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">控制 LLM 回复行为</text>

    <rect x="45" y="445" width="185" height="45" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="137" y="465" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Execution Rails</text>
    <text x="137" y="481" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">检查工具调用合法性</text>

    <rect x="245" y="445" width="185" height="45" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="337" y="465" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Output Rails</text>
    <text x="337" y="481" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">检查 LLM 输出安全性</text>
  </g>

  <!-- Design principles -->
  <g filter="url(#shadow)">
    <rect x="475" y="345" width="405" height="160" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="475" y="345" width="405" height="30" rx="10" fill="#334155"/>
    <rect x="475" y="365" width="405" height="10" fill="#334155"/>
    <text x="677" y="367" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold">安全中间件设计原则</text>

    <circle cx="500" cy="400" r="5" fill="#3b82f6"/>
    <text x="515" y="404" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">层间无状态</text>
    <text x="515" y="420" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">每层独立判断，不依赖其他层状态</text>

    <circle cx="500" cy="442" r="5" fill="#f59e0b"/>
    <text x="515" y="446" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">零侵入集成</text>
    <text x="515" y="462" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">工具注册时注入安全层，Agent 代码无需修改</text>

    <circle cx="500" cy="484" r="5" fill="#22c55e"/>
    <text x="515" y="488" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">可独立配置</text>
    <text x="515" y="504" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">每层可单独开启/关闭/配置，灵活适应不同场景</text>
  </g>
</svg>