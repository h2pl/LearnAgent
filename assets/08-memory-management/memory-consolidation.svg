<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="680" height="400" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1F2937">记忆巩固机制 — 从事件到知识</text>
  <text x="340" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">提取 → 分类 → 去重合并 → 遗忘淘汰，形成可进化的记忆系统</text>

  <!-- ===== 左侧：输入 ===== -->
  <rect x="20" y="72" width="120" height="50" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="80" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">事件记忆</text>
  <text x="80" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">对话 · 决策 · 反馈</text>

  <line x1="140" y1="97" x2="175" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 阶段1：提取 ===== -->
  <g filter="url(#shadow)">
    <rect x="180" y="72" width="110" height="50" rx="8" fill="#2563EB" opacity="0.9"/>
  </g>
  <text x="235" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">1. 提取</text>
  <text x="235" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#DBEAFE">LLM 自动识别</text>

  <line x1="290" y1="97" x2="325" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 阶段2：分类 ===== -->
  <g filter="url(#shadow)">
    <rect x="330" y="72" width="110" height="50" rx="8" fill="#7C3AED" opacity="0.9"/>
  </g>
  <text x="385" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">2. 分类</text>
  <text x="385" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EDE9FE">语义/情景/程序</text>

  <line x1="440" y1="97" x2="475" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 阶段3：整合 ===== -->
  <g filter="url(#shadow)">
    <rect x="480" y="72" width="110" height="50" rx="8" fill="#059669" opacity="0.9"/>
  </g>
  <text x="535" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">3. 整合</text>
  <text x="535" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D1FAE5">去重·合并·更新</text>

  <line x1="590" y1="97" x2="620" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 输出 ===== -->
  <rect x="625" y="72" width="40" height="50" rx="20" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="645" y="102" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#059669">✓</text>

  <!-- ===== 下半部分：详细机制 ===== -->
  <line x1="30" y1="145" x2="650" y2="145" stroke="#E5E7EB" stroke-width="1"/>

  <!-- 提取策略 -->
  <rect x="30" y="160" width="200" height="110" rx="8" fill="#F0F5FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="130" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2563EB">提取策略</text>
  <line x1="50" y1="190" x2="210" y2="190" stroke="#2563EB" stroke-width="0.5"/>
  
  <text x="48" y="208" font-family="sans-serif" font-size="9" fill="#374151">✓ 用户明确偏好</text>
  <text x="48" y="224" font-family="sans-serif" font-size="9" fill="#374151">✓ 重要技术决策</text>
  <text x="48" y="240" font-family="sans-serif" font-size="9" fill="#374151">✓ 纠正Agent错误</text>
  <text x="48" y="256" font-family="sans-serif" font-size="9" fill="#374151">✓ 长期有效约束</text>
  
  <rect x="48" y="262" width="160" height="2" fill="#E5E7EB"/>
  
  <text x="48" y="272" font-family="sans-serif" font-size="9" fill="#DC2626">✗ 闲聊寒暄</text>
  <text x="120" y="272" font-family="sans-serif" font-size="9" fill="#DC2626">✗ 一次性指令</text>

  <!-- 更新策略 -->
  <rect x="250" y="160" width="200" height="110" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="350" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7C3AED">更新策略 · 去重合并</text>
  <line x1="270" y1="190" x2="430" y2="190" stroke="#7C3AED" stroke-width="0.5"/>

  <rect x="268" y="200" width="98" height="20" rx="4" fill="#DBEAFE"/>
  <text x="317" y="214" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">相似度≥0.85?</text>

  <line x1="317" y1="220" x2="317" y2="230" stroke="#6B7280" stroke-width="1"/>
  <line x1="317" y1="230" x2="268" y2="238" stroke="#6B7280" stroke-width="1"/>
  <line x1="317" y1="230" x2="366" y2="238" stroke="#6B7280" stroke-width="1"/>
  <text x="255" y="252" font-family="sans-serif" font-size="9" fill="#059669">UPDATE 替换</text>
  <text x="370" y="252" font-family="sans-serif" font-size="9" fill="#2563EB">MERGE 合并</text>

  <rect x="300" y="258" width="100" height="8" rx="2" fill="#EDE9FE"/>
  <text x="350" y="265" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7C3AED">LLM 智能决策</text>

  <!-- 遗忘策略 -->
  <rect x="470" y="160" width="190" height="110" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="565" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669">遗忘策略 · 主动淘汰</text>
  <line x1="490" y1="190" x2="640" y2="190" stroke="#059669" stroke-width="0.5"/>

  <text x="488" y="208" font-family="sans-serif" font-size="9" fill="#374151">① 过期清理（>90天未访问）</text>
  <text x="488" y="224" font-family="sans-serif" font-size="9" fill="#374151">② 容量控制（保留 ≤ 500条）</text>
  <text x="488" y="240" font-family="sans-serif" font-size="9" fill="#374151">③ 按重要性×时效排序</text>
  <text x="488" y="256" font-family="sans-serif" font-size="9" fill="#374151">④ 删除低分记忆</text>

  <rect x="488" y="262" width="150" height="2" fill="#E5E7EB"/>

  <text x="488" y="275" font-family="sans-serif" font-size="9" fill="#6B7280">公式：score = importance</text>
  <text x="488" y="289" font-family="sans-serif" font-size="9" fill="#6B7280">× decay^(age/24h)</text>

  <!-- ===== 底部：三类记忆输出 ===== -->
  <rect x="30" y="290" width="620" height="1" fill="#E5E7EB"/>

  <text x="30" y="315" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">巩固后输出：三类结构化知识</text>

  <!-- 语义记忆 -->
  <rect x="30" y="328" width="195" height="52" rx="6" fill="#2563EB" opacity="0.08" stroke="#2563EB" stroke-width="1"/>
  <text x="127" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2563EB">语义记忆</text>
  <text x="127" y="365" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">向量DB · 事实和偏好</text>
  <text x="127" y="378" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">"用户喜欢函数式风格"</text>

  <!-- 情景记忆 -->
  <rect x="242" y="328" width="195" height="52" rx="6" fill="#7C3AED" opacity="0.08" stroke="#7C3AED" stroke-width="1"/>
  <text x="339" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7C3AED">情景记忆</text>
  <text x="339" y="365" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">向量DB · 时间+语义</text>
  <text x="339" y="378" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">"6/15 重构了认证模块"</text>

  <!-- 程序记忆 -->
  <rect x="454" y="328" width="195" height="52" rx="6" fill="#059669" opacity="0.08" stroke="#059669" stroke-width="1"/>
  <text x="551" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">程序记忆</text>
  <text x="551" y="365" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">KV存储 · 行为规则</text>
  <text x="551" y="378" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">"修改前必须运行测试"</text>

  <!-- 底部图注 -->
  <text x="340" y="395" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">
    记忆巩固 = 从原始对话中提取结构化知识，去重合并冲突，主动淘汰低价值记忆
  </text>
</svg>