  <!-- ===== 底部：选型建议 ===== -->
  <rect x="15" y="265" width="650" height="1" fill="#E5E7EB"/>

  <text x="30" y="288" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">选型建议路径</text>

  <!-- 路径卡片 -->
  <rect x="30" y="298" width="145" height="55" rx="6" fill="#F0F5FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="102" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2563EB">快速原型 / 通用场景</text>
