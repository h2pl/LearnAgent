  <text x="422" y="335" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">→ Zep（时序+摘要）</text>
  <text x="422" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">状态演进 · 多用户隔离</text>

  <rect x="510" y="298" width="155" height="55" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="587" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#DC2626">跨文档推理</text>
  <text x="587" y="335" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">→ Cognee（GraphRAG）</text>
  <text x="587" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">因果关系链 · 批处理</text>

