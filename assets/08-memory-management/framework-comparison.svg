  <text x="102" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">API最简 · 延迟最低</text>

  <rect x="190" y="298" width="145" height="55" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="262" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">长期自主Agent</text>
  <text x="262" y="335" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">→ Letta（OS范式）</text>
  <text x="262" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">Agent自我管理 · 记忆换页</text>

  <rect x="350" y="298" width="145" height="55" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
