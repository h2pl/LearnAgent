<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="400" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1F2937">记忆检索流程 — 从查询到结果</text>
  <text x="340" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">三种精准度提升策略：上下文增强 → 混合检索 → 元数据过滤</text>

  <!-- ===== 步骤 1：用户查询 ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="72" width="140" height="56" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  </g>
  <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">步骤1 用户查询</text>
  <text x="100" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">"用户用什么语言？"</text>

  <line x1="170" y1="100" x2="210" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 步骤 2：向量化 ===== -->
  <g filter="url(#shadow)">
    <rect x="215" y="70" width="140" height="60" rx="8" fill="#2563EB" opacity="0.92"/>
  </g>
  <text x="285" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">步骤2 向量化</text>
  <text x="285" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DBEAFE">embedding → 1536维</text>

  <line x1="355" y1="100" x2="395" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 步骤 3：Top-K 检索 ===== -->
  <g filter="url(#shadow)">
    <rect x="400" y="70" width="140" height="60" rx="8" fill="#7C3AED" opacity="0.92"/>
  </g>
  <text x="470" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">步骤3 Top-K 检索</text>
  <text x="470" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#EDE9FE">余弦相似度 Top-20</text>

  <line x1="540" y1="100" x2="580" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== 步骤 4：Reranker ===== -->
  <g filter="url(#shadow)">
    <rect x="585" y="70" width="75" height="60" rx="8" fill="#DC2626" opacity="0.9"/>
  </g>
  <text x="622" y="93" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">步骤4</text>
  <text x="622" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FEE2E2">重排Top-5</text>

  <!-- ===== 三个提升策略面板 ===== -->
  <rect x="30" y="155" width="620" height="1" stroke="#E5E7EB" stroke-width="1"/>
  <text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">三种检索精度提升策略</text>

  <!-- 策略 1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="192" width="190" height="120" rx="8" fill="#F0F5FF" stroke="#2563EB" stroke-width="1.5"/>
  </g>
  <rect x="30" y="192" width="190" height="32" rx="8" fill="#2563EB"/>
  <rect x="30" y="216" width="190" height="8" fill="#2563EB"/>
  <text x="125" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">上下文增强检索</text>
  
  <text x="48" y="244" font-family="sans-serif" font-size="10" fill="#374151">存储时用 LLM 为每条记忆</text>
  <text x="48" y="260" font-family="sans-serif" font-size="10" fill="#374151">添加上下文说明，让检索时</text>
  <text x="48" y="276" font-family="sans-serif" font-size="10" fill="#374151">的语义匹配更精准。</text>
  <rect x="48" y="288" width="145" height="18" rx="3" fill="#DBEAFE"/>
  <text x="121" y="301" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">Anthropic：失败率↓67%</text>

  <!-- 策略 2 -->
  <g filter="url(#shadow)">
    <rect x="245" y="192" width="190" height="120" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  </g>
  <rect x="245" y="192" width="190" height="32" rx="8" fill="#7C3AED"/>
  <rect x="245" y="216" width="190" height="8" fill="#7C3AED"/>
  <text x="340" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">混合检索 (RRF)</text>

  <text x="263" y="244" font-family="sans-serif" font-size="10" fill="#374151">向量语义检索 + 关键词精确</text>
  <text x="263" y="260" font-family="sans-serif" font-size="10" fill="#374151">搜索双路召回，用 RRF</text>
  <text x="263" y="276" font-family="sans-serif" font-size="10" fill="#374151">(Reciprocal Rank Fusion) 融</text>
  <text x="263" y="292" font-family="sans-serif" font-size="10" fill="#374151">合排序。</text>
  <rect x="263" y="296" width="145" height="12" rx="3" fill="#EDE9FE"/>
  <text x="336" y="305" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6D28D9">兼顾语义+精确匹配</text>

  <!-- 策略 3 -->
  <g filter="url(#shadow)">
    <rect x="460" y="192" width="190" height="120" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  </g>
  <rect x="460" y="192" width="190" height="32" rx="8" fill="#059669"/>
  <rect x="460" y="216" width="190" height="8" fill="#059669"/>
  <text x="555" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">元数据过滤</text>

  <text x="478" y="244" font-family="sans-serif" font-size="10" fill="#374151">在语义检索前用元数据</text>
  <text x="478" y="260" font-family="sans-serif" font-size="10" fill="#374151">（type/时间/user_id）</text>
  <text x="478" y="276" font-family="sans-serif" font-size="10" fill="#374151">缩小候选范围，减少</text>
  <text x="478" y="292" font-family="sans-serif" font-size="10" fill="#374151">噪声干扰。</text>
  <rect x="478" y="296" width="145" height="12" rx="3" fill="#D1FAE5"/>
  <text x="551" y="305" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#047857">先缩小范围再搜索</text>

  <!-- 结果 -->
  <rect x="220" y="340" width="240" height="40" rx="20" fill="#2563EB" filter="url(#shadow)"/>
  <text x="340" y="358" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">最终结果："TypeScript + Express"</text>
  <text x="340" y="374" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DBEAFE">语义匹配"语言"→"TypeScript"，相关性得分 0.94</text>

  <!-- 从各策略到结果的箭头 -->
  <line x1="125" y1="312" x2="260" y2="358" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="312" x2="340" y2="340" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="555" y1="312" x2="420" y2="358" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 底部图注 -->
  <text x="340" y="395" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">
    检索质量是长期记忆的生命线 — 存得多不如取得准，三种策略组合可将准确率提升至生产可用水平
  </text>
</svg>