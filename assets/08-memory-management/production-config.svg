<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="680" height="400" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1F2937">生产环境记忆配置决策树</text>
  <text x="340" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">从评估规模到选型、存储、检索策略的完整决策路径</text>

  <!-- ===== 根节点：规模评估 ===== -->
  <g filter="url(#shadow)">
    <rect x="240" y="65" width="200" height="38" rx="19" fill="#2563EB"/>
  </g>
  <text x="340" y="89" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">评估数据规模与场景</text>

  <!-- 三个分支 -->
  <line x1="340" y1="103" x2="110" y2="135" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="200" y="122" font-family="sans-serif" font-size="9" fill="#6B7280">&lt; 1K 条记忆</text>

  <line x1="340" y1="103" x2="340" y2="135" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="355" y="122" font-family="sans-serif" font-size="9" fill="#6B7280">1K-100K</text>

  <line x1="340" y1="103" x2="570" y2="135" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="470" y="122" font-family="sans-serif" font-size="9" fill="#6B7280">&gt; 100K 条</text>

  <!-- 分支1：小规模 -->
  <g filter="url(#shadow)">
    <rect x="30" y="140" width="160" height="50" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  </g>
  <text x="110" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">手写实现 / Mem0</text>
  <text x="110" y="180" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">ChromaDB 本地存储</text>

  <line x1="110" y1="190" x2="110" y2="210" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="30" y="215" width="160" height="38" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="110" y="233" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">检索: 纯向量相似度</text>
  <text x="110" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Top-5 | 无额外策略</text>

  <!-- 分支2：中等规模 -->
  <g filter="url(#shadow)">
    <rect x="240" y="140" width="200" height="50" rx="8" fill="#F0F5FF" stroke="#2563EB" stroke-width="1.5"/>
  </g>
  <text x="340" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2563EB">Mem0 / Letta</text>
  <text x="340" y="180" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">Qdrant/Pinecone 专用向量DB</text>

  <line x1="340" y1="190" x2="340" y2="210" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="240" y="215" width="200" height="38" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="340" y="233" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">检索: 混合检索 RRF</text>
  <text x="340" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Top-10 | 上下文增强可选</text>

  <!-- 分支3：大规模 -->
  <g filter="url(#shadow)">
    <rect x="480" y="140" width="180" height="50" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  </g>
  <text x="570" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#DC2626">Zep / Cognee</text>
  <text x="570" y="180" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">PostgreSQL + 图DB + 向量集群</text>

  <line x1="570" y1="190" x2="570" y2="210" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="480" y="215" width="180" height="38" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="570" y="233" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">检索: GraphRAG / 时序</text>
  <text x="570" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">Top-20 | Reranker精排</text>

  <!-- ===== 下半部分：详细配置建议 ===== -->
  <line x1="30" y1="275" x2="650" y2="275" stroke="#E5E7EB" stroke-width="1"/>

  <text x="30" y="298" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">生产环境治理三原则</text>

  <!-- 原则1 -->
  <rect x="30" y="310" width="195" height="68" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="127" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#DC2626">1. 记忆隔离</text>
  <text x="127" y="348" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">user_id 不可省略</text>
  <text x="127" y="363" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">检索: where={"user_id": id}</text>

  <!-- 原则2 -->
  <rect x="240" y="310" width="195" height="68" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="337" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#D97706">2. 容量控制</text>
  <text x="337" y="348" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">记忆 ≤ 500 条/用户</text>
  <text x="337" y="363" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">注入 Tokens ≤ 500/次</text>

  <!-- 原则3 -->
  <rect x="450" y="310" width="195" height="68" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="547" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">3. 质量监控</text>
  <text x="547" y="348" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">定期健康报告</text>
  <text x="547" y="363" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">检测记忆冲突和过期</text>

  <!-- 底部图注 -->
  <text x="340" y="395" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">
    典型演进路径：原型用 Mem0（5行）→ 规模化后切 Zep（时序）→ 知识密集场景引入 Cognee（GraphRAG）
  </text>
</svg>