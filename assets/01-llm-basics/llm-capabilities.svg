<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="4" height="4">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="760" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">LLM 能力全景图</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#64748b">核心能力 × 已知局限 — 用对地方就是利器，用错场景就是灾难</text>

  <!-- ===== LEFT SIDE: Capabilities ===== -->
  <rect x="25" y="75" width="350" height="390" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>

  <!-- Capabilities Header -->
  <rect x="25" y="75" width="350" height="42" rx="10" fill="url(#greenGrad)"/>
  <rect x="25" y="107" width="350" height="10" fill="url(#greenGrad)"/>
  <text x="200" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">✅ 核心能力</text>

  <!-- Item 1: Text Understanding & Generation -->
  <rect x="40" y="130" width="320" height="60" rx="6" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="55" y="152" font-size="13" font-weight="bold" fill="#166534">文本理解与生成</text>
  <text x="55" y="170" font-size="11" fill="#15803d">摘要 · 翻译 · 润色 · 扩写 · 风格改写</text>
  <text x="55" y="186" font-size="10" fill="#4ade80">质量远超传统 NLP 方法</text>

  <!-- Item 2: Code Generation -->
  <rect x="40" y="198" width="320" height="60" rx="6" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="55" y="220" font-size="13" font-weight="bold" fill="#166534">代码生成与分析</text>
  <text x="55" y="238" font-size="11" fill="#15803d">编写代码 · 定位 Bug · 写单元测试</text>
  <text x="55" y="254" font-size="10" fill="#4ade80">目前商业价值最大的领域之一</text>

  <!-- Item 3: Logical Reasoning -->
  <rect x="40" y="266" width="320" height="60" rx="6" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="55" y="288" font-size="13" font-weight="bold" fill="#166534">逻辑推理</text>
  <text x="55" y="306" font-size="11" fill="#15803d">数学 · 规划 · 多步推理</text>
  <text x="55" y="322" font-size="10" fill="#4ade80">推理模型（o 系列、DeepSeek-R1）使质变</text>

  <!-- Item 4: In-context Learning -->
  <rect x="40" y="334" width="320" height="60" rx="6" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="55" y="356" font-size="13" font-weight="bold" fill="#166534">上下文学习</text>
  <text x="55" y="374" font-size="11" fill="#15803d">无需重新训练，Prompt 给示例就能学会</text>
  <text x="55" y="390" font-size="10" fill="#4ade80">LLM 灵活性的根源</text>

  <!-- Bottom division -->
  <line x1="200" y1="408" x2="200" y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== RIGHT SIDE: Limitations ===== -->
  <rect x="385" y="75" width="350" height="390" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/>

  <!-- Limitations Header -->
  <rect x="385" y="75" width="350" height="42" rx="10" fill="url(#redGrad)"/>
  <rect x="385" y="107" width="350" height="10" fill="url(#redGrad)"/>
  <text x="560" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">⚠️ 已知局限</text>

  <!-- Item 1: Hallucination -->
  <rect x="400" y="130" width="320" height="60" rx="6" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="415" y="152" font-size="13" font-weight="bold" fill="#991b1b">幻觉</text>
  <text x="415" y="170" font-size="11" fill="#b91c1c">极其自信地编造不存在的事实</text>
  <text x="415" y="186" font-size="10" fill="#f87171">原理是"预测下一个词"，不是"检索数据库"</text>

  <!-- Item 2: Knowledge Cutoff -->
  <rect x="400" y="198" width="320" height="60" rx="6" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="415" y="220" font-size="13" font-weight="bold" fill="#991b1b">知识截止</text>
  <text x="415" y="238" font-size="11" fill="#b91c1c">知识停留在预训练完成的那一天</text>
  <text x="415" y="254" font-size="10" fill="#f87171">昨天发生的新闻 → 不知道或胡编</text>

  <!-- Item 3: Precision Calculation -->
  <rect x="400" y="266" width="320" height="60" rx="6" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="415" y="288" font-size="13" font-weight="bold" fill="#991b1b">精确计算与严格逻辑</text>
  <text x="415" y="306" font-size="11" fill="#b91c1c">34598 × 23489 → 看起来对的错误结果</text>
  <text x="415" y="322" font-size="10" fill="#f87171">Token 机制导致无法做精确符号运算</text>

  <!-- Item 4: Context Window -->
  <rect x="400" y="334" width="320" height="60" rx="6" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="415" y="356" font-size="13" font-weight="bold" fill="#991b1b">上下文窗口限制</text>
  <text x="415" y="374" font-size="11" fill="#b91c1c">'迷失在中间' — 会忽略长文中段细节</text>
  <text x="415" y="390" font-size="10" fill="#f87171">即使支持 200K+ tokens 也并非完美</text>

  <!-- Bottom tagline -->
  <text x="380" y="470" text-anchor="middle" font-size="11" fill="#64748b">Agent 工程本质：用代码放大优点，用工具补齐缺点</text>
</svg>
