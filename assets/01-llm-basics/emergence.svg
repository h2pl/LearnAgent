<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="emergeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="4" height="4">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="760" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">涌现能力：量变引起质变</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#64748b">当模型参数量跨过某个阈值，全新的能力突然出现</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="700" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="80" y1="320" x2="80" y2="60" stroke="#94a3b8" stroke-width="2"/>
  <!-- X label -->
  <text x="390" y="358" text-anchor="middle" font-size="13" fill="#475569" font-weight="600">模型参数量（对数尺度）</text>
  <!-- Y label -->
  <text x="32" y="200" text-anchor="middle" font-size="13" fill="#475569" font-weight="600" transform="rotate(-90,32,200)">
    任务表现 / 能力涌现
  </text>

  <!-- X axis tick marks -->
  <line x1="80" y1="320" x2="80" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="80" y="345" text-anchor="middle" font-size="10" fill="#64748b">1B</text>
  <line x1="215" y1="320" x2="215" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="215" y="345" text-anchor="middle" font-size="10" fill="#64748b">10B</text>
  <line x1="350" y1="320" x2="350" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="350" y="345" text-anchor="middle" font-size="10" fill="#64748b">100B</text>
  <line x1="485" y1="320" x2="485" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="485" y="345" text-anchor="middle" font-size="10" fill="#64748b">1T</text>
  <line x1="620" y1="320" x2="620" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="620" y="345" text-anchor="middle" font-size="10" fill="#64748b">10T</text>

  <!-- Gradual improvement curve (traditional) -->
  <path d="M 80 310 Q 200 300 350 290 Q 500 275 700 270"
        fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Emergence curve (step function) -->
  <path d="M 80 310 Q 150 300 230 290 Q 270 280 300 270
           L 320 180 L 350 160 Q 400 140 500 120 Q 600 110 700 100"
        fill="none" stroke="#ef4444" stroke-width="3"/>

  <!-- Colored area under emergence curve (from the jump) -->
  <path d="M 300 270 L 320 180 L 350 160 Q 400 140 500 120 Q 600 110 700 100
           L 700 320 L 300 320 Z"
        fill="url(#emergeGrad)" opacity="0.18"/>

  <!-- Emergence threshold line -->
  <line x1="320" y1="60" x2="320" y2="320" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,4"/>
  <text x="320" y="75" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">涌现阈值</text>

  <!-- Labels on curves -->
  <text x="200" y="270" font-size="11" fill="#64748b">传统模型</text>
  <text x="200" y="285" font-size="10" fill="#94a3b8">能力随规模线性增长</text>

  <text x="480" y="100" font-size="11" fill="#ef4444" font-weight="bold">LLM</text>
  <text x="480" y="115" font-size="10" fill="#ef4444">能力跃迁</text>

  <!-- Annotations for capability examples -->
  <!-- No capability zone -->
  <rect x="95" y="80" width="140" height="52" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="165" y="100" text-anchor="middle" font-size="10" fill="#94a3b8">❌ 无法完成的任务</text>
  <text x="165" y="115" text-anchor="middle" font-size="9" fill="#94a3b8">数学推理 ✗  代码生成 ✗</text>
  <text x="165" y="128" text-anchor="middle" font-size="9" fill="#94a3b8">翻译质量差  逻辑弱</text>

  <!-- Emerging capability zone -->
  <rect x="400" y="76" width="160" height="60" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="480" y="96" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="bold">✨ 涌现能力</text>
  <text x="480" y="112" text-anchor="middle" font-size="9" fill="#dc2626">数学推理 ✓  代码生成 ✓</text>
  <text x="480" y="126" text-anchor="middle" font-size="9" fill="#dc2626">上下文学习 ✓  多步推理 ✓</text>

  <!-- Arrow from threshold to emergence box -->
  <path d="M 320 160 Q 360 130 400 106" fill="none" stroke="#fca5a5" stroke-width="1.5" marker-end="url(#arrowGray)" stroke-opacity="0.6"/>

  <!-- Comparison arrow after threshold -->
  <text x="230" y="170" font-size="12" fill="#ef4444">✚</text>

  <!-- Bottom insight box -->
  <rect x="90" y="370" width="580" height="24" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="386" text-anchor="middle" font-size="11" fill="#64748b">这就像水降到 0°C 突然结冰一样——不是一点点变好，而是跨过阈值后质变</text>
</svg>
