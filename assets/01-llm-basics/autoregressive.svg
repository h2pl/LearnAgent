<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="contextGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#15294a"/>
    </linearGradient>
    <linearGradient id="predGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="4" height="4">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">自回归生成：逐词预测过程</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#64748b">每个 token 的预测都基于之前的所有 token</text>

  <!-- ===== Step 1 ===== -->
  <g transform="translate(0, 80)">
    <!-- Step label -->
    <rect x="20" y="0" width="48" height="24" rx="4" fill="#e94560"/>
    <text x="44" y="16" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第 1 步</text>

    <!-- Context box -->
    <rect x="80" y="0" width="200" height="36" rx="6" fill="url(#contextGrad)" filter="url(#shadow)"/>
    <text x="180" y="24" text-anchor="middle" fill="#e2e8f0" font-size="14">"中国的首都是"</text>

    <!-- Arrow -->
    <text x="295" y="24" text-anchor="middle" fill="#64748b" font-size="16">→</text>

    <!-- Probability bars -->
    <rect x="320" y="0" width="450" height="110" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>

    <text x="545" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">预测下一个 token 的概率分布</text>

    <!-- Bar: 北 (selected) -->
    <rect x="335" y="28" width="240" height="22" rx="4" fill="#e94560" opacity="0.9"/>
    <rect x="335" y="28" width="240" height="22" rx="4" fill="none" stroke="#e94560" stroke-width="1.5"/>
    <text x="345" y="43" font-size="12" fill="#fff" font-weight="bold">北</text>
    <text x="580" y="43" font-size="11" fill="#e94560" font-weight="bold">0.82</text>

    <!-- Bar: 上 -->
    <rect x="335" y="54" width="80" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="68" font-size="11" fill="#475569">上</text>
    <text x="420" y="68" font-size="10" fill="#94a3b8">0.08</text>

    <!-- Bar: 东 -->
    <rect x="335" y="78" width="50" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="92" font-size="11" fill="#475569">东</text>
    <text x="390" y="92" font-size="10" fill="#94a3b8">0.04</text>

    <!-- Selected indicator -->
    <rect x="600" y="28" width="155" height="22" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="677" y="43" text-anchor="middle" font-size="11" fill="#dc2626">← 按概率采样，选中"北"</text>
  </g>

  <!-- ===== Step 2 ===== -->
  <g transform="translate(0, 200)">
    <rect x="20" y="0" width="48" height="24" rx="4" fill="#e94560"/>
    <text x="44" y="16" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第 2 步</text>

    <!-- Context box - now includes 北 -->
    <rect x="80" y="0" width="200" height="36" rx="6" fill="url(#contextGrad)" filter="url(#shadow)"/>
    <text x="180" y="24" text-anchor="middle" fill="#e2e8f0" font-size="14">"中国的首都是北"</text>
    <rect x="243" y="2" width="24" height="32" rx="4" fill="#e94560" opacity="0.85"/>
    <text x="255" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">+</text>

    <!-- Arrow -->
    <text x="295" y="24" text-anchor="middle" fill="#64748b" font-size="16">→</text>

    <!-- Probability bars -->
    <rect x="320" y="0" width="450" height="110" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="545" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">预测下一个 token 的概率分布</text>

    <!-- Bar: 京 (selected) -->
    <rect x="335" y="28" width="260" height="22" rx="4" fill="#e94560" opacity="0.9"/>
    <text x="345" y="43" font-size="12" fill="#fff" font-weight="bold">京</text>
    <text x="600" y="43" font-size="11" fill="#e94560" font-weight="bold">0.91</text>

    <!-- Bar: 方 -->
    <rect x="335" y="54" width="50" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="68" font-size="11" fill="#475569">方</text>
    <text x="390" y="68" font-size="10" fill="#94a3b8">0.04</text>

    <!-- Bar: 极 -->
    <rect x="335" y="78" width="30" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="92" font-size="11" fill="#475569">极</text>
    <text x="370" y="92" font-size="10" fill="#94a3b8">0.02</text>

    <!-- Selected indicator -->
    <rect x="600" y="28" width="155" height="22" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="677" y="43" text-anchor="middle" font-size="11" fill="#dc2626">← 按概率采样，选中"京"</text>
  </g>

  <!-- ===== Step 3 ===== -->
  <g transform="translate(0, 320)">
    <rect x="20" y="0" width="48" height="24" rx="4" fill="#64748b"/>
    <text x="44" y="16" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第 3 步</text>

    <!-- Context box - now includes 北京 -->
    <rect x="80" y="0" width="200" height="36" rx="6" fill="url(#contextGrad)" filter="url(#shadow)"/>
    <text x="180" y="24" text-anchor="middle" fill="#e2e8f0" font-size="14">"中国的首都是北京"</text>
    <rect x="243" y="2" width="24" height="32" rx="4" fill="#64748b" opacity="0.85"/>
    <text x="255" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">+</text>

    <!-- Arrow -->
    <text x="295" y="24" text-anchor="middle" fill="#64748b" font-size="16">→</text>

    <!-- Probability bars -->
    <rect x="320" y="0" width="450" height="110" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="545" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">预测下一个 token 的概率分布</text>

    <!-- Bar: 。(EOS) -->
    <rect x="335" y="28" width="210" height="22" rx="4" fill="#10b981" opacity="0.9"/>
    <text x="345" y="43" font-size="12" fill="#fff" font-weight="bold">。 (结束符)</text>
    <text x="550" y="43" font-size="11" fill="#10b981" font-weight="bold">0.72</text>

    <!-- Bar: 的 -->
    <rect x="335" y="54" width="50" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="68" font-size="11" fill="#475569">的</text>
    <text x="390" y="68" font-size="10" fill="#94a3b8">0.12</text>

    <!-- Bar: 是 -->
    <rect x="335" y="78" width="30" height="20" rx="4" fill="#94a3b8" opacity="0.6"/>
    <text x="345" y="92" font-size="11" fill="#475569">是</text>
    <text x="370" y="92" font-size="10" fill="#94a3b8">0.05</text>

    <!-- Selected indicator -->
    <rect x="600" y="28" width="155" height="22" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="677" y="43" text-anchor="middle" font-size="11" fill="#059669">← 按概率采样，结束</text>
  </g>

  <!-- Bottom summary -->
  <rect x="50" y="450" width="700" height="50" rx="8" fill="#1e293b" opacity="0.9"/>
  <text x="400" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#e2e8f0">最终输出："中国的首都是北京。"</text>
  <text x="400" y="488" text-anchor="middle" font-size="11" fill="#94a3b8">每一步都从概率分布中按概率采样一个 token，拼接到输入后继续预测，直到遇到结束符</text>
</svg>
