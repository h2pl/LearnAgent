<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a2647"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3d2563"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e94560" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="800" height="340" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">自回归生成：LLM 预测下一个词</text>
  <line x1="250" y1="50" x2="550" y2="50" stroke="#e94560" stroke-width="2" opacity="0.5"/>

  <!-- Step 1 -->
  <rect x="30" y="75" width="160" height="50" rx="8" fill="url(#box2)" stroke="#0f3460" stroke-width="1"/>
  <text x="110" y="103" text-anchor="middle" fill="#a8d8ea" font-size="14" font-weight="bold">中国的首都是</text>

  <!-- Arrow -->
  <line x1="190" y1="100" x2="220" y2="100" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="230" y="75" width="160" height="50" rx="8" fill="url(#box1)" stroke="#e94560" stroke-width="1"/>
  <text x="310" y="103" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">→ 北</text>

  <!-- Arrow -->
  <line x1="390" y1="100" x2="420" y2="100" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="430" y="75" width="160" height="50" rx="8" fill="url(#box3)" stroke="#533483" stroke-width="1"/>
  <text x="510" y="103" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">→ 京</text>

  <!-- Arrow -->
  <line x1="590" y1="100" x2="620" y2="100" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="630" y="75" width="140" height="50" rx="8" fill="url(#box4)" stroke="#e94560" stroke-width="1"/>
  <text x="700" y="100" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">→ 。</text>
  <text x="700" y="116" text-anchor="middle" fill="#ffd700" font-size="11">（停止）</text>

  <!-- Labels below -->
  <text x="110" y="148" text-anchor="middle" fill="#a8d8ea" font-size="11" opacity="0.7">输入</text>
  <text x="310" y="148" text-anchor="middle" fill="#e94560" font-size="11" opacity="0.7">预测第 1 个 token</text>
  <text x="510" y="148" text-anchor="middle" fill="#533483" font-size="11" opacity="0.7">预测第 2 个 token</text>
  <text x="700" y="148" text-anchor="middle" fill="#e94560" font-size="11" opacity="0.7">预测结束 token</text>

  <!-- Detailed flow -->
  <g transform="translate(0, 180)">
    <line x1="100" y1="20" x2="700" y2="20" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

    <rect x="30" y="35" width="730" height="110" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

    <text x="400" y="60" text-anchor="middle" fill="#a8d8ea" font-size="13" opacity="0.9">详细过程</text>

    <!-- Token boxes row -->
    <rect x="60" y="75" width="100" height="36" rx="6" fill="#0f3460" stroke="#1a5276" stroke-width="1"/>
    <text x="110" y="97" text-anchor="middle" fill="#a8d8ea" font-size="12">中国</text>

    <rect x="170" y="75" width="100" height="36" rx="6" fill="#0f3460" stroke="#1a5276" stroke-width="1"/>
    <text x="220" y="97" text-anchor="middle" fill="#a8d8ea" font-size="12">的</text>

    <rect x="280" y="75" width="100" height="36" rx="6" fill="#0f3460" stroke="#1a5276" stroke-width="1"/>
    <text x="330" y="97" text-anchor="middle" fill="#a8d8ea" font-size="12">首都</text>

    <rect x="390" y="75" width="100" height="36" rx="6" fill="#0f3460" stroke="#1a5276" stroke-width="1"/>
    <text x="440" y="97" text-anchor="middle" fill="#a8d8ea" font-size="12">是</text>

    <!-- Predicted tokens -->
    <rect x="520" y="75" width="100" height="36" rx="6" fill="#e94560" stroke="#ff6b81" stroke-width="1.5" filter="url(#glow)"/>
    <text x="570" y="97" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">北</text>

    <rect x="630" y="75" width="100" height="36" rx="6" fill="#533483" stroke="#7b5ea7" stroke-width="1.5" filter="url(#glow)"/>
    <text x="680" y="97" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">京</text>

    <!-- Label -->
    <text x="570" y="126" text-anchor="middle" fill="#e94560" font-size="10">已预测（当前步）</text>
    <text x="680" y="126" text-anchor="middle" fill="#533483" font-size="10">已预测（上一步）</text>
  </g>
</svg>
