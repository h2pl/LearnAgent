<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" width="960"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter></defs><rect width="960" height="260" fill="#F8FAFC" rx="8"/><text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">请求重试与降级</text><text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">10 次重试 + 3 次 529 重试 + 降级</text><g filter="url(#s)"><rect x="40" y="90" width="280" height="80" rx="6" fill="#2563EB"/><text x="180.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">请求失败?</text><text x="48" y="162" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">HTTP 错误 → 判断是否可重试</text></g><text x="330" y="135" font-family="Segoe UI" font-size="16" fill="#94A3B8">→</text><g filter="url(#s)"><rect x="350" y="90" width="260" height="80" rx="6" fill="#D97706"/><text x="480.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">重试决策</text><text x="358" y="162" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">529 → 3次 · 超时 → 10次 · 500ms递增</text></g><text x="620" y="135" font-family="Segoe UI" font-size="16" fill="#94A3B8">→</text><g filter="url(#s)"><rect x="640" y="90" width="280" height="80" rx="6" fill="#059669"/><text x="780.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">降级策略</text><text x="648" y="162" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">重试耗尽 → 切换备用模型</text></g><text x="480" y="220" text-anchor="middle" font-family="PingFang SC" font-size="12" fill="#64748b">DEFAULT_MAX_RETRIES=10 · BASE_DELAY_MS=500 · MAX_529_RETRIES=3</text></svg>