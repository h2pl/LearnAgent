<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="960" height="440" fill="#F8FAFC" rx="8"/>

  <text x="480" y="36" text-anchor="middle" font-family="PingFang SC, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">三大 Agent 框架对比</text>

  <!-- Claude Code -->
  <g filter="url(#shadow)">
    <rect x="40" y="62" width="280" height="340" rx="8" fill="#fff" stroke="#2563EB" stroke-width="2"/>
    <rect x="40" y="62" width="280" height="42" rx="8" fill="#2563EB"/>
    <rect x="40" y="88" width="280" height="16" fill="#2563EB"/>
    <text x="180" y="89" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#fff">Claude Code</text>

    <text x="60" y="130" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">定位</text>
    <text x="60" y="148" font-family="Segoe UI,PingFang SC" font-size="11" fill="#475569">终端 AI 编程助手</text>

    <text x="60" y="176" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">代码规模</text>
    <text x="60" y="194" font-family="Segoe UI" font-size="22" font-weight="bold" fill="#2563EB">51万</text>
    <text x="110" y="194" font-family="PingFang SC" font-size="11" fill="#64748b">行 TS</text>

    <text x="60" y="224" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">架构特点</text>
    <text x="60" y="244" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• 五层分层设计</text>
    <text x="60" y="262" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• Ink 终端渲染</text>
    <text x="60" y="280" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• ML 权限分类器</text>
    <text x="60" y="298" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• autoDream 记忆反思</text>

    <text x="60" y="330" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">适合学什么</text>
    <text x="60" y="350" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">终端 Agent / 上下文工程</text>
    <text x="60" y="366" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">权限安全 / CLI 设计</text>

    <rect x="40" y="62" width="8" height="42" rx="4" fill="#1D4ED8"/>
  </g>

  <!-- Hermes -->
  <g filter="url(#shadow)">
    <rect x="340" y="62" width="280" height="340" rx="8" fill="#fff" stroke="#D97706" stroke-width="2"/>
    <rect x="340" y="62" width="280" height="42" rx="8" fill="#D97706"/>
    <rect x="340" y="88" width="280" height="16" fill="#D97706"/>
    <text x="480" y="89" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#fff">Hermes</text>

    <text x="360" y="130" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">定位</text>
    <text x="360" y="148" font-family="Segoe UI,PingFang SC" font-size="11" fill="#475569">多 Agent 编排框架</text>

    <text x="360" y="176" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">代码规模</text>
    <text x="360" y="194" font-family="Segoe UI" font-size="22" font-weight="bold" fill="#D97706">2万</text>
    <text x="395" y="194" font-family="PingFang SC" font-size="11" fill="#64748b">行 TS</text>

    <text x="360" y="224" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">架构特点</text>
    <text x="360" y="244" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• Skill 多层匹配引擎</text>
    <text x="360" y="262" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• 设备级权限隔离</text>
    <text x="360" y="280" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• Worktree 沙箱</text>
    <text x="360" y="298" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• 多 Agent 并发调度</text>

    <text x="360" y="330" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">适合学什么</text>
    <text x="360" y="350" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">多 Agent 编排 / 扩展机制</text>
    <text x="360" y="366" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">Skill 系统 / 安全沙箱</text>

    <rect x="340" y="62" width="8" height="42" rx="4" fill="#B45309"/>
  </g>

  <!-- OpenClaw -->
  <g filter="url(#shadow)">
    <rect x="640" y="62" width="280" height="340" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
    <rect x="640" y="62" width="280" height="42" rx="8" fill="#059669"/>
    <rect x="640" y="88" width="280" height="16" fill="#059669"/>
    <text x="780" y="89" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#fff">OpenClaw</text>

    <text x="660" y="130" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">定位</text>
    <text x="660" y="148" font-family="Segoe UI,PingFang SC" font-size="11" fill="#475569">AI 编程工作台</text>

    <text x="660" y="176" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">代码规模</text>
    <text x="660" y="194" font-family="Segoe UI" font-size="22" font-weight="bold" fill="#059669">6.5万</text>
    <text x="703" y="194" font-family="PingFang SC" font-size="11" fill="#64748b">行 TS</text>

    <text x="660" y="224" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">架构特点</text>
    <text x="660" y="244" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• Gateway 多通道接入</text>
    <text x="660" y="262" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• IDE/CLI/Web 统一运行时</text>
    <text x="660" y="280" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• MCP 多连接器管理</text>
    <text x="660" y="298" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">• 多会话状态管理</text>

    <text x="660" y="330" font-family="PingFang SC" font-size="12" font-weight="bold" fill="#1e293b">适合学什么</text>
    <text x="660" y="350" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">多通道架构 / 工作台设计</text>
    <text x="660" y="366" font-family="Segoe UI,PingFang SC" font-size="10" fill="#475569">连接器管理 / 多会话隔离</text>

    <rect x="640" y="62" width="8" height="42" rx="4" fill="#047857"/>
  </g>

  <!-- 底部结论 -->
  <text x="480" y="425" text-anchor="middle" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8">单 Agent 深度 → Claude Code ｜多 Agent 编排 → Hermes ｜多通道工作台 → OpenClaw</text>
</svg>
