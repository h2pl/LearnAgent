<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cliGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="permGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="sysGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="520" fill="#F8FAFC" rx="8"/>

  <!-- 标题 -->
  <text x="480" y="38" text-anchor="middle" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Claude Code 五层架构</text>
  <text x="480" y="58" text-anchor="middle" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" fill="#64748b">51 万行 TypeScript 的分层设计</text>

  <!-- 第1层：CLI入口层 -->
  <g filter="url(#shadow)">
    <rect x="60" y="78" width="840" height="62" rx="6" fill="url(#cliGrad)"/>
    <text x="78" y="104" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#fff">🔌 CLI 入口层</text>
    <text x="78" y="124" font-family="Segoe UI, PingFang SC, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Commander 命令注册 · 交互/非交互模式 · 管道输入 · IDE Bridge 入口</text>
    <text x="870" y="114" text-anchor="end" font-family="Segoe UI" font-size="11" fill="rgba(255,255,255,0.65)">~8,000 行</text>
  </g>

  <!-- 层间箭头 -->
  <line x1="480" y1="140" x2="480" y2="162" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 第2层：Agent循环层 -->
  <g filter="url(#shadow)">
    <rect x="60" y="163" width="840" height="62" rx="6" fill="url(#agentGrad)"/>
    <text x="78" y="189" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#fff">🔄 Agent 循环层</text>
    <text x="78" y="209" font-family="Segoe UI, PingFang SC, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">消息预处理 · System Prompt 动态拼装 · 工具调用循环 · 上下文压缩</text>
    <text x="870" y="199" text-anchor="end" font-family="Segoe UI" font-size="11" fill="rgba(255,255,255,0.65)">~18,000 行</text>
  </g>

  <line x1="480" y1="225" x2="480" y2="247" stroke="#CBD5E1" stroke-width="2"/>

  <!-- 第3层：工具执行层 -->
  <g filter="url(#shadow)">
    <rect x="60" y="248" width="840" height="62" rx="6" fill="url(#toolGrad)"/>
    <text x="78" y="274" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#fff">🛠️ 工具执行层</text>
    <text x="78" y="294" font-family="Segoe UI, PingFang SC, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">42 个内置工具 · 文件编辑 · Bash 执行 · Git 操作 · 并发调度 · 子 Agent 隔离</text>
    <text x="870" y="284" text-anchor="end" font-family="Segoe UI" font-size="11" fill="rgba(255,255,255,0.65)">~15,000 行</text>
  </g>

  <line x1="480" y1="310" x2="480" y2="332" stroke="#CBD5E1" stroke-width="2"/>

  <!-- 第4层：权限控制层 -->
  <g filter="url(#shadow)">
    <rect x="60" y="333" width="840" height="62" rx="6" fill="url(#permGrad)"/>
    <text x="78" y="359" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#fff">🔒 权限控制层</text>
    <text x="78" y="379" font-family="Segoe UI, PingFang SC, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">7 种权限模式 · 8 级优先级 · ML 危险命令检测 · Undercover Mode 安全审计</text>
    <text x="870" y="369" text-anchor="end" font-family="Segoe UI" font-size="11" fill="rgba(255,255,255,0.65)">~5,000 行</text>
  </g>

  <line x1="480" y1="395" x2="480" y2="417" stroke="#CBD5E1" stroke-width="2"/>

  <!-- 第5层：系统提示层 -->
  <g filter="url(#shadow)">
    <rect x="60" y="418" width="840" height="62" rx="6" fill="url(#sysGrad)"/>
    <text x="78" y="444" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#fff">🧠 系统提示层</text>
    <text x="78" y="464" font-family="Segoe UI, PingFang SC, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">53KB 提示词模板 · 动态片段拼装 · 缓存命中 · CONNECTOR_TEXT 隐藏指令</text>
    <text x="870" y="454" text-anchor="end" font-family="Segoe UI" font-size="11" fill="rgba(255,255,255,0.65)">~3,000 行</text>
  </g>

  <!-- 右侧交互说明 -->
  <text x="928" y="260" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#94A3B8" transform="rotate(90 928 260)">数据流向上，控制流向下</text>
</svg>
