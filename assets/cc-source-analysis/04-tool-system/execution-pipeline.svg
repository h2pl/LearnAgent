<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960">
<defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter>
<filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.08"/></filter></defs>
<rect width="960" height="440" fill="#F8FAFC" rx="8"/>
<text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">工具执行管道</text>
<text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">从注册到执行的 4 层流水线</text>
