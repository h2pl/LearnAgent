<text x="220" y="237" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">Zod 类型检查 · 默认值填充 · 必填验证</text>
</g>
<g filter="url(#s)"><rect x="80" y="269" width="800" height="46" rx="5" fill="#fff" stroke="#D97706" stroke-width="2"/>
