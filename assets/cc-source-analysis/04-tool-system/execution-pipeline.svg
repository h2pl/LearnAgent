<text x="100" y="175" font-family="PingFang SC,Segoe UI" font-size="13" font-weight="bold" fill="#1e293b">① 工具发现</text>
<text x="220" y="175" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">Tool 接口 · buildTool 注册 · Zod Schema</text>
</g>
