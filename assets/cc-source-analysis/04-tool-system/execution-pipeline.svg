<text x="480" y="196" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#CBD5E1">↓</text>
<text x="480" y="258" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#CBD5E1">↓</text>
<text x="480" y="410" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#94A3B8">每个工具都实现相同的 Tool 接口，由 ToolExecutionPipeline 统一调度</text>
