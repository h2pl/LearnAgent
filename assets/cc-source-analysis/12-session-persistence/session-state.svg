<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 370" width="960"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter><filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.08"/></filter></defs><rect width="960" height="370" fill="#F8FAFC" rx="8"/><text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">会话状态与 Resume</text><text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">150 个字段的状态持久化</text><g filter="url(#sh)"><rect x="60" y="80" width="840" height="40" rx="6" fill="#2563EB"/><text x="480" y="105" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">会话状态管理</text></g><g filter="url(#s)"><rect x="60" y="140" width="280" height="60" rx="6" fill="#2563EB"/>
<text x="200.0" y="162" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="12" font-weight="bold" fill="#fff">~150 个字段</text>
<text x="70" y="190" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">sessionState 管理</text>
</g><text x="355" y="175" font-family="Segoe UI" font-size="18" fill="#94A3B8">→</text><g filter="url(#s)"><rect x="370" y="140" width="250" height="60" rx="6" fill="#059669"/>
<text x="495.0" y="162" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="12" font-weight="bold" fill="#fff">序列化存储</text>
<text x="380" y="190" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">JSON → 磁盘</text>
</g><text x="635" y="175" font-family="Segoe UI" font-size="18" fill="#94A3B8">→</text><g filter="url(#s)"><rect x="650" y="140" width="250" height="60" rx="6" fill="#D97706"/>
<text x="775.0" y="162" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="12" font-weight="bold" fill="#fff">Resume 机制</text>
<text x="660" y="190" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">断点续传</text>
</g><rect x="80" y="230" width="800" height="60" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
<text x="100" y="255" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#047857">Resume 流程: 加载状态 → 重建 Agent → 注入历史 → 继续循环</text>
<text x="100" y="275" font-family="Segoe UI,PingFang SC" font-size="11" fill="#475569">长任务中断后，通过 session state 恢复，不需要重新开始</text>
<text x="480" y="340" text-anchor="middle" font-family="PingFang SC" font-size="11" fill="#94A3B8">每个会话一个 JSON 文件，存于 ~/.claude/sessions/</text></svg>