<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 390" width="960"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter></defs><rect width="960" height="390" fill="#F8FAFC" rx="8"/><text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">AutoCompact 压缩流程</text><text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">Token 预算驱动的自动压缩</text><g filter="url(#s)"><rect x="60" y="90" width="840" height="50" rx="6" fill="#2563EB"/>
<text x="80" y="110" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#fff">触发检查</text>
<text x="80" y="128" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">Token 预算超限 → 触发压缩</text>
</g>
<text x="480" y="150" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#CBD5E1">↓</text>
<g filter="url(#s)"><rect x="60" y="152" width="840" height="50" rx="6" fill="#059669"/>
<text x="80" y="172" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#fff">消息打分</text>
<text x="80" y="190" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">每轮消息根据信号量排序</text>
</g>
<text x="480" y="212" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#CBD5E1">↓</text>
<g filter="url(#s)"><rect x="60" y="214" width="840" height="50" rx="6" fill="#D97706"/>
<text x="80" y="234" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#fff">摘要生成</text>
<text x="80" y="252" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">低分消息 → LLM 生成摘要</text>
</g>
<text x="480" y="274" text-anchor="middle" font-family="Segoe UI" font-size="14" fill="#CBD5E1">↓</text>
<g filter="url(#s)"><rect x="60" y="276" width="840" height="50" rx="6" fill="#7C3AED"/>
<text x="80" y="296" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#fff">原文替换</text>
<text x="80" y="314" font-family="Segoe UI,PingFang SC" font-size="10" fill="rgba(255,255,255,0.85)">摘要替代原文，释放 Token</text>
