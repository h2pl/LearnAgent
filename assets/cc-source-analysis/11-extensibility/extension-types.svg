<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" width="960"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter><filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.08"/></filter></defs><rect width="960" height="350" fill="#F8FAFC" rx="8"/><text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">四种扩展方式对比</text><text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">Hook/Skill/Plugin/MCP</text><g filter="url(#sh)"><rect x="60" y="80" width="840" height="40" rx="6" fill="#2563EB"/><text x="480" y="105" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">Claude Code 四种扩展方式</text></g><g filter="url(#s)"><rect x="60" y="140" width="200" height="120" rx="6" fill="#2563EB"/>
