<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 310" width="960"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter></defs><rect width="960" height="310" fill="#F8FAFC" rx="8"/><text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">启动初始化流程</text><text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">IoC → Config → Env → Router</text><g filter="url(#s)"><rect x="60" y="90" width="200" height="90" rx="6" fill="#2563EB"/><text x="160.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">IoC Container</text><text x="68" y="172" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">依赖注入框架，管理所有服务</text></g><text x="265" y="140" font-family="Segoe UI" font-size="18" fill="#94A3B8">∥</text><g filter="url(#s)"><rect x="280" y="90" width="200" height="90" rx="6" fill="#059669"/><text x="380.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">Config Manager</text><text x="288" y="172" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">加载 ~150 配置字段</text></g><text x="265" y="140" font-family="Segoe UI" font-size="18" fill="#94A3B8">∥</text><g filter="url(#s)"><rect x="500" y="90" width="200" height="90" rx="6" fill="#D97706"/><text x="600.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">Env Scanner</text><text x="508" y="172" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">Node/Git/OS/PackageManager 检测</text></g><text x="265" y="140" font-family="Segoe UI" font-size="18" fill="#94A3B8">∥</text><g filter="url(#s)"><rect x="720" y="90" width="200" height="90" rx="6" fill="#7C3AED"/><text x="820.0" y="108" text-anchor="middle" font-family="PingFang SC,Segoe UI" font-size="11" font-weight="bold" fill="#fff">Mode Router</text><text x="728" y="172" font-family="Segoe UI" font-size="9" fill="rgba(255,255,255,0.85)">stdio/pipe/IDE 入口分发</text></g><text x="480" y="240" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#1e293b">并行初始化: 能并行就并行，能延迟就延迟，能跳过就跳过</text><text x="480" y="265" text-anchor="middle" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">IoC + Config 同时加载，环境检测按需执行</text></svg>