<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960">
<defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.06"/></filter>
<filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.08"/></filter></defs>
<rect width="960" height="340" fill="#F8FAFC" rx="8"/>
<text x="480" y="34" text-anchor="middle" font-family="PingFang SC,Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Prompt Caching 策略</text>
<text x="480" y="54" text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" fill="#64748b">降低 LLM 调用成本的缓存分层</text>
<g filter="url(#sh)"><rect x="60" y="80" width="840" height="44" rx="6" fill="#D97706"/>
<text x="480" y="108" text-anchor="middle" font-family="PingFang SC" font-size="14" font-weight="bold" fill="#fff">Prompt Caching 三级策略</text>
</g>
<g filter="url(#s)"><rect x="80" y="140" width="800" height="48" rx="6" fill="#fff" stroke="#059669" stroke-width="2"/>
<text x="100" y="162" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#1e293b">L1 系统消息缓存</text>
<text x="100" y="180" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">前 4K Token 可命中，节约 90% 首 Token 延迟</text>
</g>
<g filter="url(#s)"><rect x="80" y="202" width="800" height="48" rx="6" fill="#fff" stroke="#2563EB" stroke-width="2"/>
<text x="100" y="224" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#1e293b">L2 工具定义缓存</text>
<text x="100" y="242" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">工具 Schema 缓存命中，减少重复传输</text>
</g>
<g filter="url(#s)"><rect x="80" y="264" width="800" height="48" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="2"/>
<text x="100" y="286" font-family="PingFang SC" font-size="13" font-weight="bold" fill="#1e293b">L3 CLAUDE.md 缓存</text>
<text x="100" y="304" font-family="Segoe UI,PingFang SC" font-size="11" fill="#64748b">项目级指令缓存，跨会话共享</text>
</g>

</svg>