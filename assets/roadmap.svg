<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="bold">AgentDevGuide — AI Agent 开发指南</text>
  <text x="550" y="74" text-anchor="middle" fill="#94a3b8" font-size="14">从 LLM 基础到可部署的 Agent 系统</text>

  <!-- ===== Phase 1: 打基础 ===== -->
  <text x="60" y="118" fill="#60a5fa" font-size="13" font-weight="bold">阶段一 · 打基础</text>

  <rect x="60" y="132" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="78" y="155" fill="#60a5fa" font-size="13" font-weight="bold">00 生态认知</text>
  <text x="78" y="175" fill="#94a3b8" font-size="11">概念辨析 · 全景图 · 技术演进</text>

  <rect x="255" y="132" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="273" y="155" fill="#60a5fa" font-size="13" font-weight="bold">01 LLM 基础</text>
  <text x="273" y="175" fill="#94a3b8" font-size="11">Token · Transformer · 训练 · 局限</text>

  <rect x="450" y="132" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="468" y="155" fill="#60a5fa" font-size="13" font-weight="bold">02 模型接入</text>
  <text x="468" y="175" fill="#94a3b8" font-size="11">API 调用 · 模型选型 · 参数调优</text>

  <rect x="645" y="132" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="663" y="155" fill="#60a5fa" font-size="13" font-weight="bold">03 Prompt 工程</text>
  <text x="663" y="175" fill="#94a3b8" font-size="11">结构化输出 · CoT · System Prompt</text>

  <rect x="840" y="132" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="858" y="155" fill="#60a5fa" font-size="13" font-weight="bold">04 工具调用</text>
  <text x="858" y="175" fill="#94a3b8" font-size="11">Function Calling 基础</text>

  <!-- ===== Phase 2: 建 Agent ===== -->
  <text x="60" y="235" fill="#fbbf24" font-size="13" font-weight="bold">阶段二 · 建 Agent</text>

  <rect x="60" y="248" width="980" height="66" rx="10" fill="#422006" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="274" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold" filter="url(#glow)">05 Agent 循环 ⭐ 里程碑：构建第一个 Agent</text>
  <text x="550" y="298" text-anchor="middle" fill="#d4a373" font-size="13">ReAct 模式 · observe → think → act → observe · 最小 Agent · 停止条件</text>

  <!-- ===== Phase 3: 增强 Agent ===== -->
  <text x="60" y="365" fill="#34d399" font-size="13" font-weight="bold">阶段三 · 增强 Agent</text>

  <rect x="60" y="378" width="310" height="66" rx="8" fill="#0f3328" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="78" y="403" fill="#34d399" font-size="13" font-weight="bold">06 知识检索（RAG）</text>
  <text x="78" y="423" fill="#94a3b8" font-size="11">文档分块 · Embedding · 向量库 · Agentic RAG</text>

  <rect x="400" y="378" width="310" height="66" rx="8" fill="#0f3328" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="418" y="403" fill="#34d399" font-size="13" font-weight="bold">07 框架与编排</text>
  <text x="418" y="423" fill="#94a3b8" font-size="11">LangGraph · 状态持久化 · Human-in-the-loop</text>

  <rect x="740" y="378" width="300" height="66" rx="8" fill="#0f3328" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="758" y="403" fill="#34d399" font-size="13" font-weight="bold">08 记忆与上下文</text>
  <text x="758" y="423" fill="#94a3b8" font-size="11">记忆三层模型 · 上下文工程 · 成本控制</text>

  <!-- ===== Phase 4: 扩展与治理 ===== -->
  <text x="60" y="495" fill="#a78bfa" font-size="13" font-weight="bold">阶段四 · 扩展与治理</text>

  <rect x="60" y="508" width="235" height="66" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="78" y="533" fill="#a78bfa" font-size="13" font-weight="bold">09 扩展协议与标准</text>
  <text x="78" y="553" fill="#94a3b8" font-size="11">MCP · Skills · AGENTS.md</text>

  <rect x="320" y="508" width="235" height="66" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="338" y="533" fill="#a78bfa" font-size="13" font-weight="bold">10 多 Agent 协作</text>
  <text x="338" y="553" fill="#94a3b8" font-size="11">Sub-agent · 协作模式 · A2A</text>

  <rect x="580" y="508" width="235" height="66" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="598" y="533" fill="#a78bfa" font-size="13" font-weight="bold">11 评测与可观测</text>
  <text x="598" y="553" fill="#94a3b8" font-size="11">Eval · Trace · LLM-as-Judge</text>

  <rect x="840" y="508" width="200" height="66" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="858" y="533" fill="#a78bfa" font-size="13" font-weight="bold">12 安全与治理</text>
  <text x="858" y="553" fill="#94a3b8" font-size="11">权限控制 · 注入防御 · 沙箱</text>

  <!-- ===== Phase 5: 产品交付 ===== -->
  <text x="60" y="625" fill="#f87171" font-size="13" font-weight="bold">阶段五 · 产品交付</text>

  <rect x="60" y="638" width="980" height="66" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="664" text-anchor="middle" fill="#f87171" font-size="18" font-weight="bold" filter="url(#glow)">13 产品交付 🎯 终点：可部署的 Agent 系统</text>
  <text x="550" y="688" text-anchor="middle" fill="#d4a0a0" font-size="13">FastAPI 服务化 · Docker 部署 · 监控告警 · 成本控制</text>

  <!-- Bottom tagline -->
  <text x="550" y="745" text-anchor="middle" fill="#475569" font-size="11">github.com/h2pl/AgentDevGuide · MIT License</text>

</svg>
