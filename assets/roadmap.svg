<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="stage1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="stage2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="stage3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="stage4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="4" height="4">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1100" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">AI Agent 开发指南 — 学习路线</text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#64748b">从 LLM 基础到生产部署，14 个章节循序渐进</text>

  <!-- Stage labels on left -->
  <text x="30" y="115" font-size="12" font-weight="bold" fill="#2563eb">基础认知</text>
  <text x="30" y="205" font-size="12" font-weight="bold" fill="#7c3aed">单 Agent 开发</text>
  <text x="30" y="340" font-size="12" font-weight="bold" fill="#d97706">进阶能力</text>
  <text x="30" y="475" font-size="12" font-weight="bold" fill="#dc2626">生产交付</text>

  <!-- Stage vertical bars -->
  <rect x="60" y="82" width="4" height="90" rx="2" fill="#3b82f6" opacity="0.3"/>
  <rect x="60" y="175" width="4" height="130" rx="2" fill="#8b5cf6" opacity="0.3"/>
  <rect x="60" y="308" width="4" height="130" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="60" y="441" width="4" height="130" rx="2" fill="#ef4444" opacity="0.3"/>

  <!-- Row 1: 00, 01, 02 -->
  <g transform="translate(80, 80)">
    <!-- 00 -->
    <rect x="0" y="0" width="170" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">00 · 生态认知</text>
    <text x="85" y="42" text-anchor="middle" font-size="9" fill="#475569">Agent vs Chatbot</text>
    <text x="85" y="56" text-anchor="middle" font-size="9" fill="#475569">Workflow / RAG 对比</text>

    <line x1="180" y1="35" x2="210" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 01 -->
    <rect x="220" y="0" width="170" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">01 · LLM 基础</text>
    <text x="305" y="42" text-anchor="middle" font-size="9" fill="#475569">LLM 原理与能力边界</text>
    <text x="305" y="56" text-anchor="middle" font-size="9" fill="#475569">自回归 / 注意力机制</text>

    <line x1="400" y1="35" x2="430" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 02 -->
    <rect x="440" y="0" width="170" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="525" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">02 · 模型接入</text>
    <text x="525" y="42" text-anchor="middle" font-size="9" fill="#475569">API 调用与模型对比</text>
    <text x="525" y="56" text-anchor="middle" font-size="9" fill="#475569">多模型切换服务</text>


  </g>

  <!-- Row 2: 03, 04, 05 -->
  <g transform="translate(80, 195)">
    <!-- 03 -->
    <rect x="0" y="0" width="170" height="70" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">03 · Prompt 工程</text>
    <text x="85" y="42" text-anchor="middle" font-size="9" fill="#475569">结构化输出控制</text>
    <text x="85" y="56" text-anchor="middle" font-size="9" fill="#475569">CoT 链式思考</text>

    <line x1="180" y1="35" x2="210" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 04 -->
    <rect x="220" y="0" width="170" height="70" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">04 · 工具调用</text>
    <text x="305" y="42" text-anchor="middle" font-size="9" fill="#475569">Function Calling 机制</text>
    <text x="305" y="56" text-anchor="middle" font-size="9" fill="#475569">多工具对话 demo</text>

    <line x1="400" y1="35" x2="430" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 05 (featured) -->
    <rect x="440" y="0" width="170" height="70" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
    <text x="525" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">05 · Agent 循环 ⭐</text>
    <text x="525" y="42" text-anchor="middle" font-size="9" fill="#92400e">ReAct 核心循环</text>
    <text x="525" y="56" text-anchor="middle" font-size="9" fill="#92400e">最小可运行 Agent</text>


  </g>

  <!-- Row 3: 06, 07, 08, 09 -->
  <g transform="translate(80, 310)">
    <!-- 06 -->
    <rect x="0" y="0" width="170" height="70" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca8a04">06 · 知识检索</text>
    <text x="85" y="42" text-anchor="middle" font-size="9" fill="#475569">RAG 管道搭建</text>
    <text x="85" y="56" text-anchor="middle" font-size="9" fill="#475569">向量检索 + 问答</text>

    <line x1="180" y1="35" x2="210" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 07 -->
    <rect x="220" y="0" width="170" height="70" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca8a04">07 · 框架与编排</text>
    <text x="305" y="42" text-anchor="middle" font-size="9" fill="#475569">LangGraph 工作流</text>
    <text x="305" y="56" text-anchor="middle" font-size="9" fill="#475569">复杂流程编排</text>

    <line x1="400" y1="35" x2="430" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 08 -->
    <rect x="440" y="0" width="170" height="70" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="525" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca8a04">08 · 记忆与上下文</text>
    <text x="525" y="42" text-anchor="middle" font-size="9" fill="#475569">记忆管理策略</text>
    <text x="525" y="56" text-anchor="middle" font-size="9" fill="#475569">持久化上下文</text>

    <line x1="620" y1="35" x2="650" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 09 -->
    <rect x="660" y="0" width="170" height="70" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="745" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca8a04">09 · 扩展协议</text>
    <text x="745" y="42" text-anchor="middle" font-size="9" fill="#475569">MCP / Skills 标准</text>
    <text x="745" y="56" text-anchor="middle" font-size="9" fill="#475569">MCP Server 构建</text>


  </g>

  <!-- Row 4: 10, 11, 12, 13 -->
  <g transform="translate(80, 425)">
    <!-- 10 -->
    <rect x="0" y="0" width="170" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">10 · 多 Agent 协作</text>
    <text x="85" y="42" text-anchor="middle" font-size="9" fill="#475569">多 Agent 通信模式</text>
    <text x="85" y="56" text-anchor="middle" font-size="9" fill="#475569">分工协作系统</text>

    <line x1="180" y1="35" x2="210" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 11 -->
    <rect x="220" y="0" width="170" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">11 · 评测与可观测</text>
    <text x="305" y="42" text-anchor="middle" font-size="9" fill="#475569">评估体系搭建</text>
    <text x="305" y="56" text-anchor="middle" font-size="9" fill="#475569">Trace 追踪链路</text>

    <line x1="400" y1="35" x2="430" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 12 -->
    <rect x="440" y="0" width="170" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="525" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">12 · 安全与治理</text>
    <text x="525" y="42" text-anchor="middle" font-size="9" fill="#475569">权限与隔离</text>
    <text x="525" y="56" text-anchor="middle" font-size="9" fill="#475569">安全加固方案</text>

    <line x1="620" y1="35" x2="650" y2="35" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- 13 (featured) -->
    <rect x="660" y="0" width="170" height="70" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="745" y="24" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">13 · 产品交付 🎯</text>
    <text x="745" y="42" text-anchor="middle" font-size="9" fill="#92400e">部署上线全流程</text>
    <text x="745" y="56" text-anchor="middle" font-size="9" fill="#92400e">可部署 Agent 系统</text>
  </g>

  <!-- Legend -->
  <g transform="translate(870, 80)">
    <text x="0" y="12" font-size="11" font-weight="bold" fill="#475569">阶段说明</text>
    <rect x="0" y="22" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
    <text x="18" y="33" font-size="10" fill="#475569">基础认知（00-02）</text>
    <rect x="0" y="42" width="12" height="12" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <text x="18" y="53" font-size="10" fill="#475569">单 Agent 开发（03-05）</text>
    <rect x="0" y="62" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.3"/>
    <text x="18" y="73" font-size="10" fill="#475569">进阶能力（06-09）</text>
    <rect x="0" y="82" width="12" height="12" rx="2" fill="#ef4444" opacity="0.3"/>
    <text x="18" y="93" font-size="10" fill="#475569">生产交付（10-13）</text>
  </g>
</svg>
