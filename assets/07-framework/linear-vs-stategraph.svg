<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">LCEL 线性管道 vs LangGraph 状态图</text>

  <!-- Left: Linear Chain -->
  <text x="200" y="70" text-anchor="middle" font-size="14" fill="#666">LCEL：线性管道</text>

  <rect x="30" y="100" width="100" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="80" y="130" text-anchor="middle" font-size="13" fill="#0c4a6e">Prompt</text>

  <line x1="130" y1="125" x2="165" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="175" y="100" width="100" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="130" text-anchor="middle" font-size="13" fill="#0c4a6e">LLM</text>

  <line x1="275" y1="125" x2="310" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="320" y="100" width="100" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="370" y="130" text-anchor="middle" font-size="13" fill="#0c4a6e">Parser</text>

  <text x="200" y="185" text-anchor="middle" font-size="12" fill="#999">一条直线，无法分支或循环</text>

  <!-- Right: State Graph -->
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#666">LangGraph：状态图</text>

  <!-- START node -->
  <circle cx="470" cy="130" r="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="134" text-anchor="middle" font-size="10" fill="#166534">START</text>

  <!-- Agent node -->
  <rect x="520" y="105" width="90" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="565" y="135" text-anchor="middle" font-size="13" fill="#92400e">Agent</text>

  <!-- Tools node -->
  <rect x="520" y="250" width="90" height="50" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="565" y="280" text-anchor="middle" font-size="13" fill="#9d174d">Tools</text>

  <!-- END node -->
  <circle cx="700" cy="130" r="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="700" y="134" text-anchor="middle" font-size="10" fill="#991b1b">END</text>

  <!-- Arrows -->
  <line x1="486" y1="130" x2="518" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Conditional edge: Agent → Tools (down) -->
  <line x1="565" y1="155" x2="565" y2="248" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="580" y="205" font-size="11" fill="#2563eb">有工具调用</text>

  <!-- Conditional edge: Agent → END (right) -->
  <line x1="610" y1="130" x2="682" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="635" y="118" font-size="11" fill="#2563eb">直接回答</text>

  <!-- Loop: Tools → Agent (up) -->
  <path d="M 540 250 L 540 170 L 545 157" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="495" y="220" font-size="11" fill="#2563eb">结果反馈</text>

  <!-- Annotation -->
  <text x="600" y="340" text-anchor="middle" font-size="12" fill="#999">条件边实现分支，边形成循环</text>

  <!-- Divider -->
  <line x1="420" y1="55" x2="420" y2="350" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
</svg>
