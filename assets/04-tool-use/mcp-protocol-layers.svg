<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="background:#fff;font-family:sans-serif">
  <!-- 标题 -->
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">MCP 协议分层架构</text>

  <!-- ===== 左：N×M 地狱 ===== -->
  <rect x="12" y="46" width="230" height="28" rx="6" fill="#DC2626"/>
  <text x="127" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">N×M 适配地狱（MCP 之前）</text>

  <!-- 客户端列 -->
  <rect x="18" y="82" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="44" y="98" text-anchor="middle" font-size="9" fill="#B91C1C">Claude</text>
  <rect x="18" y="110" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="44" y="126" text-anchor="middle" font-size="9" fill="#B91C1C">GPT</text>
  <rect x="18" y="138" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="44" y="154" text-anchor="middle" font-size="9" fill="#B91C1C">Gemini</text>

  <!-- 工具列 -->
  <rect x="190" y="82" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="216" y="98" text-anchor="middle" font-size="9" fill="#B91C1C">GitHub</text>
  <rect x="190" y="110" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="216" y="126" text-anchor="middle" font-size="9" fill="#B91C1C">Slack</text>
  <rect x="190" y="138" width="52" height="24" rx="4" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="216" y="154" text-anchor="middle" font-size="9" fill="#B91C1C">Postgres</text>

  <!-- 交叉连线 -->
  <line x1="70" y1="90" x2="190" y2="90" stroke="#FCA5A5" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="70" y1="118" x2="190" y2="118" stroke="#FCA5A5" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="70" y1="146" x2="190" y2="146" stroke="#FCA5A5" stroke-width="0.8" stroke-dasharray="3,3"/>

  <text x="130" y="178" text-anchor="middle" font-size="10" fill="#B91C1C">3×3 = 9 套适配代码</text>

  <!-- ===== 右：N+M 简单加法 ===== -->
  <rect x="260" y="46" width="408" height="28" rx="6" fill="#059669"/>
  <text x="464" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">N+M 简单加法（MCP 之后）</text>

  <!-- MCP 协议层 -->
  <rect x="260" y="82" width="408" height="96" rx="8" fill="#F0FDF4" stroke="#86EFAC"/>

  <!-- 使用方 -->
  <rect x="275" y="92" width="55" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="302" y="108" text-anchor="middle" font-size="9" fill="#047857">Claude</text>
  <rect x="340" y="92" width="45" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="362" y="108" text-anchor="middle" font-size="9" fill="#047857">GPT</text>
  <rect x="395" y="92" width="55" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="422" y="108" text-anchor="middle" font-size="9" fill="#047857">Cursor</text>
  <rect x="460" y="92" width="55" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="487" y="108" text-anchor="middle" font-size="9" fill="#047857">VSCode</text>
  <rect x="525" y="92" width="55" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="552" y="108" text-anchor="middle" font-size="9" fill="#047857">Gemini</text>
  <rect x="590" y="92" width="65" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="622" y="108" text-anchor="middle" font-size="9" fill="#047857">...</text>

  <!-- 箭头 → MCP -->
  <line x1="330" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>
  <line x1="362" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>
  <line x1="422" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>
  <line x1="487" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>
  <line x1="552" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>
  <line x1="622" y1="118" x2="464" y2="135" stroke="#059669" stroke-width="1"/>

  <!-- MCP Server -->
  <rect x="380" y="135" width="168" height="22" rx="4" fill="#059669"/>
  <text x="464" y="151" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MCP Server (写一次)</text>

  <!-- 箭头 →
提供方 -->
  <line x1="464" y1="158" x2="310" y2="172" stroke="#059669" stroke-width="1"/>
  <line x1="464" y1="158" x2="464" y2="172" stroke="#059669" stroke-width="1"/>
  <line x1="464" y1="158" x2="610" y2="172" stroke="#059669" stroke-width="1"/>

  <rect x="275" y="148" width="75" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="312" y="164" text-anchor="middle" font-size="9" fill="#047857">GitHub</text>
  <rect x="420" y="148" width="85" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="462" y="164" text-anchor="middle" font-size="9" fill="#047857">Slack/Postgres</text>
  <rect x="570" y="148" width="85" height="24" rx="4" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="612" y="164" text-anchor="middle" font-size="9" fill="#047857">Stripe/AWS</text>

  <!-- ===== 协议分层 ===== -->
  <rect x="14" y="210" width="652" height="180" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>

  <!-- 层1: 应用原语 -->
  <rect x="26" y="220" width="628" height="38" rx="6" fill="#DBEAFE"/>
  <text x="340" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">应用层 — 三大核心原语</text>
  <text x="340" y="252" text-anchor="middle" font-size="10" fill="#3B82F6">Tools (可调用函数) | Resources (只读数据) | Prompts (提示模板) | Sampling (Server调LLM)</text>

  <!-- 层2: 协议 -->
  <rect x="26" y="264" width="628" height="38" rx="6" fill="#D1FAE5"/>
  <text x="340" y="281" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">协议层 — JSON-RPC 2.0</text>
  <text x="340" y="296" text-anchor="middle" font-size="10" fill="#059669">请求/响应/通知 消息格式 | tools/list · tools/call · resources/read · prompts/get</text>

  <!-- 层3: 传输 -->
  <rect x="26" y="308" width="628" height="38" rx="6" fill="#FEF3C7"/>
  <text x="340" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">传输层 — 双模通信</text>
  <text x="340" y="340" text-anchor="middle" font-size="10" fill="#D97706">STDIO（本地子进程） | Streamable HTTP（远程服务，取代SSE）</text>

  <!-- 层4: 安全 -->
  <rect x="26" y="352" width="628" height="32" rx="6" fill="#FEE2E2"/>
  <text x="340" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#B91C1C">安全层 — OAuth 2.1 + Roots 权限边界</text>
  <text x="340" y="380" text-anchor="middle" font-size="10" fill="#DC2626">认证授权 | 文件路径授权（Roots）| 网关审计与限流</text>

  <!-- 图注 -->
  <text x="340" y="394" text-anchor="middle" font-size="11" fill="#94A3B8">图：MCP四层协议栈 + N×M→N+M的转化</text>
</svg>
