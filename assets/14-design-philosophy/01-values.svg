<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="480" fill="#F8FAFC" rx="12"/>
  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Claude Code 的五个核心价值观</text>

  <!-- 5 boxes -->
  <rect x="40" y="70" width="160" height="140" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="120" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">🛡️ 安全第一</text>
  <text x="120" y="135" text-anchor="middle" font-size="11" fill="#DBEAFE">Safety First</text>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#DBEAFE">Safeguards团队审查</text>
  <text x="120" y="178" text-anchor="middle" font-size="10" fill="#DBEAFE">1549字节红线</text>

  <rect x="220" y="70" width="160" height="140" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="300" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">👁️ 人类监督</text>
  <text x="300" y="135" text-anchor="middle" font-size="11" fill="#DBEAFE">Human Oversight</text>
  <text x="300" y="160" text-anchor="middle" font-size="10" fill="#DBEAFE">一次性批准≠</text>
  <text x="300" y="178" text-anchor="middle" font-size="10" fill="#DBEAFE">持久授权</text>

  <rect x="400" y="70" width="160" height="140" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="480" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">✂️ 谨慎行动</text>
  <text x="480" y="135" text-anchor="middle" font-size="11" fill="#DBEAFE">Measured Action</text>
  <text x="480" y="160" text-anchor="middle" font-size="10" fill="#DBEAFE">最小干预</text>
  <text x="480" y="178" text-anchor="middle" font-size="10" fill="#DBEAFE">三行重复&gt;过早抽象</text>

  <rect x="580" y="70" width="160" height="140" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="660" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">🔍 透明诚实</text>
  <text x="660" y="135" text-anchor="middle" font-size="11" fill="#DBEAFE">Transparent Honesty</text>
  <text x="660" y="160" text-anchor="middle" font-size="10" fill="#DBEAFE">不夸大成功</text>
  <text x="660" y="178" text-anchor="middle" font-size="10" fill="#DBEAFE">不掩饰失败</text>

  <rect x="760" y="70" width="160" height="140" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="840" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">💬 用户优先</text>
  <text x="840" y="135" text-anchor="middle" font-size="11" fill="#DBEAFE">UX First</text>
  <text x="840" y="160" text-anchor="middle" font-size="10" fill="#DBEAFE">线性可读</text>
  <text x="840" y="178" text-anchor="middle" font-size="10" fill="#DBEAFE">无语义回溯</text>

  <!-- Arrow to Code -->
  <line x1="480" y1="230" x2="480" y2="270" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/></marker></defs>

  <text x="480" y="255" text-anchor="middle" font-size="13" fill="#64748B">编译进代码</text>

  <!-- Code modules mapping -->
  <rect x="40" y="285" width="280" height="60" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="308" font-size="13" font-weight="600" fill="#1E40AF">prompts.ts (915行)</text>
  <text x="60" y="330" font-size="11" fill="#3B82F6">价值观2-5 + 原则层外化</text>

  <rect x="340" y="285" width="280" height="60" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="360" y="308" font-size="13" font-weight="600" fill="#92400E">cyberRiskInstruction.ts</text>
  <text x="360" y="330" font-size="11" fill="#B45309">价值观1：Safeguards团队红线</text>

  <rect x="640" y="285" width="280" height="60" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="660" y="308" font-size="13" font-weight="600" fill="#065F46">undercover.ts (90行)</text>
  <text x="660" y="330" font-size="11" fill="#047857">Undercover原则：无强制关闭</text>

  <!-- Bottom: 13 principles list -->
  <rect x="40" y="365" width="880" height="95" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="60" y="388" font-size="14" font-weight="600" fill="#475569">13 条工程法则</text>
  <text x="60" y="410" font-size="11" fill="#64748B">可缓存性 | 最小化 | 风险分层 | 上下文隔离 | 容错降级 | Prompt Cache友好 | Undercover身份保护</text>
  <text x="60" y="430" font-size="11" fill="#64748B">信息压缩 | 幂等可恢复 | 不可见但可检 | 优先修复非绕过 | 模型友好命名 | 可控自主性</text>
</svg>
